DConstitutionalMonarchy = Vlast je podijeljena između monarha i državnih institucija.
DCityState = Nezavisni grad koji funkcioniše kao vlastita država.
DNationalSocialism = Potpuna kontrola države zasnovana na strogoj vlasti i ekstremnoj nacionalističkoj ideologiji.
DPresidentialRepublic = Centralna vlast je u rukama jednog šefa države unutar republikanskog sistema.
DMerchantRepublic = Vlast je u rukama bogatih trgovaca i trgovačke elite.
DParliamentaryRepublic = Državom upravlja skupština koja predstavlja državu.
DTheocracy = Vlast je u rukama vjerskih vođa, a država je zasnovana na vjeri.
DDictatorship = Sva vlast je koncentrirana u rukama jednog vođe bez ograničenja.
DDaimyo = Lokalni vojni gospodari upravljaju svojim područjima unutar šireg feudalnog sistema.
DBananaRepublic = Nestabilan sistem oblikovan moćnim elitama i vanjskim uticajem.
