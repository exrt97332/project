RoleOfGenerals = 将领角色

RoleOfGenerals0 = 将领在战役中扮演关键角色。 他们的进攻值会影响敌方损失， 由一种掷骰机制决定
RoleOfGenerals1 = 将领的防御值也同样重要， 可减少己方损失， 体现其战略地位

BattlePhase = 战斗阶段

BattlePhase0 = 在每一天， 双方前线部队都会在攻击范围内互相对射
BattlePhase1 = 同时， 第二战线的部队也会参与攻击敌方前线单位
BattlePhase2 = 战斗会造成伤亡、 部队后撤和士气损失

MoraleAndRetreatMechanics = 士气与撤退机制
MoraleAndRetreatMechanics0 = 士气在战役中扮演着关键作用。 随着伤亡增加， 士气会下降。 
MoraleAndRetreatMechanics1 = 部队可能会因伤亡过重或士气低落而退却， 影响军队整体力量和效率。 

DestructionOrSurvival = 覆灭或存活
DestructionOrSurvival0 = 如果一支军队无法在{0}天的战役中自我维持， 就被视为覆灭。 这可能是由于伤亡过重、 士气丧尽或战略性撤退造成的

ArmyComposition = 军队编制
ArmyComposition0 = 前后线部队的选择至关重要。 前线需要坚韧和正面作战能力， 而后线部队应提供支援、 远程打击或特殊功能

# Manpower
Manpower0 = 人力代表了一个文明可供军事服役的人口储备
Manpower1 = 这是征募新兵和补充现有军队的关键资源， 体现了文明打仗和自卫的能力
Manpower2 = 人力会随时间自然补给， 反映人口自然增长和战争损耗恢复
Manpower3 = 由于人力是随时间补给， 玩家必须规划好军事行动， 审视目前和未来的人力储备

RegimnetsLimit0 = 军团数量上限由文明的经济实力和独特加成决定

ProvinceContribution = 领地贡献
ProvinceContribution0 = 文明控制下的每个领地都为总人力储备贡献一份力量

IncreasingMaximumManpower = 提高总兵员上限
IncreasingMaximumManpower0 = 修建特殊军事建筑：在你的文明中修建特定建筑可直接增加兵员上限
IncreasingMaximumManpower1 = 提高各省份的兵员补给：提高各省份的兵员补给水平

Legacy0 = 文明点是游戏中一种特殊点数， 代表一个文明随时间积累的成就和里程碑
Legacy1 = 玩家可使用文明点解锁文明传统， 这是永久性的加成， 为文明带来各种优势
Legacy2 = 除了解锁文明传统， 文明点还用于游戏中的其他关键行动， 包括：招募将军和顾问、 提高各省份的税收率和兵员补给

Income0 = 游戏中每个省份的月收入是由几个部分组成的， 包括税收率、 整体经济状况、 生产活动收入， 以及该省份内特殊建筑物产生的收入
Income1 = 如果一个文明在一个省份没有核心领土， 或者该省份的宗教信仰与文明不同， 月收入将会减少

TaxEfficiency0 = 每个省份的月度税收主要由两个因素决定： 税收率水平和人口规模

Economy0 = 省份每月从经济中获得的收入取决于其经济水平， 可以通过 投资金钱来提高经济水平。 投资经济可提高生产效率
Economy1 = 一个省份的最高经济水平由其人口增长率决定

Production0 = 如果一个省份拥有资源， 它会根据两个因素产生收入：该资源的独特价格和该省份的生产效率。 资源的独特价格反映了其稀有程度
Production1 = 玩家可以通过投资该省份的经济或修建专门提高生产效率的特殊建筑来增加其生产效率
Production2 = 对于特定资源的最大生产者， 会获得文明加成， 带来经济、 军事或战略优势， 并激发争夺资源生产霸权的竞争

Population0 = 省份的人口影响税收收入， 具体取决于税收率
GrowthRate0 = 省份的人口增长率决定其人口增长速度。 人口增长率还影响 该省份的最高经济水平和本地兵员补给

Plague0 = 瘟疫可能会突然在任何省份爆发。 这反映了疾病爆发的历史现实性和随机性
Plague1 = 一旦瘟疫在一个省份出现， 它就会迅速蔓延到周边省份。 可以通过升级省份基础设施或修建特殊建筑来减少瘟疫造成的人口死亡

Technology0 = 每项技术都有研究成本， 文明可以通过积累研究点数来解锁这些技术
Technology1 = 可以通过在省份修建特殊建筑或雇佣科研顾问来增加研究点数

Advisor0 = 文明可以在议会中雇佣顾问， 每位顾问都会提供独特的加成， 通过提升顾问级别可以增强加成效果

Corruption0 = 游戏中每个文明都会受到一定程度的腐败影响， 这会一定比例减少所有省份的收入。 
Corruption1 = 文明可以选择通过升级最高法院级别来打击腐败

# Events
capital_city_economic_development.t = 首都经济发展
capital_city_economic_development.d = 你首都城市的经济前景正悬而未决。 你是想投入资源促进经济增长， 还是维持现状?
InvestInCapitalGrowth = 投资发展首都
MaintainStatusQuo = 维持现状

Excellent = 非常好！


economys_golden_milestone.t =经济黄金里程碑
economys_golden_milestone.m = 通过战略投资振兴你文明的经济， 开启繁荣新时代。 
economys_golden_milestone.d = 通过对关键领域的战略投资， 你成功振兴了文明的经济。 
GoodNews = 好消息！
EconomicTriumph = 经济腾飞！

rising_cost_of_construction.t = 建筑成本上涨
rising_cost_of_construction.d = 由于熟练工人和工匠短缺， 加上战争和疾病的影响， 导致建筑成本上升。 
OfferSubsidiesForConstruction = 提供建筑补贴

military_mobilization_crisis.t = 军事动员危机
military_mobilization_crisis.d = 由于地区紧张局势加剧和潜在威胁增加， 迫切需要加强武装力量。 但这种突然扩军的需求引起了民众的争议和动荡。 

MaintainCurrentRecruitmentStrategy = 维持现有征兵策略
CallToArms = 武装动员！

the_council_of_many.t = 众议院
the_council_of_many.m = 招募顾问， 打造知识渊博、 经验丰富的顾问议会。 
the_council_of_many.d = 你的文明见证了议会顾问人数大幅增加， 这是一个将顾问提升到更高级别专业水平的良机。 
GreatNews = 大好消息！

remarkable_talent.t = 杰出人才-行政顾问
remarkable_talent2.t = 杰出人才-经济顾问
remarkable_talent3.t = 杰出人才-科研顾问
remarkable_talent4.t = 杰出人才-军事顾问
remarkable_talent.d = 我们议会出现了值得关注的发展。 凭借出色的技能和创新方法， 我们的顾问已达到了远超预期的专业水平。 .
LaunchAmbitiousReforms = 开展宏伟改革

an_unprecedented_harvest.t = 空前丰收
an_unprecedented_harvest.d = 今年， 我们的土地经历了空前丰收。 我们的田地给了我们大量的庄稼， 远远超出预期， 几乎把所有储物空间都装满了。 

age_of_craftsmanship.t = 工业黄金时代
age_of_craftsmanship.d = 我们的文明正处于工业黄金时期， 技艺精湛的工匠制作出极富艺术价值的精品， 提高了我们的文化声望。 
RemarkableAchievement = 了不起的成就！


gold_surplus_dilemma.t = 黄金过剩困境
gold_surplus_dilemma.d = 一个罕见的情况出现了， 我们文明的国库里黄金过剩， 超出最大容量。 这意外的财富盈余见证了我们繁荣的经济和高效的治理。 
StoreAndSecure = 储存和保障

invest_in_the_capital.t = 投资首都
invest_in_the_capital.d = 首都的繁荣对我们文明的力量和影响力至关重要。 认识到其潜力后， 我们现在面临着投资于其经济发展和基础设施建设的重大抉择。 
LimitedInvestment = 有限投资
MaintainCurrentCourse = 维持现状

the_great_city_fire.t = 大城市火灾
the_great_city_fire.d = 一场毁灭性的大火袭击了城市的部分地区， 危及居民和象征我们过去的历史建筑的安全。 
AcceptTheInevitable = 接受不可避免的现实

expanding_the_battle_front.t =扩大战线宽度
expanding_the_battle_front.d = 我们的军事战略家取得了突破性成就， 将军队的战线阵型扩展到了前所未有的规模。 这标志着我们军事实力的新时代， 意味着向更复杂和强大的战斗阵型的转变。 
Excellent = 极好

reformation_of_the_army.t = 军队改革
reformation_of_the_army.d = 我们的文明正处于重大军事变革的边缘。 是时候对军队进行改革， 从传统方式转向现代化的战术和组织了。 
reformation_of_the_army.m = 升级军事学院， 体现你对先进军事训练和战略的重视。 

army_expansion.t = 军队扩张
army_expansion.d = 组建如此庞大的军队让人民备受骄傲和安全感， 增强了全国的士气和团结。 

famous_vintage.t = 精制酿酒
famous_vintage.d = 我们著名产酒区出产的一款新年份酒因其卓越品质而备受专家青睐， 使我们的公民为之骄傲， 也增强了我们优质佳酿生产商的声誉。 
AToastToOurLands =为我们的土地干杯！

rich_harvest.t = 丰收年景
rich_harvest.d = 这个季节， 我们的农场经历了空前的丰收。 庄稼的大量出产不仅能确保人民食物供应充足， 还显著提高了人口增长率。 

clothing_revolution.t = 服装革命
clothing_revolution.d = 我们文明内生产的服装质量近期出乎意料地大幅提高， 使利润意外且可观地增加。 

agricultural_breakthrough.t = 农业突破
agricultural_breakthrough.d = 在一个卓越的进展中， 我们已成功在各省份实现农业革命。 
ExpandMilitaryForces = 扩张军队
BoostPopulationGrowth = 促进人口增长

gold_rush.t = 淘金热
gold_rush.d = 我们的矿工发现了一个巨大的金矿藏， 使国库大幅增加。 

quality_furniture.t = 优质家具
quality_furniture.d = 我们的家具生产近期质量大幅提升。 工匠和木工们精益求精， 打造出功能与非凡艺术性兼备的作品。 

fruit_mania.t = 水果热潮
fruit_mania.d = 在一个令人惊讶的转折中， 我们的文明发现了一种神秘的水果品种， 传说具有诸如卓越风味和异常体型等独特属性， 引发了全民的热烈兴趣， 吸引了各地人民前来亲眼目睹这一奇观。 

beer_production_soars.t = 啤酒产量飙升
beer_production_soars.d = 一项开创性的酿酒技术革新使我们的啤酒产量出人意料地大幅增加。 

the_sieges_end.t = 围攻终结
the_sieges_end.d = 在一场胜利的围城战之后， 我们面临着对被征服城市的抉择：要么烧毁并掠夺以获取即时利益， 但可能引发日后敌意;要么施以宽恕并维持秩序。 
ShowMercy = 施以宽恕
BurnAndLoot = 烧毁掠夺

military_expansion.t = 军事扩张
military_expansion.m = 将军队扩张到军队上限， 以增强你的国际地位， 有效投射力量， 维护文明利益。 
military_expansion.d = 通过达到军队上限， 我们可以有效投射力量、 捍卫利益， 同时军费开支和基地建设将刺激经济活动。 

the_capitals_transformation.t = 首都焕然一新
the_capitals_transformation.m = 在首都省份修建新建筑， 为其复兴和完善做出贡献。 
the_capitals_transformation.d = 我们的首都省份正处于重大转型的边缘， 新建筑即将为城市注入活力， 重塑其重要地位。 

sudden_death_of_advisor.t = 经济顾问突然离世
sudden_death_of_advisor.d = 一场悲剧袭击了我们领导层的核心， 我们的一位重要顾问不幸突然离世。 

maximizing_tax_efficiency.t = 最大化税收率
maximizing_tax_efficiency.m = 为优化我们的财政健康状况， 我们有机会提高各省份的税收率。 
maximizing_tax_efficiency.d = 是时候完善我们的省级征税方式了， 采用创新策略并提高效率可显著增加征税收入。 

advisors_research_breakthrough.t = 升级顾问研究等级
advisors_research_breakthrough.m = 提升一位顾问的级别， 以增强他推进我们文明进步的能力。 
advisors_research_breakthrough.d = 我们的一位顾问达到了非凡的技艺水平， 大幅推进了我们的研究工作。 
ResearchAcceleration = 加速研究
StrengthenOurLegacy = 强化我们的传统

prosperous_times.t = 繁荣时期
prosperous_times.d = 我们的文明目前正处于空前的繁荣时代。 这个黄金时期标志着经济蓬勃发展和贸易增长。 

boost_in_production_efficiency.t = 生产效率提升
boost_in_production_efficiency.d = 由于新的创新方法， 我们的经济效率得到了重大改善。 这一变革提高了生产力， 更好地利用了资源， 从而增强了整体经济实力。 

breakthrough_in_construction.t = 升级建筑等级
breakthrough_in_construction.d = 由于经济因素和建筑技术进步， 我们的文明进入了一个建筑成本降低的阶段。 

