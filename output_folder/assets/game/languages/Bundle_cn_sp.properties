crop_failure.t = 作物歉收
crop_failure.d = 一波作物歉收席卷全国， 造成大范围饥荒和粮食短缺。 粮食价格飙升了 {1}%

timber_rush.t = 木材热潮
timber_rush.d = 最近整个大陆的建筑热潮推高
了对木材的需求。 木材价格飙升了 {1}%

shifting_tastes.t = 口味变化
shifting_tastes.d = 新的烹饪趋势席卷了欧洲各地， 改变了人们对异国香料的需求。 香料的价格变化了{1}%

luxurious_furs.t = 奢华皮草
luxurious_furs.d = 时尚潮流推动了对奢华皮草的需求激增。 皮草的价格飙升了{1}%

largest_producer.t = 垄断
largest_producer.d = 您的文明已经成为众多宝贵资源的主要生产者！

tea_time.t = 下午茶时间
tea_time.d = 忘了乏味陈酒吧——每个人现在都在谈论来自东方的名茶！茶价格上涨了 {1}%

fish_are_everywhere.t = 到处都是鱼！
fish_are_everywhere.d = 附近水域发现了丰富的鱼类资源， 为您的渔民带来了丰收。 但鱼的价格跌了 {1}%

fishy_business.t = 可疑的事情
鱼都消失了！曾经充满生机的海洋里只剩下空空的渔网和饥饿的肚子。 价格飙升了{1}%。 是有一只巨大的海怪把它们全吞掉了？还是它们发现了我们的渔网？没人知道， 但有一件事是肯定的——必须弄清楚到底发生了什么！

booming_demand_for_beef.t = 牛肉需求激增
booming_demand_for_beef.d = 牛肉需求的激增使牛肉的价格飙升了{1}%。 这一增长的原因包括越来越多的人喜欢红肉， 以及利用牛肉的新的创新烹饪技术的发展等

exceptional_harvest.t = 水果丰收
exceptional_harvest.d = 阳光明媚， 和风细雨， 在这片土地上迎来了各种美味水果的丰收！从饱满的葡萄到多汁的浆果， 水果市场都爆满了。 于是水果的价格暴跌 {1}%

coffe_popularity.t = 咖啡流行
coffe_popularity.d = 这种来自异国的饮料突然大受欢迎， 导致咖啡价格飙升了{1}%

# Scenarios

1066Desc1 = 欧洲见证了诺曼人入侵英格兰， 而东方的帝国则分崩离析——拜占庭帝国衰落， 伊斯兰世界分裂， 蒙古帝国崛起。 

1440Desc1 = 在东方， 奥斯曼帝国投下了长长的阴影。 年轻的苏丹穆罕默德二世雄心勃勃， 梦想征服拜占庭帝国的明珠——濒临崩溃的君士坦丁堡。 
1440Desc2 = 在英吉利海峡两岸， 英格兰和法兰西之间维持着脆弱的和平， 两国都在舔舐着百年战争的伤口。 但和平的水面下暗流涌动， 冲突一触即发
1440Desc3 = 与此同时， 一个新世界的低语传到了冒险者的耳中。 关于已知地平线外一片没有战争和疾病所污染广阔土地的故事， 让他们的心中燃起了火焰

1618Desc1 = 在欧洲， 三十年战争即将爆发， 这是一场席卷欧洲大部分地区的毁灭性冲突。 战争始于神圣罗马帝国， 这是一个由哈布斯堡王朝皇帝名义上控制的国家、 公国和公国组成的松散联合体。 
1618Desc2 = 天主教和新教国家之间的气氛已经剑拔弩张， 1618年5月布拉格的掷出窗外事件——两名天主教官员被新教贵族从城堡窗口扔出， 这为一场漫长而血腥的战争拉开了帷幕。 
1618Desc3 = 在西方， 西班牙仍然是世界上最强大的帝国之一， 其领土横跨欧， 美， 亚三大洲
1618Desc4 = 在斯堪的纳维亚半岛， 瑞典在国王古斯塔夫·阿道夫的领导下崛起为一支主要军事力量。 瑞典军队纪律严明且富有创新精神， 瑞典很快将在三十年战争中成为重要角色。 
1618Desc5 = 在印度， 莫卧儿帝国在贾汉吉尔皇帝统治下达到巅峰， 正在经历着一个相对和平、 经济繁荣和显著文化成就的时期。 然而， 帝国面临内部挑战， 并且很快将面对影响力日益增长的欧洲。 

1836Desc1 = 世界日新月异。 欧洲正在从拿破仑战争中恢复过来， 而大国间维持着脆弱的和平
1836Desc2 = 工业化正在改变英国， 带来繁荣和社会挑战。 法国在路易-菲利普国王的统治下， 平衡着君主制和革命理想， 而德国和意大利正经历日益增长的民族主义运动

1936Desc1 = 世界正处于巨大变化和即将爆发冲突的边缘。 第一次世界大战的余波在欧洲留下了深深的伤痕， 促成了一段以政治动荡和经济萧条为特征的不稳定和平时期
1936Desc2 = 在德国， 阿道夫·希特勒和纳粹党巩固了权力， 将国家变成了法西斯独裁政权。 希特勒的侵略性扩张政策和对《凡尔赛条约》的公然无视日益明显， 为未来的冲突埋下了伏笔。 

WW1Desc1 = 欧洲由拥有庞大殖民地的殖民地帝国主导。 大英帝国在乔治五世的统治下遍布全球， 宣称其领地有着日不落的地位。 伦敦是商业、 文化和权力的中心， 但繁荣表面下却酝酿着紧张局势
WW1Desc2 = 由德皇威廉二世领导的德国是一个渴望更多影响力的工业强国， 其快速的军事扩张和咄咄逼人的外交政策交引起了邻国的不安， 特别是法国和英国
WW1Desc3 = 法国尚未从1870年的普法战争中恢复过来， 但仍决心夺回阿尔萨斯-洛林地区并对抗德国。 法兰西共和国是一个文化活跃而政治纷争不断的国家， 既要关注国内问题， 又要关心国外局势， 以确保法国的未来。 
WW1Desc4 = 在弗朗茨·约瑟夫皇帝的统治下， 奥匈帝国由多个民族拼凑而成， 而它努力保持着凝聚力。 但其境内的民族主义运动， 特别是在巴尔干半岛地区， 威胁着要将帝国分裂
WW1Desc5 = 在尼古拉二世的统治下， 俄罗斯幅员辽阔但难以管理， 正面临内部不满和现代化的压力。 1905年革命暴露了深刻的社会分裂， 沙皇的改革尝试停滞不前， 而且止于皮毛
WW1Desc6 = 在巴尔干半岛地区， 狂热的民族主义是一个火药桶。 曾经强大的奥斯曼帝国正走向衰落， 逐渐失去对其欧洲领土的控制， 并引发了塞尔维亚、 保加利亚和希腊等新兴国家之间的竞争

ModernDesc1 = 世界正努力应对一个经济复苏、 技术进步和地缘政治紧张局势的不断变化的局面。 

# Holy Roman Empire Reforms
CivilizationWithTheHighestRankWillWinNextElection = 排名最高的文明将赢得下次选举
ResultOfElections = 选举结果

PassReform = 通过改革
ReformPassed = 改革通过

ReformRequirements = 改革要求
ToPassReform = 为了通过这一项改革
ThisReformRequires  = 这项改革需要

Reform0 = 货币标准化
Reform0.d = 在神圣罗马帝国境内使用统一的货币， 促进贸易和经济一体化

Reform1 = 帝国基础设施
Reform1.d = 资助自由市和神圣罗马帝国境内各省份的基础设施开发项目， 提高发展和忠诚度

Reform2 = 内部争端解决
Reform2.d = 设立中央法院来解决神圣罗马帝国内部的冲突

Reform3 = 帝国权威
Reform3.d = 授予皇帝奖励

Reform4 = 经济合作
Reform4.d = 允许所有神圣罗马帝国成员间达成贸易协定， 增加内部收入

Reform5 = 度量衡标准化
Reform5.d = 在神圣罗马帝国内建立统一的度量衡系统， 提高生产效率

Reform6 = 帝国人口普查
Reform6.d = 在神圣罗马帝国内进行全面的人口普查， 提供有价值的人口和经济数据以供规划

Reform7 = 帝国议会
Reform7.d = 举办神圣罗马帝国成员定期会议以讨论政策

Reform8 = 帝国税收
Reform8.d = 允许皇帝向所有神圣罗马帝国成员征收少量税款用于帝国项目

Reform9 = 帝国档案馆
Reform9.d = 在皇帝所在的首都建造一个大型档案馆， 用于存放神圣罗马帝国的历史文献和记录

Reform10 = 神圣罗马帝国军事学院
Reform10.d = 建立一个中央军事学院， 用于培养神圣罗马帝国未来的军事人才

Reform11 = 贵族特权改革
Reform11.d = 重新分配权力， 减少贵族的自治权并集中权力

Reform12 = 帝国官僚制度
Reform12.d = 建立一个中央官僚机构以管理神圣罗马帝国， 提高行政效率

Reform13 = 帝国选举改革
Reform13.d = 改革皇帝的选举过程， 增加皇帝投票的权重和影响力， 这可能引发竞争

Reform14 = 神圣罗马帝国统一
Reform14.d = 在皇帝的统治下形成统一的神圣罗马帝国

anschluss.t = 德奥合并
anschluss.d = 德国人民渴望祖国的统一。 奥地利， 一个日耳曼民族国家， 是帝国的自然延伸。 凡尔赛条约可能禁止这种联合， 但这种限制已经过时。 我们是否应该向我们的奥地利兄弟伸出友谊之手， 并邀请他们重返帝国？

InitiateAnschluss = 发起德奥合并
PostponeDecision = 推迟决定
AbandonTheIdea = 放弃这个想法

the_austrian_question.t = 奥地利问题
the_austrian_question.d = 国家陷入混乱。 支持德奥合并的示威游行和反对的抗议在全国范围内爆发。 德意志国对统一施加的压力越来越大， 而国内的政治分歧则削弱了我们的决心。 奥地利正伫立在十字路口上。 

Autonomy = 自治

the_sudetenland_question.t = 苏台德问题
the_sudetenland_question.d = 苏台德地区是一个拥有大量德意志人口的地区， 是帝国战略利益的重要组成部分。 捷克斯洛伐克政府拒绝割让这一领土是赤裸裸的挑衅。 德国人民要求采取行动。 

Invade = 入侵

german_ultimatum.t = 德国最后通牒
german_ultimatum.d = 德意志国发出了严厉的最后通牒：将苏台德地区割让给德国， 否则面临入侵。 这个拥有大量德意志人口的战略区域， 已成为我们两国之间紧张局势的焦点。 摆在我们面前的决策是严峻的， 这将对整个欧洲大陆产生深远的影响。 

AcceptDemands = 接受要求

first_vienna_award.t = 第一次维也纳仲裁
first_vienna_award.d = 脆弱且不稳定的捷克斯洛伐克继续对区域和平稳定构成威胁。 随着苏台德地区现已归还给德意志国， 解决历史上对匈牙利造成的不公问题势在必行。 必须将拥有大量匈牙利人口的领土归还给祖国。 这是关乎一个国家荣誉和正义的问题。 

EnforceClaims = 执行要求

second_vienna_award.t = 第二次维也纳仲裁
second_vienna_award.d = 德意志国与意大利合作， 发布了一项关于匈牙利和罗马尼亚之间领土争端的新法令。 维也纳裁定将特兰西瓦尼亚的大部分地区授予匈牙利， 纠正了历史上不公正的结果。 罗马尼亚预计将遵守这一决定。 

second_vienna_award_rom.d = 轴心国向罗马尼亚发出最后通牒， 要求将北特兰西瓦尼亚割让给匈牙利王国。 此决定将对罗马尼亚的领土完整和民族自豪感产生深远影响。 

dissolution_of_czechoslovakia.t = 捷克斯洛伐克解体
dissolution_of_czechoslovakia.d = 脆弱而分裂的捷克斯洛伐克国家正成为一个负担。 随着捷克人和斯洛伐克人之间的紧张局势加剧， 重新塑造该地区的机会出现了。 作为欧洲的主导力量， 德国必须决定这些土地的命运。 

CreateProtectorates = 创建保护国
FullAnnexation = 完全吞并

decision_on_romanian_ultimatum.t = 对罗马尼亚王国的最后通牒决定
decision_on_romanian_ultimatum.d = 政治局正在讨论是否应该向罗马尼亚发出最后通牒， 要求其割让比萨拉比亚和北布科维纳。 这一决定将对苏联产生深远影响。 

soviet_ultimatum.t = 苏联的最后通牒
soviet_ultimatum.d = 苏联受最近胜利的鼓舞， 要求罗马尼亚王国作出领土让步。 随着苏联红军在边境集结， 罗马尼亚政府面临艰难的选择。 

AcceptUltimatum = 接受最后通牒

decision_on_polish_corridor.t = 针对波兰走廊的决定
decision_on_polish_corridor.d = 波兰走廊和但泽自由市的问题成为阻碍帝国的一个难题。 必须就如何继续进行作出决定。 

decision_on_polish_corridor_pol.t = 德意志国最后通牒
decision_on_polish_corridor_pol.d = 德意志国发出了最后通牒， 要求波兰归还但泽并在波兰走廊内拥有治外法权。 波兰政府面临关键决定。 

baltic_states.t = 波罗的海国家
baltic_states.d = 爱沙尼亚、 拉脱维亚和立陶宛这三个波罗的海国家呈现出一个战略机遇。 它们脆弱的政府和亲苏的人口为扩大苏联影响力提供了机会

MilitaryInvasion = 军事入侵
DiplomaticPressure = 外交压力
DiplomaticSolution = 外交解决方案

baltic_states_res.t = 苏联最后通牒
baltic_states_res.d = 苏联强烈要求立即且无条件地将其纳入苏联版图。 与此同时， 红军正在边境地区集结， 形势紧迫。 

soviet_invasion_of_poland.t = 苏联入侵波兰
soviet_invasion_of_poland.d = 红军趁德军入侵造成的混乱之际， 发动了对波兰的全面入侵。 苏联声称其行动是为了保护波兰境内的白俄罗斯和乌克兰人群体的利益。 

invasion_low_countries.t = 入侵低地国家
invasion_low_countries.d = 德国正密谋发动对荷兰、 比利时和卢森堡的侵略， 计划绕过坚不可摧的马奇诺防线， 以迅雷不及掩耳之势击溃法国。 

sino_japanese_war.t = 抗日战争
sino_japanese_war.d = 日本与中国军队在卢沟桥附近发生冲突， 两国之间的紧张关系进一步升级。 日本帝国陆军正考虑其接下来的行动。 

FullScaleInvasion = 全面入侵

decision_point.t = 决策点
decision_point.d = 随着日本帝国在太平洋地区的势力扩张野心日益显露， 与美国的紧张关系不断升温。 一个关键的抉择正摆在面前：是否在珍珠港对美国太平洋舰队发起致命一击， 这一决策的重要性不言而喻。 

AttackPearlHarbor = 偷袭珍珠港

barbarossa_decision.t = 巴巴罗萨行动
barbarossa_decision.d = 随着入侵苏联的宏大计划——巴巴罗萨行动的筹备工作已完成， 元首正站在历史的十字路口， 必须决定最佳的进攻时机和策略。 

byzantine_question.t = 拜占庭问题
byzantine_question.d = 拜占庭帝国的衰弱为奥斯曼帝国的扩张提供了诱人的契机。 君士坦丁堡的战略重要性不容置疑。 决策者必须迅速确定未来的行动计划。 

military_academy_upgrade_opportunity.t = 军事学院升级机会
military_academy_upgrade_opportunity.d = 军事战术和战略方面的最新突破为增强文明的军事能力带来了革命性的机遇。 通过投资升级军事学院， 您不仅能够加速武装力量的发展， 更能在未来的战场上占据先机。 

