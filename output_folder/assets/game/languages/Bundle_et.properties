# Scenarios

1066Desc1 = Euroopa nägi Normannide sissetungi Inglismaale, samal ajal kui impeeriumid idas lagunesid – Bütsants hääbus, Islam killustus ja Mongolid tõusid võimule.

1440Desc1 = Idas heidab Osmanite Impeerium oma pikka varju. Mehmed II, noor sultan, kelle silmis põleb ambitsioon, unistab Konstantinoopoli, Bütsantsi Impeeriumi pärli vallutamisest, mis on kokkuvarisemise äärel.
1440Desc2 = Üle Inglise kanali valitseb habras rahu Inglismaa ja Prantsusmaa vahel, kus mõlemad riigid kannatavad veel Saja-aastase sõja tagajärgede all. Kuid pinged varitsevad pindmises vaikuses ning konflikti söed võivad kergesti taas lõkkele puhkeda.
1440Desc3 = Samal ajal jõuavad seiklejate kõrvu kuulujutud uuest maailmast. Jutud suurtest maadest väljaspool tuntud horisonti, mida sõjad ja haigused ei ole puudutanud, sütitavad seiklejate südames tuld.

1618Desc1 = Euroopas oli algamas Kolmekümneaastane sõda, hävitav konflikt, mis haaraks suure osa mandrist. See algas Püha Rooma Keisririigis, vabalt seotud osariikide, hertsogkondade ja vürstkondade kogum, mida valitses peamiselt Habsburgide keiser.
1618Desc2 = Katoliku ja Protestantlike osariikide vahelised pinged olid jõudnud kriitilisse punkti, ning 1618. aasta mais toimunud Praha Defenestratsioon, kus kaks Katoliku ametnikku visati Protestantlike aadlike poolt lossi aknast välja, pani aluse pikaajalisele ja verisele sõjale.
1618Desc3 = Läänes oli Hispaania endiselt üks maailma võimsamaid impeeriume, mille alad ulatusid üle Euroopa, Ameerika ja Aasia.
1618Desc4 = Skandinaavias tõusis Rootsi kuningas Gustav II Adolfi all suureks sõjaliseks jõuks. Rootsi armee oli hästi distsiplineeritud ja uuenduslik, ning Rootsi sai varsti Kolmekümneaastases sõjas oluliseks tegijaks.
1618Desc5 = India Mughalite Impeerium oli oma hiilgeajas Keiser Jahangiri valitsemise all, perioodil, mida iseloomustasid suhteline rahu, majanduslik heaolu ja olulised kultuurisaavutused. Siiski seisis impeerium silmitsi sisemiste väljakutsetega ja sai peatselt kokku puutuma kasvava Euroopa mõjuga.

1836Desc1 = Maailm oli kiiresti muutumas. Euroopa oli toibumas Napoleoni sõdadest ning suurriigid säilitasid habrast rahu.
1836Desc2 = Industrialiseerumine oli Suurbritanniat muutmas, tuues nii heaolu kui ka sotsiaalseid väljakutseid. Prantsusmaa, kuningas Louis-Philippe'i valitsemise all, tasakaalustas monarhiat ja revolutsioonilisi ideaale, samal ajal kui Saksamaa ja Itaalia kogesid kasvavaid rahvuslikke liikumisi.

1936Desc1 = Maailm seisis monumentaalsete muutuste ja peatse konflikti äärel. Esimese maailmasõja tagajärjed olid jätnud sügavad armid üle kogu Euroopa, soodustades rahutut rahuperioodi, mida iseloomustasid poliitilised segadused ja majanduslik ebastabiilsus.
1936Desc2 = Saksamaal olid Adolf Hitler ja Natside partei võimu kindlustanud, muutes riigi fašistlikuks diktaaduriks. Hitleri agressiivne ekspansionistlik poliitika ja jultunud eiramine Versailles' lepingu suhtes muutusid üha ilmsemaks, pannes aluse tulevastele konfliktidele.

WW1Desc1 = Euroopas domineerisid suurriigid, kellel olid suured koloniaalimpeeriumid. Kuningas George V juhitud Briti Impeerium ulatus üle kogu maailma, kuulutades, et päike ei loojunud kunagi tema valduste kohal. London oli kaubanduse, kultuuri ja võimu keskus, kuid pinna all kerkisid pinged.
WW1Desc2 = Saksamaa, mida juhtis Keiser Wilhelm II, oli tööstuslik suurvõim, millel olid ambitsioonid suurema mõju saavutamiseks. Selle kiire sõjaline ülesehitus ja agressiivne diplomaatia tekitasid muret naaberriikides, eriti Prantsusmaal ja Suurbritannias.
WW1Desc3 = Prantsusmaa, mis toibus endiselt 1870. aasta Prantsuse–Preisi sõjast, oli otsustanud tagasi võtta Alsace'i ja Loraine'i ning tasakaalustada Saksamaa väge. Prantsuse Vabariik oli segu elavast kultuurist ja poliitilistest vaenudest, vaadates nii sissepoole kui ka välja, et tagada oma tulevik.
WW1Desc4 = Austraalia-Ungari Impeerium, etniliste rühmade mosaiik Keiser Franz Josephi all, võitles ühtsuse säilitamise nimel. Rahvuslikud liikumised selle piirides, eriti Balkanis, ohustasid selle lagunemist.
WW1Desc5 = Tsaar Nikolai II valitsev Venemaa oli suur ja kohmakas, maadeldes sisemiste eriarvamuste ja moderniseerimissurvega. 1905. aasta revolutsioon paljastas sügavad ühiskondlikud mõrad ning tsaari reformikatsed olid peatunud ja ebapiisavad.
WW1Desc6 = Balkanis oli rahvuslikul meelelastegusel põletav potentsiaal. Kunagi võimas Osmani Impeerium oli languses, kaotades oma haarde Euroopa territooriumidel ja tekitades rivaalitsemist tärkavate riikide, nagu Serbia, Bulgaaria ja Kreeka vahel.

ModernDesc1 = Maailm on silmitsi majanduse taastumise, tehnoloogilise arengu ja geopoliitiliste pingete muutuva maastikuga.

