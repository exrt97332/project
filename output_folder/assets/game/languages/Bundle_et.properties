# Manpower
Manpower0 = Inimressurss näitab tsivilisatsiooni sõjaväeteenistusse kõlblike isikute hulka.
Manpower1 = See on oluline ressurss uute vägede värbamiseks ja olemasolevate armeede täiendamiseks, kehastades tsivilisatsiooni võimet sõdida ja end kaitsta.
Manpower2 = Inimressurss täieneb aja jooksul, kajastades loomulikku rahvastiku kasvu ja taastumist eelmistest sõjalistest konfliktidest.
Manpower3 = Kuna inimressurss täieneb aja jooksul, peavad mängijad oma sõjalisi kampaaniaid planeerima, arvestades praegust ja tulevast inimressursi saadavust.

RegimnetsLimit0 = Rügementide piirarv sõltub tsivilisatsiooni majandusest ja tsivilisatsiooni boonustest.

xProvinceContribution = Provintsi Panus
ProvinceContribution0 = Iga tsivilisatsiooni kontrolli all olev provints panustab üldisesse inimressursi varusse.

IncreasingMaximumManpower = Maksimaalse Inimressursi Suurendamine
IncreasingMaximumManpower0 = Ehita Spetsiaalseid Sõjaväehooneid: Konkreetsete hoonete ehitamine tsivilisatsioonis saab otseselt suurendada inimressursi ülempiiri.
IncreasingMaximumManpower1 = Suurenda Inimressursi Taset Provintsides: Inimressursi taseme tõstmine üksikutes provintsides.

Legacy0 = Pärandipunktid on mängus eriline valuuta, mis esindab tsivilisatsiooni saavutusi ja verstaposte aja jooksul.
Legacy1 = Mängijad kasutavad pärandipunkte tsivilisatsiooni pärandite avamiseks, mis on püsivad boonused, mis pakuvad tsivilisatsioonile mitmesuguseid eeliseid.
Legacy2 = Lisaks tsivilisatsiooni pärandite avamisele on pärandipunktid vajalikud ka mitme kriitilise tegevuse jaoks mängus. Need hõlmavad: kindralite ja nõunike värbamist, maksutõhususe ja inimressursi suurendamist provintsides.

Income0 = Provintsi igakuine sissetulek mängus koosneb mitmest komponendist, sealhulgas maksutõhususest, provintsi üldisest majandusest, tootmistegevusest saadavast tulust ja provintsis asuvate konkreetsete hoonete tekitatud tulust.
Income1 = Igakuine sissetulek võib väheneda, kui tsivilisatsioonil ei ole provintsis tuumi või kui provints järgib tsivilisatsiooni omast erinevat religiooni.

TaxEfficiency0 = Igakuine maksutulu igast provintsist sõltub peamiselt kahest tegurist: provintsi maksutõhususe tasemest ja selle rahvaarvust.

Economy0 = Provintsi igakuine majanduslik tulu põhineb selle majandustasemel, mida saab tõsta kulda investeerides. Majandusse investeerimine parandab tootmistõhusust.
Economy1 = Maksimaalne majandustase sõltub provintsi kasvumäärast.

Production0 = Kui provintsis on ressurss, tekitab see tulu kahe teguri põhjal: ressursi unikaalse hinna ja provintsi tootmistõhususe põhjal. Unikaalne hind peegeldab ressursi haruldust.
Production1 = Mängijad saavad suurendada provintsi tootmistõhusust kas majandusse investeerides või ehitades spetsiaalseid hooneid, mis on mõeldud tootmistõhususe suurendamiseks.
Production2 = Tsivilisatsiooni boonus antakse tsivilisatsioonile, mis on konkreetse ressursi suurim tootja, andes majanduslikke, sõjalisi või strateegilisi eeliseid ja ergutades konkurentsi ressursitootmise ülemvõimu pärast.

Population0 = Provintsi rahvaarv mõjutab maksutulu, põhinedes selle maksutõhususel.
GrowthRate0 = Provintsi kasvumäär määrab selle rahvastiku kasvutempo. Lisaks mõjutab see provintsi maksimaalset majandust ja kohalikku inimressurssi.

Plague0 = Katkud võivad ootamatult alata igas provintsis. Juhuslikkus peegeldab haiguspuhangute ajaloolist ja realistlikku olemust.
Plague1 = Kui katk ilmub provintsi, levib see kiiresti naaberprovintsidesse. Katkusurmasid saab vähendada provintsi taristu täiustamise või spetsiaalsete hoonete ehitamisega.

Technology0 = Iga tehnoloogia tuleb uurimiskuluga ja tsivilisatsioonid saavad neid tehnoloogiaid avada uurimispunkte kogudes.
Technology1 = Uurimispunkte saab suurendada provintsides spetsiaalsete hoonete ehitamise või innovatsiooninõuniku palkamisega.

Advisor0 = Tsivilisatsioon saab nõukogus palgata nõunikke, kellest igaüks annab unikaalseid boonuseid, mida saab täiustada nõuniku edutamisega kõrgemale tasemele suurema efektiivsuse saavutamiseks.

Corruption0 = Iga tsivilisatsiooni mängus mõjutab baaskorruptsioonitase, mis toimib protsendilise vähendusena kogu provintsi tulule.
Corruption1 = Tsivilisatsioonil on võimalus korruptsiooniga võidelda, täiustades oma tsivilisatsioonis ülemkohtu taset.

# Events
capital_city_economic_development.t = Pealinna Majanduslik Areng
capital_city_economic_development.d = Teie pealinna majanduslik tulevik on tasakaalus. Kas suunate ressursse majanduskasvu edendamiseks või säilitate status quo?
InvestInCapitalGrowth = Investeeri Pealinna Kasvu
MaintainStatusQuo = Säilita Status Quo

Excellent = Suurepärane!


economys_golden_milestone.t = Majanduse Kuldne Verstapost
economys_golden_milestone.m = Elusta oma tsivilisatsiooni majandus strateegiliste investeeringutega, et jõuda uude õitsengu ajastusse.
economys_golden_milestone.d = Strateegiliselt võtmesektoritesse investeerides olete edukalt elavdanud oma tsivilisatsiooni majandust.
GoodNews = Head Uudised!
EconomicTriumph = Majanduslik Triumf!

rising_cost_of_construction.t = Ehituskulude Tõus
rising_cost_of_construction.d = Oskustööliste ja käsitööliste puudus koos sõdade ja haiguste mõjuga põhjustab ehituskulude tõusu.
OfferSubsidiesForConstruction = Paku Ehitustoetusi

military_mobilization_crisis.t = Sõjaväe Mobilisatsioonikriis
military_mobilization_crisis.d = Suureneva piirkondliku pinge ja potentsiaalsete ohtude tõttu on tungiv vajadus relvajõude tugevdada. Siiski põhjustab see äkiline nõudlus suurema sõjaväe järele rahva seas vastuolusid ja rahutusi.

MaintainCurrentRecruitmentStrategy = Säilita Praegune Värbamisstrateegia
CallToArms = Kutse Relvile!

the_council_of_many.t = Paljude Nõukogu
the_council_of_many.m = Värba nõustajaid, et aja jooksul luua teadmiste ja kogemuste poolest rikas nõukogu..
the_council_of_many.d = Teie tsivilisatsioonis on märgatavalt suurenenud nõukogus töötanud nõunike arv, luues võimaluse edutada meie nõunikke veelgi kõrgematele oskustasemetele.
GreatNews = Suurepärased Uudised!

remarkable_talent.t = Silmapaistev Talent - Haldusnõunik
remarkable_talent2.t = Silmapaistev Talent - Majandusnõunik
remarkable_talent3.t = Silmapaistev Talent - Innovatsiooninõunik
remarkable_talent4.t = Silmapaistev Talent - Sõjanõunik
remarkable_talent.d = Meie nõukogus on toimunud märkimisväärne areng. Meie nõunik, kes on tuntud oma erakordsete oskuste ja uuenduslike meetodite poolest, on saavutanud ootusi ületava oskustaseme.
LaunchAmbitiousReforms = Käivita Ambitsioonikad Reformid

an_unprecedented_harvest.t = Enneolematu Saak
an_unprecedented_harvest.d = Sel aastal on meie maad tunnistajaks enneolematule saagile. Meie põllud on andnud meile uskumatu koguse saaki, rohkem kui kunagi varem oodatud, täites kõik meie hoiuruumid ääreni.

age_of_craftsmanship.t = Käsitöö Ajastu
age_of_craftsmanship.d = Meie tsivilisatsioon kogeb käsitöö kuldaega, kus oskustöölised loovad erakordseid kaupu, mis tõstavad meie kultuurilist prestiiži.
RemarkableAchievement = Märkimisväärne Saavutus!


gold_surplus_dilemma.t = Kullaülejäägi Dilemma
gold_surplus_dilemma.d = Meie tsivilisatsioonis on tekkinud haruldane ja märkimisväärne olukord, meie riigikassa on kulda täis, ületades selle maksimaalse mahutavuse. See ootamatu rikkuse ülejääk on tunnistus meie õitsvast majandusest ja tõhusast valitsemisest.
StoreAndSecure = Hoiusta ja Kindlusta

invest_in_the_capital.t = Investeeri Pealinna
invest_in_the_capital.d = Meie kapitali õitseng on meie tsivilisatsiooni tugevuse ja mõju seisukohalt ülioluline. Tunnistades selle potentsiaali, seisame nüüd olulise otsuse ees investeerida selle majanduskasvu ja infrastruktuuri.
LimitedInvestment = Piiratud Investeering
MaintainCurrentCourse = Säilita Praegune Kurss

the_great_city_fire.t = Suur Linnapõleng
the_great_city_fire.d = Laastav tulekahju on levinud läbi linna osade, ohustades selle elanikke ja ajaloolisi hooneid, mis sümboliseerivad meie minevikku.
AcceptTheInevitable = Lepi Paratamatusega

expanding_the_battle_front.t = Lahingurinne Laieneb
expanding_the_battle_front.d = Meie sõjaväe strateegid on teinud murrangulise saavutuse, laiendades meie armee lahingulaiust märkimisväärselt. See tähistab uut ajastut meie sõjalistes võimetes, märkides nihkumist keerukamate ja võimsamate lahingformeeringute poole.
Excellent = Suurepärane

reformation_of_the_army.t = Armee Reformatsioon
reformation_of_the_army.d = Meie tsivilisatsioon on olulise sõjaväelise ümberkujundamise lävel. On saabunud aeg reformida meie armeed, liikudes traditsioonilistelt meetoditelt kaasaegsema taktika ja organisatsiooni poole.
reformation_of_the_army.m = Täiusta oma Sõjaväeakadeemiat, näidates pühendumust arenenud sõjaväelisele väljaõppele ja strateegiale.

army_expansion.t = Armee Laienemine
army_expansion.d = Selle suure armee moodustamine toob meie rahvale uhkuse- ja turvatunde, tugevdades üldist rahvuslikku moraali ja ühtsust.

famous_vintage.t = Kuulus Veinivaru
famous_vintage.d = Meie tuntud veinipiirkonnast pärit hiljutine veinivaru, mida eksperdid on kiitnud erakordse kvaliteedi eest, on rõõmustanud meie kodanikke ja tõstnud meie mainet peenete veinide tootjana.
AToastToOurLands = Toost Meie Maadele!

rich_harvest.t = Rikkalik Saak
rich_harvest.d = Sel hooajal kogevad meie talud erakordset saaki. Põllukultuuride rohkus mitte ainult ei taga piisavalt toitu meie rahvale, vaid ka märkimisväärselt tõstab meie rahvastiku kasvutempot.

clothing_revolution.t = Rõivastuse Revolutsioon
clothing_revolution.d = Hiljutine tõus meie tsivilisatsioonis toodetud rõivaste kvaliteedis on ootamatult ja tulusalt suurendanud meie kasumit.

agricultural_breakthrough.t = Põllumajanduslik Läbimurre
agricultural_breakthrough.d = Märkimisväärse edusammuna oleme edukalt revolutsioneerinud põllumajandust kõigis meie provintsides.
ExpandMilitaryForces = Laienda Sõjajõude
BoostPopulationGrowth = Suurenda Rahvastiku Kasvu

gold_rush.t = Kullapalavik
gold_rush.d = Meie kaevurid on avastanud suure kullamaardla, märkimisväärselt suurendades meie riigikassat.

quality_furniture.t = Kvaliteetne Mööbel
quality_furniture.d = Meie mööblitootmine on hiljuti näinud märkimisväärset kvaliteedihüpet. Käsitöölised ja puusepad on ületanud iseend, valmistades esemeid, mis ühendavad funktsionaalsuse erakordse kunstilisusega.

fruit_mania.t = Puuviljamaania
fruit_mania.d = Ootamatu sündmusena on meie tsivilisatsioon avastanud müstilise puuviljade sordi, millel kuuldavasti on unikaalsed omadused nagu erakordne maitse ja ebatavalised suurused, tekitades laialdast elevust ja meelitades inimesi kõikjalt seda märkimisväärset leidu tunnistama.

beer_production_soars.t = Õlletootmine Tõuseb
beer_production_soars.d = Murrangulised uuendused õllepruulimise tehnikas on revolutsioneerinud meie õlletootmist, viies ootamatu ja märkimisväärse toodangu suurenemiseni.

the_sieges_end.t = Piiramise Lõpp
the_sieges_end.d = Pärast võidukat piiramist seisame valiku ees vallutatud linna jaoks: kas põletada ja rüüstata see kohese kasu nimel, riskides tulevase vaenulikkusega, või näidata halastust ja säilitada kord.
ShowMercy = Näita Halastust
BurnAndLoot = Põleta ja Rüüsta

military_expansion.t = Sõjaväe Laienemine
military_expansion.m = Suurenda relvajõude rügementide piirini, et tugevdada oma rahvusvahelist positsiooni ja tõhusalt projekteerida võimu, kindlustades oma tsivilisatsiooni huvid.
military_expansion.d = Jõudes oma rügementide piirini, saame tõhusalt projekteerida võimu, kaitsta oma huve ja stimuleerida majanduslikku tegevust läbi sõjaliste kulutuste ja arengu.

the_capitals_transformation.t = Pealinna Ümberkujundamine
the_capitals_transformation.m = Ehita uusi hooneid pealinna provintsis, et panustada selle taaselavdamisse ja parendamisse.
the_capitals_transformation.d = Meie pealinna provints on olulise ümberkujundamise lävel, kus uued hooned hakkavad linna elavdama ja tugevdama selle tähtsust.

sudden_death_of_advisor.t = Majandusnõuniku Ootamatu Surm
sudden_death_of_advisor.d = Tragöödia tabab meie juhtkonna südant, kui üks meie võtmenõunikest ootamatult lahkub.

maximizing_tax_efficiency.t = Maksutõhususe Maksimeerimine
maximizing_tax_efficiency.m = Püüdes optimeerida meie finantstervist, seisame silmitsi võimalusega suurendada maksutõhusust meie provintsides.
maximizing_tax_efficiency.d = On aeg täiustada meie provintsiaalmaksustamise lähenemist, kus uuenduslike strateegiate rakendamine ja tõhususe parandamine võib märkimisväärselt suurendada meie maksutulu.

advisors_research_breakthrough.t = Nõuniku Teadusuuringu Läbimurre
advisors_research_breakthrough.m = Eduta nõunikku, et suurendada tema mõju meie tsivilisatsiooni arengule.
advisors_research_breakthrough.d = Üks meie nõunikest on saavutanud märkimisväärse oskustaseme, oluliselt tõstes meie teadusuuringuid.
ResearchAcceleration = Teadusuuringu Kiirendamine
StrengthenOurLegacy = Tugevda Meie Pärandit

prosperous_times.t = Õitsvad Ajad
prosperous_times.d = Meie tsivilisatsioon kogeb praegu enneolematut õitsenguaega. Seda Kuldaega iseloomustab õitsev majandus ja suurenenud kaubandus.

boost_in_production_efficiency.t = Tõus Tootmistõhususes
boost_in_production_efficiency.d = Meie majandus kogeb suurt tõhususe paranemist tänu uutele, uuenduslikele meetoditele. See muutus suurendab meie tootlikkust ja kasutab ressursse paremini, mis tugevdab meie üldist majanduslikku tervist.

breakthrough_in_construction.t = Läbimurre Ehituses
breakthrough_in_construction.d = Meie tsivilisatsioon on sisenenud faasi, kus ehituskulud on ootamatult langenud, tänu majanduslikele teguritele ja edusammudele ehitustehnoloogias.

