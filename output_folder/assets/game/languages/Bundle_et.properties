soviet_invasion_of_poland.d = Punaarmee on alustanud täiemahulist sissetungi Poolasse, kasutades ära Saksa sissetungiga tekitatud kaost. Nõukogude Liit väidab, et tegutseb Poolas elavate valgevene ja ukraina rahvaste huvides.

