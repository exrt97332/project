anschluss.t = Anšluss
anschluss.d = Saksa rahvas ihkab Isamaa taasühendamist. Austria, germaani rahvas, on Reichi loomulik jätk. Versailles' leping võib seda ühinemist keelata, kuid selliste piirangute aeg on möödas. Kas me ulatame oma Austria vendadele sõbraliku käe ja pakume neile kohta Saksa Reichi koosseisus?

