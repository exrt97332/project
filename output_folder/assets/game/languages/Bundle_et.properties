fishy_business.d =  Kalad on kadunud! Tühjad võrgud ja näljased kõhud on kõik, mis on jäänud sinna, kus meri kunagi kihas elust. Hinnad tõusevad {1}%. Kas hiiglaslik meremadu sõi nad kõik ära? Või said nad meie võrkudest targemaks? Keegi ei tea, kuid üks asi on kindel – tuleb välja uurida, mis toimub!

