soviet_ultimatum.d = Hiljutiste võitude poolt julgustatud Nõukogude Liit nõuab Rumeenialt territoriaalseid järeleandmisi. Kuna Punaarmee koguneb piirile, seisab Rumeenia valitsus raske valiku ees.

