dissolution_of_czechoslovakia.d = Nõrk ja lõhestatud Tšehhoslovakkia riik on osutunud koormaks. Tšehhide ja slovakkide vaheliste pingete tõusuga avaneb võimalus piirkonna ümberkujundamiseks. Saksamaa, kui Euroopa domineeriv jõud, peab otsustama nende maade saatuse üle.

