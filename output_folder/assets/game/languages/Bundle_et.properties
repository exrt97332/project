decision_on_romanian_ultimatum.d = Poliitbüroo arutab ultimaatiumi esitamist Rumeeniale, nõudes Bessaraabia ja Põhja-Bukoviina loovutamist. See otsus toob kaugeleulatuvad tagajärjed Nõukogude Liidule.

