the_austrian_question.t = Austria Küsimus
the_austrian_question.d = Riik on segaduses. Üle kogu riigi on puhkenud Anšlussi-poolsed meeleavaldused ja vastuprotestid. Saksa Reich avaldab üha suuremat survet ühinemise nimel, samas kui sisepoliitilised lahkarvamused nõrgestavad meie otsustavust. Austria seisab teelahkmel.

Autonomy = Autonoomia

the_sudetenland_question.t = Sudeedimaa Küsimus
the_sudetenland_question.d = Sudeedimaa, piirkond, kus elab suur Saksa rahvus, on Reichi strateegiliste huvide jaoks oluline osa. Tšehhi valitsuse keeldumine seda territooriumi loovutada on otsene provokatsioon. Saksamaa rahvas nõuab tegutsemist.

Invade = Alusta Sissetung

german_ultimatum.t = Saksa Ultimaatum
german_ultimatum.d = Saksa Reich on esitanud range ultimaatiumi: loovutage Sudeedimaa Saksamaale või seisake silmitsi sissetungiga. See strateegiline piirkond, kus elab suur Saksa rahvus, on saanud meie rahvaste vahelise pingete keskpunktiks. Meie ees seisev otsus on tõsine ja sellel on kaugeleulatuvad tagajärjed kogu mandrile.

AcceptDemands = Aktsepteeri nõudmistega

first_vienna_award.t = Esimene Viini Auhind
first_vienna_award.d = Nõrk ja ebastabiilne Tšehhoslovakkia riik ohustab jätkuvalt piirkondlikku stabiilsust. Kuna Sudeedimaa on nüüd õiglaselt tagastatud Saksa Reichile, on hädavajalik tegeleda Ungarile tekitatud ajaloolise ebaõiglusega. Märkimisväärse ungari elanikkonnaga asustatud territooriumid tuleb taastada Isamaa koosseisus. See on rahvusliku au ja õigluse küsimus.

EnforceClaims = Kehtesta nõudeid

second_vienna_award.t = Teine Viini Auhind
second_vienna_award.d = Saksa Reich, koostöös Itaaliaga, on andnud uue määruse Ungari ja Rumeenia territooriumivaidluste kohta. Viini auhind annab olulised osad Transilvaaniast Ungarile, parandades ajaloolisi ülekohti. Eeldatakse, et Rumeenia järgib seda otsust.

second_vienna_award_rom.d = us toob kaasa sügavad tagajärjed Rumeenia territoriaalsele terviklikkusele ja rahvuslikule uhkusele.

