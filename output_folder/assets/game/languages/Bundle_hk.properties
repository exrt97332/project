DDemocracy = 由公共機構治理的國家，而非單一統治者，代表整體人口。
DMonarchy = 權力由單一君主掌握，作為國家核心權威。
DCommunism = 社會以共享所有權為基礎，國家以平等名義管理資源。
DFascism = 高度集中於強大領袖的統治，帶有嚴格控制與強烈民族主義。
DRepublic = 領導不基於王權，官員由人民選出以代表公眾。
DHorde = 由戰爭領袖統一的遊牧部落聯盟。
DRebels = 反抗現有政權、試圖推翻統治的力量。
DTribal = 由地方首領領導的鬆散部落結構，沒有強中央政府。
DConstitutionalMonarchy = 王權與憲政機構共同分享權力。
DCityState = 獨立運作的城市，擁有自己的政府。
DNationalSocialism = 以強權統治與極端民族主義為核心的全面國家控制。
DPresidentialRepublic = 權力集中於共和制下的國家元首。
DMerchantRepublic = 由富商與商業精英掌控的政體。
DParliamentaryRepublic = 由代表國家的議會主導治理。
DTheocracy = 由宗教領袖掌權，國家以信仰為中心。
DDictatorship = 所有權力集中於單一統治者，擁有無限制權力。
DDaimyo = 地方大名在更大的封建體系下統治各自領地。
DBananaRepublic = 受強大精英與外部勢力影響的不穩定體制。
DConfederation = 獨立國家鬆散合作並保留大部分自主權。
DFederation = 由多個部分組成的統一國家體系。
DCaliphate = 由哈里發統治，結合宗教與國家權力。

