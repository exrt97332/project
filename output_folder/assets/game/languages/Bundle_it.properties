Challenge3 = Sali al potere e dimostra il tuo valore formando una nuova Civiltà.
Challenge4 = Unisci le terre sotto il tuo dominio e completa la sfida.
Challenge5 = Guida il tuo popolo verso la grandezza e realizza la formazione di una nuova Civiltà.
Challenge6 = Rafforza il tuo dominio e completa il percorso verso una nuova Civiltà.
Challenge7 = Domina la regione e conquista il tuo posto formando una nuova Civiltà.
Challenge8 = Prendi il controllo della regione e assicurati la tua eredità.
Challenge9 = Supera i tuoi rivali e completa la sfida.
Challenge10 = Porta la tua Civiltà alla dominazione e completa la sfida.
Challenge11 = Controlla le regioni chiave e compi il tuo destino.
Challenge12 = Supera tutti gli ostacoli e sali per formare una nuova Civiltà.
Challenge13 = Raggiungi la grandezza e forma un potente impero.

DDemocracy = Uno Stato governato da istituzioni pubbliche piuttosto che da un singolo sovrano, rappresentando l’intera popolazione.
DMonarchy = Il potere è detenuto da un unico sovrano, che costituisce l’autorità centrale dello Stato.
DCommunism = La società è organizzata attorno alla proprietà condivisa, con lo Stato che gestisce le risorse in nome dell’uguaglianza.
DFascism = Governo altamente centralizzato sotto un forte leader, con controllo rigoroso e intenso nazionalismo.
DRepublic = Il potere non si basa sulla monarchia, i funzionari sono scelti per rappresentare il pubblico.
DHorde = Una confederazione nomade di tribù unite sotto un capo di guerra, spesso legata alla vita nomade.
DRebels = Una forza ribelle che si solleva contro l’autorità esistente, cercando di rovesciarla.
DTribal = Una struttura flessibile di clan o gruppi guidati da capi locali, senza uno Stato centrale forte.
DConstitutionalMonarchy = Il potere è condiviso tra un monarca e istituzioni statali consolidate.
DCityState = Città indipendente che funziona come un proprio Stato.
DNationalSocialism = Controllo totale dello Stato basato su un’autorità rigorosa e un’ideologia nazionalista estrema.
DPresidentialRepublic = L’autorità centrale risiede in un singolo capo di Stato all’interno di un sistema repubblicano.
DMerchantRepublic = Il controllo è nelle mani di ricchi mercanti ed élite commerciali.
DParliamentaryRepublic = Il governo è guidato da un’assemblea che rappresenta lo Stato.
DTheocracy = I leader religiosi detengono l’autorità, con lo Stato basato sulla fede.
DDictatorship = Tutto il potere è concentrato in un unico leader senza limiti.
DDaimyo = Signori della guerra locali governano i propri domini all’interno di un sistema feudale più ampio.
DBananaRepublic = Un sistema instabile plasmato da élite potenti e influenze esterne.
DConfederation = Stati indipendenti cooperano in modo flessibile mantenendo la maggior parte della loro autonomia.
DFederation = Uno Stato unificato formato da più parti sotto un unico sistema.
DCaliphate = Il potere è detenuto da un Califfo, combinando autorità religiosa e statale.

Emirate = Emirato
Caliphate = Califfato
Sultanate = Sultanato

ProvinceBorderThickness = Spessore dei confini delle province

PopulationTransfer = Trasferimento della popolazione
PopulationTransferDesc = Una nazionalità selezionata sarà costretta a lasciare questa Civiltà e a trasferirsi in altre Civiltà. La sua popolazione diminuirà, ma i disordini aumenteranno e l’economia ne soffrirà.
PopulationTransferChooseNationality = Scegli una nazionalità da trasferire.
PopulationTransferNationality2 = Seleziona una nazionalità. Le persone di questa nazionalità lasceranno lentamente le tue province.
PopulationTransferStatus = Il trasferimento della popolazione è attivo. Le persone stanno lasciando la tua Civiltà.
StopMigration = Ferma la migrazione
PopulationTransferStartDesc = Seleziona questa nazionalità per iniziare il trasferimento della popolazione.
OngoingMigrations = Migrazioni in corso
AvailableNationalities = Nazionalità disponibili
MigrationCompleted = Migrazione completata

