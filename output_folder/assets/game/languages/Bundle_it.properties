ArmyReinforcementCost = Costo di rinforzo dell'esercito
ReinforceCostEncy0 = Il costo per rinforzare un esercito è determinato dal costo base dei reggimenti.
ReinforceCostEncy = Il costo per rinforzare un esercito dipende dal costo base dei reggimenti ed è calcolato moltiplicando la percentuale delle unità rinforzate per il modificatore di costo.

Review0 = Ti è piaciuto il gioco? Mostra il tuo supporto con una recensione positiva! Grazie!

