Battles = Battaglie

DeploymentPhase = Fase di Dispiegamento
DeploymentPhase0 = Due Eserciti, uno attaccante e l'altro difensore, si affrontano sul campo di battaglia.
DeploymentPhase1 = Ogni Esercito è organizzato in due Linee.
DeploymentPhase2 = Il numero dei Reggimenti che ogni fazione può collocare è determinato dall'Ampiezza Battaglia, la quale dipende dall'Ampiezza Battaglia più grande tra le Civiltà coinvolte.

RoleOfGenerals = Ruolo dei Generali

RoleOfGenerals0 = I Generali sono Determinanti in una Battaglia. Il loro valore d'Attacco, cruciale per aumentare le perdite nemiche, è influenzato da un meccanismo a tiro di dadi.
RoleOfGenerals1 = Il valore di difesa di un Generale, importante nel ridurre le proprie perdite, è complementare alla sua capacità d'Attacco ed è d'importanza strategica.

BattlePhase = Fase di Battaglia

BattlePhase0 = Ogni Giorno, le Unità della Linea di Fronte di entrambi gli Eserciti ingaggiano in un combattimento tra di loro, ammesso che si trovino all'interno del Raggio d'Azione.
BattlePhase1 = Contemporaneamente, le unità in Seconda Linea attaccano anch'esse la Linea di Fronte del nemico se ricadono all'interno del Raggio d'Azione.
BattlePhase2 = Il combattimento provoca vittime, la ritirata delle truppe, e la perdita di morale.

MoraleAndRetreatMechanics = Morale e Meccaniche di Ritirata
MoraleAndRetreatMechanics0 = Il Morale gioca un ruolo cruciale nelle dinamiche di battaglia. Se le Unità vengono danneggiate e le perdite aumentano, il Morale può calare.
MoraleAndRetreatMechanics1 = Le Unità potrebbero ritirarsi a causa di pesanti perdite o Morale basso, influenzando la forza e l'efficacia complessiva dell'Esercito.

DestructionOrSurvival = Distruzione o Sopravvivenza
DestructionOrSurvival0 = Un Esercito è considerato distrutto se non è in grado di sostentarsi per tutti i {0} giorni di battaglia. Ciò potrebbe dipendere da eccessive perdite, calo del Morale, o una ritirata strategica.

ArmyComposition = Composizione dell'Esercito
ArmyComposition0 = La scelta delle Unità in Prima e Seconda Linea è d'importanza vitale. Le Unità in Prima Linea devono essere resilienti e capaci di gestire un combattimento diretto, mentre le Unità in Seconda Linea devono fornire supporto, attacchi a distanza, o funzioni specializzate.

# Manpower
Manpower0 = Il Potenziale Militare rappresenta la fetta d'individui idonea al servizio militare all'interno di una Civiltà.
Manpower1 = È una risorsa critica utilizzata per reclutare nuove truppe e rinforzare gli Eserciti esistenti, incorporando la capacità della Civiltà di muovere guerra e difendersi.
Manpower2 = Il Potenziale Militare si ristora nel tempo, riflettendo una crescita naturale della popolazione e il recupero dalle attività militari passate.
Manpower3 = Siccome il Potenziale Militare si ristora nel tempo, i giocatori devono pianificare le loro campagne militari considerando la loro disponibilità di Potenziale Militare presente e futura.

RegimnetsLimit0 = Il Limite di Reggimenti è determinato dall'Economia e dai Bonus della Civiltà.

ProvinceContribution = Contributo della Provincia
ProvinceContribution0 = Ogni Provincia sotto il controllo di una Civiltà contribuisce al totale del Potenziale Militare.

IncreasingMaximumManpower = Aumentare il Potenziale Militare massima
IncreasingMaximumManpower0 = Costruisci Edifici Militari speciali: costruire Edifici specifici all'interno della tua Civiltà può direttamente alzare la soglia limite di Potenziale Militare.
IncreasingMaximumManpower1 = Aumenta il livello di Potenziale Militare nelle province: migliorare il livello di Potenziale Militare all'interno delle singole province.

Legacy0 = I Punti Eredità sono una forma speciale di valuta nel gioco, rappresentano gli obiettivi e i traguardi raggiunti da una Civiltà nel tempo.
Legacy1 = I giocatori utilizzano Punti Eredità per sbloccare le Eredità della Civiltà, bonus permanenti che forniscono diversi vantaggi alla Civiltà.
Legacy2 = Oltre a sbloccare le Eredità della Civiltà, i Punti Eredità sono richiesti anche per svariate azioni importanti nel corso della partita. Queste includono: reclutare Generali e Consiglieri, aumentare l'Efficienza della Tassazione e il Potenziale Militare nelle Province.

Income0 = Il Reddito Mensile Provinciale nel gioco è dato dalla somma di diverse componenti incluse l'Efficienza della Tassazione, l'Economia generale della Provincia, ricavi provenienti da attività produttive, e Reddito generato da specifici Edifici all'interno della Provincia.
Income1 = Il Reddito Mensile potrebbe ridursi se una Civiltà non ha un Nucleo nella Provincia, o se la Provincia segue una Religione differente da quella della Civiltà.

TaxEfficiency0 = Il Reddito Mensile Da Tassazione generato da ogni Provincia è determinato principalmente da due fattori: il Livello di Efficienza della Tassazione nella Provincia e il suo numero di abitanti.

Economy0 = Il Reddito Mensile dall'Economia di una Provincia è basato sul suo livello economico, che può essere aumentato investendo Oro. Investire nell'Economia migliora l'efficienza nella produzione.
Economy1 = Il Livello Massimo di Economia è dato dal Tasso di Crescita della Provincia.

Production0 = Se una Provincia dispone di una Risorsa, genererà Reddito in base a due fattori: il Prezzo Unico della Risorsa e l'Efficienza di Produzione all'interno della Provincia. Il Prezzo Unico riflette la rarità della Risorsa.
Production1 = I giocatori possono aumentare l'Efficienza di Produzione di una Provincia investendo nella sua Economia o costruendo Edifici speciali che sono specificamente designati per far crescere l'Efficienza di Produzione.
Production2 = Un Bonus Civiltà viene assegnato alla Civiltà che è il maggior produttore di una determinata Risorsa, garantendo vantaggi economici, militari, o strategici e incoraggiando la competizione per la supremazia nella produzione della Risorsa.

Population0 = La Popolazione di una Provincia influenza il Reddito Da Tassazione, in base alla sua Efficienza della Tassazione.
GrowthRate0 = Il Tasso di Crescita di una Provincia determina il Tasso di Crescita della sua Popolazione. In aggiunta influenza l'Economia massima raggiungibile nella Provincia e la sua Potenziale Militare Locale.

Plague0 = Le Epidemie possono iniziare all'improvviso in qualunque Provincia. La casualità riflette la natura storica e realistica dello scoppio delle Epidemie.
Plague1 = Quando un'Epidemia compare in una Provincia, essa si diffonde rapidamente sulle Province limitrofe. Le morti da Epidemia possono essere ridotte potenziando le Infrastrutture di una Provincia o costruendo Edifici speciali.

Technology0 = Ogni Tecnologia presenta un Costo della Ricerca, e le Civiltà possono sbloccare queste Tecnologie accumulando Punti Ricerca.
Technology1 = I Punti Ricerca possono essere aumentati costruendo Edifici speciali nelle Province o assumendo un Consigliere per L'Innovazione.

Advisor0 = La Civiltà può assumere Consiglieri in un Consiglio, ognuno di essi fornisce Bonus unici che possono essere potenziati promuovendo il Consigliere a un livello più alto per aumentarne l'efficacia.

Corruption0 = Ogni Civiltà nel gioco è affetta da un livello base di Corruzione, il quale agisce come percentuale di riduzione su tutto il Reddito Provinciale.
Corruption1 = Le Civiltà possono combattere la Corruzione aumentando il Livello della Corte Suprema nella loro Civiltà.

# Events
capital_city_economic_development.t = Sviluppo Economico della Capitale
capital_city_economic_development.d = Il futuro economico della tua Capitale pende sulla bilancia. Dedicherai risorse alla crescita economica, o manterrai lo status quo?
InvestInCapitalGrowth = Investi nella crescita della Capitale
MaintainStatusQuo = Mantieni lo Status Quo

Excellent = Eccellente!


economys_golden_milestone.t = Traguardo d'Oro dell'Economia
economys_golden_milestone.m = Rivitalizza l'Economia della tua Civiltà con investimenti strategici per raggiungere una nuova era di prosperità.
economys_golden_milestone.d = Investendo strategicamente in settori chiave, hai rivitalizzato con successo l'Economia della tua Civiltà.
GoodNews = Buone Notizie!
EconomicTriumph = Trionfo Economico!

rising_cost_of_construction.t = Costo di Costruzione in Aumento
rising_cost_of_construction.d = La mancanza di lavoratori e artigiani professionisti esperti, combinata con gli effetti di guerre e epidemie, porta a un aumento nel Costo di Costruzione.
OfferSubsidiesForConstruction = Offri Sussidi per la Costruzione

military_mobilization_crisis.t = Crisi di Mobilizzazione Militare
military_mobilization_crisis.d = A causa di tensioni regionali e potenziali minacce in aumento, vi è un urgente bisogno di potenziare le forze armate. Tuttavia, questa necessità improvvisa di un maggior esercito sta causando controversie e dissenso nella popolazione.

MaintainCurrentRecruitmentStrategy = Mantieni la corrente strategia di Reclutamento
CallToArms = Chiamata Alle Armi!

the_council_of_many.t = Il Consiglio Dei Molti
the_council_of_many.m = Assumi Consiglieri per costruire nel tempo un Consiglio ricco di conoscenze ed esperienza.
the_council_of_many.d = La tua Civiltà ha visto un aumento significativo nel numero di Consiglieri che hanno lavorato nel Consiglio, creando un'opportunità per promuovere i nostri Consiglieri a livelli più alti di competenza.
GreatNews = Grandi Notizie!

remarkable_talent.t = Un Talento Notevole - Consigliere Amministrativo
remarkable_talent2.t = Un Talento Notevole - Consigliere per L'Economia
remarkable_talent3.t = Un Talento Notevole - Consigliere per L'Innovazione
remarkable_talent4.t = Un Talento Notevole - Consigliere Militare
remarkable_talent.d = Nel nostro Consiglio c'è stato uno sviluppo degno di nota. Il nostro Consigliere, rinomato per le sue abilità eccezionali e i suoi metodi innovativi, ha raggiunto un livello di competenza oltre ogni aspettativa.
LaunchAmbitiousReforms = Avvia Riforme Ambiziose

an_unprecedented_harvest.t = Un Raccolto Senza Precedenti
an_unprecedented_harvest.d = Quest'anno, le nostre terre hanno visto un raccolto senza eguali. I nostri campi ci hanno fornito una quantità incredibile di raccolto, più di quanta ce ne fossimo mai aspettata, riempiendo i nostri magazzini fino al limite.

age_of_craftsmanship.t = Era dell'Artigianato
age_of_craftsmanship.d = La nostra Civiltà è nell'era dell'oro per quanto riguarda l'Artigianato, con lavoratori esperti che creano beni eccezionali simbolo del nostro prestigio culturale.
RemarkableAchievement = Un Traguardo Notevole!


gold_surplus_dilemma.t = Il dilemma dell'Eccesso di Oro
gold_surplus_dilemma.d = Una situazione inusuale si sta verificando nella nostra Civiltà, la nostra tesoreria trabocca d'Oro, superando la sua capacità massima. Questo surplus inaspettato di ricchezza simboleggia la nostra economia prospera e la nostra governance efficiente.
StoreAndSecure = Preserva e Conserva

invest_in_the_capital.t = Investi Nella Capitale
invest_in_the_capital.d = La prosperità della nostra Capitale è cruciale ai fini della forza e dell'influenza della nostra Civiltà. Riconoscendo il suo potenziale, prendiamo ora la decisione vitale di investire nella sua Crescita Economica e nelle sue Infrastrutture.
LimitedInvestment = Investimenti Limitati
MaintainCurrentCourse = Mantieni La Situazione Corrente

the_great_city_fire.t = Il Grande Incendio Urbano
the_great_city_fire.d = Un incendio devastante si è abbattuto su alcune sezioni della nostra Città, mettendo in pericolo i suoi abitanti e gli edifici storici che simboleggiano il nostro passato.
AcceptTheInevitable = Accetta L'Inevitabile

expanding_the_battle_front.t = Espandere Il Fronte di Battaglia
expanding_the_battle_front.d = I nostri strateghi militari hanno raggiunto un traguardo sorprendente, espandendo l'Ampiezza della Battaglia del nostro Esercito a una scala notevole. Ciò segna l'inizio di una nuova era per le nostre capacità militari, significando un passaggio verso formazioni più sofisticate e formidabili.
Excellent = Eccellente

reformation_of_the_army.t = Riforma dell'Esercito
reformation_of_the_army.d = La nostra Civiltà è sull'orlo di una significativa trasformazione militare. È giunto il momento di riformare il nostro Esercito, passando da metodi tradizionali a tattiche e organizzazione più moderne.
reformation_of_the_army.m = Migliora la tua Accademia Militare, dimostrando il tuo impegno verso addestramenti e strategie più avanzati.

army_expansion.t = Espansione dell'Esercito
army_expansion.d = Formare quest'Esercito gigantesco dà una sensazione di orgoglio e di sicurezza al nostro popolo, rafforzando nel complesso il morale e l'unità nazionale.

famous_vintage.t = Un Famoso Vino d'Annata
famous_vintage.d = Di recente il Vino d'Annata dalla nostra rinomata regione del vino, celebrato dagli esperti per la sua qualità eccezionale, ha onorato i nostri cittadini e migliorato la nostra reputazione come produttori di ottimi vini.
AToastToOurLands = Una Specialità della Nostra Terra!

rich_harvest.t = Raccolto Copioso
rich_harvest.d = Questa stagione, le nostre fattorie stanno avendo un ritorno straordinario. L'abbondanza di raccolti non solo assicura molto cibo per la nostra gente ma migliora significativamente anche il nostro Tasso di Crescita della Popolazione.

clothing_revolution.t = Rivoluzione Vestiaria
clothing_revolution.d = Un recente aumento nella qualità dei vestiti prodotti nella nostra Civiltà ha inaspettatamente aumentato i nostri profitti.

agricultural_breakthrough.t = Rivoluzione Agricola
agricultural_breakthrough.d = Con notevole successo, abbiamo rivoluzionato l'agricoltura nelle nostre Province.
ExpandMilitaryForces = Espandi Le Forze Militari
BoostPopulationGrowth = Aumenta La Crescita della Popolazione

gold_rush.t = Corsa All'Oro
gold_rush.d = I nostri minatori hanno scoperto un enorme giacimento d'Oro, aumentando significativamente la nostra Tesoreria.

quality_furniture.t = Mobilia di Qualità
quality_furniture.d = La nostra produzione di Mobili di recente ha visto un salto significativo in qualità. Artigiani e falegnami si sono superati, fabbricando oggetti che combinano funzionalità e bellezza artistica.

fruit_mania.t = Mania della Frutta
fruit_mania.d = In un susseguirsi inaspettato di eventi, la nostra Civiltà ha scoperto un tipo di Frutta misterioso, che si dice possieda caratteristiche uniche tra cui un sapore eccezionale e dimensioni inusuali, diffondendo la curiosità e attirando gente da tutto il mondo per assistere a questa grande scoperta.

beer_production_soars.t = La Produzione di Birra Impenna
beer_production_soars.d = Un'innovazione senza precedenti nelle tecniche di distillazione ha rivoluzionato la nostra produzione di Birra, portando ad un inaspettato e significativo aumento in output.

the_sieges_end.t = La Fine dell'Assedio
the_sieges_end.d = Dopo un Assedio vittorioso, ci troviamo davanti ad una scelta riguardo la città conquistata: metterla a ferro e fuoco e saccheggiarla per guadagni immediati ma con rischio di future ostilità, o mostrare pietà e mantenere l'ordine.
ShowMercy = Pietà
BurnAndLoot = Saccheggio

military_expansion.t = Espansione Militare
military_expansion.m = Aumenta le Forze Armate fino al Limite di Reggimento per rafforzare la tua posizione internazionale e mostrare effettivamente forza, assicurando gli interessi della tua Civiltà.
military_expansion.d = Raggiungendo il nostro Limite di Reggimento, possiamo effettivamente mostrare forza, difendere i nostri interessi, e stimolare attività economica attraverso spesa militare e sviluppo.

the_capitals_transformation.t = Trasformazione della Capitale
the_capitals_transformation.m = Costruisci nuovi Edifici nella Provincia Capitale per contribuire al suo rinvigorimento e rafforzamento.
the_capitals_transformation.d = La nostra Provincia Capitale è sull'orlo di una trasformazione significativa, con nuovi Edifici volti a rivitalizzare la Città e ad accrescere la sua importanza.

sudden_death_of_advisor.t = Morte Improvvisa Del Consigliere per L'Economia
sudden_death_of_advisor.d = Un grave lutto colpisce la nostra leadership poiché uno dei nostri migliori Consiglieri è improvvisamente venuto a mancare.

maximizing_tax_efficiency.t = Massimizzare L'Efficienza della Tassazione
maximizing_tax_efficiency.m = In un impegno per ottimizzare il nostro sistema fiscale, abbiamo l'opportunità di aumentare l'Efficienza della Tassazione nelle nostre Province. 
maximizing_tax_efficiency.d = È tempo di ridefinire il nostro approccio verso la Tassazione Provinciale, adottare strategie innovative e migliorare l'Efficienza può notevolmente aumentare i nostri Ricavi Dalla Tassazione.

advisors_research_breakthrough.t = Traguardo Nella Ricerca di Un Consigliere
advisors_research_breakthrough.m = Promuovi Un Consigliere per aumentare il suo impatto sull'avanzamento della Civiltà.
advisors_research_breakthrough.d = Uno dei nostri Consiglieri ha raggiunto un livello notevole di abilità, migliorando significativamente i nostri progressi nella ricerca.
ResearchAcceleration = Accelerazione Ricerca
StrengthenOurLegacy = Rinforza La Nostra Eredità

prosperous_times.t = Tempi di Prosperità
prosperous_times.d = La nostra Civiltà sta attualmente vivendo in un'epoca di prosperità senza precedenti. Quest'Era dell'Oro è segnata da un boom economico e un aumento del commercio.

boost_in_production_efficiency.t = Aumento dell'Efficienza di Produzione
boost_in_production_efficiency.d = La nostra Economia sta vedendo un grosso miglioramento nell'efficienza grazie a metodi nuovi e innovativi. Questo cambiamento aumenta la nostra produttività e consente un miglior impiego delle nostre Risorse, rafforzando la salute generale della nostra Economia.

breakthrough_in_construction.t = Traguardo Nella Costruzione
breakthrough_in_construction.d = La nostra Civiltà è entrata in una fase in cui i Costi di Costruzione sono inaspettatamente calati, grazie a fattori economici e avanzamenti nella tecnologia edile.

