# Insult message to Civ
WeWillClaimBothYourLivesAndYourFreedom = Reclameremo sia le vostre vite che le vostre libertà.
YourCivilizationWillCrumbleAndWeShallDanceUponTheRuinsOfYourFormerGreatness = La vostra Civiltà si sgretolerà, e balleremo sulle rovine della vostra perduta gloria.
YourStandingWillBeReducedToRuinsAndWeShallRevelInYourDownfall = La vostra società sarà ridotta in rovina, e ci diletteremo a osservare la vostra caduta.
WellSnatchAwayYourMightLeavingYourCivilizationInTheShadowsOfItsFormerSelf = Vi sottrarremo la vostra gloria, lasciando la vostra Civiltà nelle ombre del suo stesso passato.
PrepareForTheDemiseOfYourSovereigntyForWeWillSeizeIt = Preparatevi alla fine della vostra sovranità, poiché noi ve ne priveremo.

# Declare War
WitnessTheMightOfMyForcesAsWeDeclareWarUponYouForYourWeaknessCannotWithstandOurStrength = Osservate le nostre capacità mentre vi dichiariamo guerra, la vostra debolezza non può competere con la nostra forza.
BraceYourselfForIDeclareWarUponYouToAssertMyRightfulAuthorityOverYourTerritories = Preparati, poiché io ti dichiaro guerra per affermare la mia giusta autorità sui tuoi territori.
ThisWarIsTheDestinyYouCannotEscapeAsWeRiseToCrushYourFeebleResistance = Questa guerra è il destino da cui non potete tirarvi indietro, guardateci sorgere e distruggere la vostra pietosa resistenza.
YourLandsWillBeReshapedUnderOurBannerAsWarIsDeclaredToSecureOurRightfulDominion = Le vostre terre verranno riorganizzate sotto la nostra bandiera, vi dichiariamo guerra per assicurarvici il nostro giusto dominio.
PrepareForTheMarchOfOurArmiesAsWeDeclareWarToAssertOurDominanceOverYourLands = Preparatevi per la marcia dei nostri eserciti poiché vi dichiariamo guerra per affermare il nostro dominio sulle vostre terre.
TheDrumsOfWarBeatLoudlyAnnouncingTheBeginningOfYourDemiseUnderOurRule = La batteria di guerra suona forte, e annuncia la vostra disfatta sotto il nostro esercito.
TheBannersOfWarUnfurlMarkingTheBeginningOfTheEndForYourInsignificantCivilization = Gli stendardi di guerra si srotolano, segnando l'inizio della fine per la vostra insulsa Civiltà.

