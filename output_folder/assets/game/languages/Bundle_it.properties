AgeOfChaos = L’Era del Caos  
AgeOfChaosIsNewWayToPlay = L’Era del Caos è un nuovo modo di giocare.  
EveryXTurnsYouWillHaveToChangeTheCivilization = Ogni {0} turni dovrai cambiare la Civiltà che controlli e passare a una nuova.  
YouWillBeGivenRandomCivilizationsToChooseFrom = Ti verranno date Civiltà casuali tra cui scegliere.  
PickOneAndContinueYourJourney = Scegline una e continua il tuo viaggio, anche se questo significa che un giorno dovrai combattere l’impero che un tempo hai governato.

TogetherWeCanAchieveAStabilityThatNeitherCouldAlone = Insieme possiamo raggiungere una stabilità che nessuno dei due potrebbe da solo.
WeSeekNotDominanceButUnderstandingAndLastingFriendship = Non cerchiamo il dominio, ma la comprensione e un'amicizia duratura.
LetThisBeTheDawnOfANewEraOfCooperationBetweenUs = Che questo sia l'alba di una nuova era di cooperazione tra noi.
OurPeoplesDeservePeaceLetUsGiveItToThemTogether = I nostri popoli meritano la pace, diamogliela insieme.
TheFutureIsBrighterWhenEnemiesBecomeAllies = Il futuro è più luminoso quando i nemici diventano alleati.
LetUsSetAsideOurDifferencesAndBuildANewFutureUnited = Mettiamo da parte le nostre differenze e costruiamo un nuovo futuro uniti.

TogetherWeShallStandStrongerThanEitherCouldAlone = Insieme saremo più forti di quanto ciascuno potrebbe da solo.
AnAllianceBetweenUsWouldShakeTheWorldAndSecurePeace = Un'alleanza tra noi scuoterebbe il mondo e garantirebbe la pace.
YourEnemiesAreOursLetUsFaceThemSideBySide = I tuoi nemici sono i nostri, affrontiamoli fianco a fianco.
JoinUsAndLetOurBannersFlyTogetherAcrossTheWorld = Unisciti a noi e lascia che le nostre bandiere volino insieme in tutto il mondo.
LetThisAllianceBeTheFoundationOfANewGoldenAge = Che questa alleanza sia la base di una nuova età dell'oro.
AloneWeSurviveTogetherWeThrive = Da soli sopravviviamo, insieme prosperiamo.
LetUsSecurePeaceThroughPowerAndAlliance = Assicuriamo la pace attraverso la forza e l'alleanza.

LetUsUniteAsOnePeopleOneDestinyOneCivilization = Uniamoci come un solo popolo, un solo destino, una sola civiltà.
OurFuturesAreStrongerTogetherLetUsBecomeOneCivilization = I nostri futuri sono più forti insieme – diventiamo una sola civiltà.
LetUsMergeOurStrengthsOurCulturesOurFatesForever = Uniamo le nostre forze, culture e destini per sempre.
LetThisBeTheBeginningOfOneGreatAndUndividedEmpire = Che questo sia l'inizio di un grande e indiviso impero.
OurStrengthsOurValuesOurPeopleShallBeOneFromThisDay = Le nostre forze, i nostri valori, il nostro popolo saranno uno da questo giorno.

OurEnemiesWillThinkTwiceIfTheyKnowYouDoNotStandAlone = I nostri nemici ci penseranno due volte se sapranno che non sei solo.
InDangerWeWillNotAbandonYouAndWeAskTheSameInReturn = In pericolo non ti abbandoneremo e chiediamo lo stesso in cambio.
WhenOneIsAttackedBothWillAnswerThisIsOurOath = Quando uno è attaccato, entrambi risponderemo – questo è il nostro giuramento.
TogetherWeCreateABarrierNoEnemyCanBreach = Insieme creiamo una barriera che nessun nemico può oltrepassare.
WeStandReadyToDefendYourBordersAsWeDoOurOwn = Siamo pronti a difendere i tuoi confini come i nostri.

WeSwearToRespectYourBordersAndExpectTheSameInReturn = Giuriamo di rispettare i tuoi confini e ci aspettiamo lo stesso in cambio.
LetUsAvoidTheFiresOfWarAndKeepPeaceBetweenUs = Evitiamo il fuoco della guerra e manteniamo la pace tra di noi.
WeOfferYouThePromiseOfNonAggressionForMutualBenefit = Ti offriamo la promessa di non aggressione per beneficio reciproco.
MayOurCivilizationsCoexistWithoutTheShadowOfWar = Che le nostre civiltà coesistano senza l’ombra della guerra.
LetThisPactMarkTheEndOfHostilityBetweenUs = Che questo patto segni la fine dell’ostilità tra di noi.
LetUsPutAsideOurDifferencesAndAvoidNeedlessWar = Mettiamo da parte le nostre differenze ed evitiamo guerre inutili.

