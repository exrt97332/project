gsg3 = South German Confederation cənub Alman bölgələrini birləşdirməsi ilə tanınan mərkəzi Avropada tarixi regional dövlətdir. O, əməkdaşlığa, idarəetməyə və regional sabitliyə yönəlir. Onun gücü ortaq kimlikdən və koordinasiyalı rəhbərlikdən gəlir.
rus = Soviet Union geniş ərazisi və mərkəzləşdirilmiş siyasi sistemi ilə tanınan qüdrətli tarixi dövlətdir. O, idarəetməyə, sənaye inkişafına və qlobal təsirə yönəlir. Onun gücü mərkəzləşdirilmiş planlaşdırmadan və güclü dövlət nəzarətindən gəlir.
spa = Spain zəngin tarixi, mədəniyyəti və qlobal dəniz təsiri ilə tanınan Avropa dövlətidir. O, turizmə, mədəni irsə və iqtisadi inkişafa yönəlir. Onun gücü mədəni müxtəliflikdən və tarixi mirasdan gəlir.
spa4 = Spanish Empire geniş xarici əraziləri və dəniz üstünlüyü ilə tanınan güclü tarixi qlobal imperiyadır. O, genişlənməyə, ticarətə və mədəni təsirə yönəlir. Onun gücü dəniz qüdrətindən və kolonial əhatəsindən gəlir.
spaem = Spartan Empire qədim Spartadan ilhamlanan, sərt intizamı və hərbi yönümü ilə tanınan tarixi tipli dövlətdir. O, müharibəyə, təlimə və ictimai nizamə yönəlir. Onun gücü hərbi sərtlikdən və birlikdən gəlir.
sri = Sri Lanka Cənubi Asiyada yerləşən, mədəni irsi və təbii gözəlliyi ilə tanınan ada dövlətidir. O, sabitliyə, ticarətə və regional əməkdaşlığa yönəlir. Onun gücü strateji mövqeyindən və mədəni müxtəlifliyindən gəlir.
suns3 = Sunset Empire keçid, miras və mədəni simvolizmi təmsil edən simvolik dövlətdir. O, birliyə, kimliyə və regional təsirə yönəlir. Onun gücü ortaq baxışdan və mədəni uyğunluqdan gəlir.
swab = Swabia mərkəzi Avropada mədəni və siyasi təsiri ilə tanınan tarixi bölgədir. O, regional kimliyə, əməkdaşlığa və idarəetməyə yönəlir. Onun gücü mədəni birlikdən və tarixi mirasdan gəlir.
swi = Switzerland neytrallığı, sabitliyi və güclü maliyyə sistemi ilə tanınan Avropa dövlətidir. O, sülhə, idarəetməyə və iqtisadi inkişafa yönəlir. Onun gücü siyasi neytrallıqdan və güclü iqtisadiyyatdan gəlir.
thir = Thirteen Colonies Şimali Amerikada ABŞ-ın əsasını qoyan tarixi Britaniya koloniyaları qrupudur. O, özünüidarəyə, ticarətə və müstəqilliyə yönəlir. Onun gücü birlikdən və ortaq siyasi ideallardan gəlir.
tib2 = Tibetan Empire Mərkəzi Asiyada mədəni və dini təsiri ilə tanınan güclü tarixi dövlətdir. O, genişlənməyə, idarəetməyə və ruhani rəhbərliyə yönəlir. Onun gücü mədəni birlikdən və strateji dağlıq coğrafiyadan gəlir.
trr = Tripoli Şimali Afrikada dəniz əhəmiyyəti ilə tanınan sahil şəhəri və tarixi bölgədir. O, ticarətə, dəniz fəaliyyətinə və regional təsirə yönəlir. Onun gücü limanından və strateji Aralıq dənizi mövqeyindən gəlir.
gbul3 = Tsardom of Bulgaria orta əsr gücü və mədəni inkişafı ilə tanınan tarixi Balkan dövlətidir. O, idarəetməyə, genişlənməyə və mədəni kimliyə yönəlir. Onun gücü güclü rəhbərlikdən və regional təsirdən gəlir.
tusc = Tuscany incəsənəti, mədəniyyəti və iqtisadi təsiri ilə tanınan İtaliyada tarixi bölgədir. O, mədəni inkişaf, ticarət və innovasiyaya yönəlir. Onun gücü bədii irsdən və iqtisadi rifahdan gəlir.
ukr = Ukraine geniş kənd təsərrüfatı torpaqları və mədəni irsi ilə tanınan Şərqi Avropa dövlətidir. O, sabitliyə, inkişafa və regional əməkdaşlığa yönəlir. Onun gücü təbii resurslardan və münbit torpaqlardan gəlir.
unba = United Baltic Duchy Baltik bölgəsində vahid idarəetmə altında birləşmə ideyası ilə tanınan tarixi dövlət konseptidir. O, idarəetməyə, regional əməkdaşlığa və siyasi sabitliyə yönəlir. Onun gücü mərkəzləşdirilmiş rəhbərlikdən və ərazi birləşməsindən gəlir.
gguy3 = United Guyana Cənubi Amerikada Qayana bölgəsində birliyi təmsil edən regional ideyadır. O, əməkdaşlığa, inkişafa və ortaq idarəetməyə yönəlir. Onun gücü regional inteqrasiyadan və resursların idarə olunmasından gəlir.
prbr3 = United Kingdom of Portugal, Brazil and the Algarves Avropa və Cənubi Amerikadakı əraziləri birləşdirən tarixi transatlantik dövlətdir. O, idarəetməyə, ticarətə və imperiya koordinasiyasına yönəlir. Onun gücü qlobal əhatədən və qitələrarası siyasi birlikdən gəlir.
uni = United Kingdom qlobal təsiri və siyasi sabitliyi ilə tanınan Avropa konstitusiyalı monarxiyadır. O, idarəetməyə, diplomatiyaya və iqtisadi inkişafa yönəlir. Onun gücü güclü institutlardan və tarixi təsirdən gəlir.
uso = United States of Oceania Sakit okean boyunca ada dövlətlərinin konseptual federasiyasıdır. O, birliyə, əməkdaşlığa və dəniz strategiyasına yönəlir. Onun gücü birləşmiş resurslardan və okean əlaqəliliyindən gəlir.
ural4 = Uralic Union Ural dillərində danışan xalqların konseptual regional ittifaqıdır. O, mədəni birliyə, əməkdaşlığa və ortaq inkişafa yönəlir. Onun gücü dil və mədəni bağlardan gəlir.
vand = Vandal Kingdom Şimali Afrikada fəth və idarəetməsi ilə tanınan tarixi german dövlətidir. O, genişlənməyə, hərbi gücə və idarəetməyə yönəlir. Onun gücü hərəkətlilikdən və effektiv rəhbərlikdən gəlir.
visi = Visigoths Qərbi Avropada güclü krallıq qurması ilə tanınan tarixi german xalqıdır. Onlar genişlənməyə, məskunlaşmaya və idarəetməyə yönəlirlər. Onların gücü hərbi təşkilatlanmadan və uyğunlaşma qabiliyyətindən gəlir.
wal = Wales Birləşmiş Krallıqda yerləşən, dağlıq mənzərələri və zəngin mədəni irsi ilə tanınan ölkədir. O, mədəni qorunmaya, idarəetməyə və regional kimliyə yönəlir. Onun gücü güclü ənənələrdən və fərqli milli mədəniyyətdən gəlir.
wife = West Indies Federation bir neçə ada ərazisini birləşdirməyi hədəfləyən qısaömürlü Karib ittifaqı idi. O, əməkdaşlığa, idarəetməyə və regional birliyə yönəlirdi. Onun gücü ortaq kimlikdən və birləşmiş resurslardan gəlirdi.
wepp = Westphalia Avropada müasir siyasi sistemlərin formalaşmasında rolu ilə tanınan tarixi bölgədir. O, idarəetməyə, diplomatiyaya və regional sabitliyə yönəlir. Onun gücü tarixi müqavilələrdən və siyasi təsirdən gəlir.
bew = White Ruthenia Belarus ilə əlaqəli tarixi və regional addır. O, mədəni irsə, idarəetməyə və regional kimliyə yönəlir. Onun gücü ortaq ənənələrdən və tarixi davamlılıqdan gəlir.
yuan = Yuan monqollar tərəfindən qurulmuş, geniş əraziləri birləşdirməsi ilə tanınan Çində tarixi sülalədir. O, genişlənməyə, idarəetməyə və nəzarətə yönəlir. Onun gücü güclü hərbi təşkilatlanmadan və mərkəzləşdirilmiş idarəetmədən gəlir.
yugo = Yugoslavia Cənub-Şərqi Avropada müxtəlif etnik qrupları birləşdirməsi ilə tanınan tarixi dövlətdir. O, əməkdaşlığa, idarəetməyə və regional sabitliyə yönəlir. Onun gücü müxtəlif icmalar arasında birlikdən və ortaq rəhbərlikdən gəlir.
drc = Zaire geniş təbii resursları və mərkəzi mövqeyi ilə tanınan tarixi Afrika dövlətidir. O, idarəetməyə, iqtisadi inkişafa və resursların idarə olunmasına yönəlir. Onun gücü təbii sərvətlərdən və strateji coğrafiyadan gəlir.
zim = Zimbabwe zəngin tarixi və təbii resursları ilə tanınan Cənubi Afrika dövlətidir. O, sabitliyə, inkişafa və regional əməkdaşlığa yönəlir. Onun gücü mineral sərvətlərdən və mədəni irsdən gəlir.
