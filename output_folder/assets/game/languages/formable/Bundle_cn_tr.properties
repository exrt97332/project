drc = 扎伊爾是一個非洲歷史國家， 以其豐富的自然資源與中心位置而聞名。 它專注於治理、 經濟發展與資源管理。 其力量來自自然財富與戰略地理位置。 
zim = 津巴布韋是一個南部非洲國家， 以其豐富歷史與自然資源而聞名。 它專注於穩定、 發展與區域合作。 其力量來自礦產資源與文化遺產。 
