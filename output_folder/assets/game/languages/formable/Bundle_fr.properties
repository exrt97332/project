suns3 = Empire du Crépuscule est un État symbolique représentant la transition, l’héritage et le symbolisme culturel. Il se concentre sur l’unité, l’identité et l’influence régionale. Sa force vient de la vision partagée et de la cohésion culturelle.
swab = Souabe est une région historique en Europe centrale connue pour son influence culturelle et politique. Elle se concentre sur l’identité régionale, la coopération et le gouvernement. Sa force vient de l’unité culturelle et de l’héritage historique.
swi = Suisse est un État européen connu pour sa neutralité, sa stabilité et son système financier solide. Il se concentre sur la paix, le gouvernement et le développement économique. Sa force vient de la neutralité politique et d’une économie forte.
thir = Treize colonies est un groupe historique de colonies britanniques en Amérique du Nord connu pour avoir formé la base des États-Unis. Il se concentre sur l’autogouvernance, le commerce et l’indépendance. Sa force vient de l’unité et des idéaux politiques partagés.
tib2 = Empire tibétain est un puissant État historique en Asie centrale connu pour son influence culturelle et religieuse. Il se concentre sur l’expansion, le gouvernement et le leadership spirituel. Sa force vient de l’unité culturelle et de sa géographie stratégique en haute altitude.
trr = Tripoli est une ville côtière et région historique en Afrique du Nord connue pour son importance maritime. Elle se concentre sur le commerce, l’activité navale et l’influence régionale. Sa force vient de son port et de sa position stratégique en Méditerranée.
gbul3 = Tsarat de Bulgarie est un État historique des Balkans connu pour sa puissance médiévale et son développement culturel. Il se concentre sur le gouvernement, l’expansion et l’identité culturelle. Sa force vient du leadership fort et de l’influence régionale.
tusc = Toscane est une région historique en Italie connue pour son art, sa culture et son influence économique. Elle se concentre sur le développement culturel, le commerce et l’innovation. Sa force vient de l’héritage artistique et de la prospérité économique.
ukr = Ukraine est un État d’Europe de l’Est connu pour ses vastes terres agricoles et son patrimoine culturel. Il se concentre sur la stabilité, le développement et la coopération régionale. Sa force vient des ressources naturelles et de ses terres fertiles.
unba = Duché balte uni est un concept d’État historique dans la région baltique connu pour sa proposition d’unification sous une administration unique. Il se concentre sur le gouvernement, la coopération régionale et la stabilité politique. Sa force vient du leadership centralisé et de la consolidation territoriale.
gguy3 = Guyana unie est une idée régionale représentant l’unité dans la région du Guyana en Amérique du Sud. Elle se concentre sur la coopération, le développement et la gouvernance partagée. Sa force vient de l’intégration régionale et de la gestion des ressources.
prbr3 = Royaume-Uni de Portugal, Brésil et des Algarves est un État transatlantique historique qui a uni des territoires en Europe et en Amérique du Sud. Il se concentre sur le gouvernement, le commerce et la coordination impériale. Sa force vient de la portée mondiale et de l’unité politique à travers les continents.
uni = Royaume-Uni est une monarchie constitutionnelle européenne connue pour son influence mondiale et sa stabilité politique. Il se concentre sur le gouvernement, la diplomatie et le développement économique. Sa force vient des institutions solides et de l’influence historique.
uso = États-Unis d’Océanie est une fédération conceptuelle de nations insulaires à travers le Pacifique. Il se concentre sur l’unité, la coopération et la stratégie maritime. Sa force vient des ressources combinées et de la connectivité océanique.
ural4 = Union ouralienne est une alliance régionale conceptuelle des peuples ouraliens. Elle se concentre sur l’unité culturelle, la coopération et le développement partagé. Sa force vient des liens linguistiques et culturels.
vand = Royaume vandale est un État germanique historique connu pour sa conquête et son règne en Afrique du Nord. Il se concentre sur l’expansion, la force militaire et le gouvernement. Sa force vient de la mobilité et d’un leadership efficace.
visi = Wisigoths sont un peuple germanique historique connu pour avoir établi un royaume puissant en Europe de l’Ouest. Ils se concentrent sur l’expansion, la colonisation et le gouvernement. Leur force vient de l’organisation militaire et de l’adaptabilité.
wal = Pays de Galles est un pays du Royaume-Uni connu pour ses paysages montagneux et son riche patrimoine culturel. Il se concentre sur la préservation culturelle, le gouvernement et l’identité régionale. Sa force vient des traditions solides et d’une culture nationale distincte.
wife = Fédération des Antilles occidentales était une union caribéenne de courte durée visant à unir plusieurs territoires insulaires. Elle se concentre sur la coopération, le gouvernement et l’unité régionale. Sa force vient de l’identité partagée et des ressources combinées.
wepp = Westphalie est une région historique en Europe connue pour son rôle dans la formation des systèmes politiques modernes. Elle se concentre sur le gouvernement, la diplomatie et la stabilité régionale. Sa force vient des traités historiques et de l’influence politique.
bew = Ruthénie blanche est un nom historique et régional associé à la Biélorussie. Elle se concentre sur le patrimoine culturel, le gouvernement et l’identité régionale. Sa force vient des traditions partagées et de la continuité historique.
yuan = Yuan est une dynastie historique en Chine établie par les Mongols, connue pour avoir unifié de vastes territoires. Elle se concentre sur l’expansion, le gouvernement et le contrôle. Sa force vient de l’organisation militaire et du pouvoir centralisé.
yugo = Yougoslavie est un État historique d’Europe du Sud-Est connu pour avoir uni plusieurs groupes ethniques. Il se concentre sur la coopération, le gouvernement et la stabilité régionale. Sa force vient de l’unité entre communautés diverses et du leadership partagé.
drc = Zaïre est un État africain historique connu pour ses vastes ressources naturelles et sa position centrale. Il se concentre sur le gouvernement, le développement économique et la gestion des ressources. Sa force vient de la richesse naturelle et de la géographie stratégique.
zim = Zimbabwe est un État d’Afrique australe connu pour sa riche histoire et ses ressources naturelles. Il se concentre sur la stabilité, le développement et la coopération régionale. Sa force vient de la richesse minérale et du patrimoine culturel.
