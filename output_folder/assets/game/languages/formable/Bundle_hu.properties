LANGUAGENAME = Magyar
baby = Babilon egy újjáéledt ősi civilizáció, amely a korai törvénykezés, kultúra és innováció örökségére épül. Erős kormányzásra, fejlődésre és stratégiai terjeszkedésre összpontosít. Célja, hogy visszaállítsa történelmi befolyását a térségben.
