liaa = Ляо - қуатты тарихи мемлекет, күшті атты әскерімен және солтүстік аумақтарды бақылауымен танымал. Ол кеңеюге, әскери күшке және әртүрлі халықтарды басқаруға мән береді. Оның күші қозғалыста және тиімді басқаруда жатыр.
lib = Ливия - шөлдері кең және табиғи ресурстары мол Солтүстік Африка мемлекеті. Ол тұрақтылыққа, ресурстарды басқаруға және аймақтық ықпалға мән береді. Оның күші географиясы мен энергия байлығында жатыр.
lit = Литва - күшті тарихи мұрасы мен мәдени бірегейлігімен танымал Балтық мемлекеті. Ол тұрақтылыққа, экономикалық дамуға және аймақтық ынтымақтастыққа мән береді. Оның күші бірлік пен төзімділікте жатыр.
lavv = Ливония стратегиялық орналасуымен және Балтық жағалауындағы маңызымен танымал тарихи аймақ. Ол саудаға, қорғанысқа және аймақтық бақылауға мән береді. Оның күші порттары мен маңызды сауда жолдарын бақылаудан келеді.
lot = Лотарингия орталық Еуропадағы тарихи мемлекет, ірі державалардың арасында орналасуымен танымал. Ол дипломатияға, саудаға және аймақтық тепе-теңдікті сақтауға мән береді. Оның күші орналасуы мен мәдени алуандықта жатыр.
glux3 = Люксембург Империясы шағын, бірақ ықпалды мемлекет, стратегиялық орналасуымен және қаржылық күшімен танымал. Ол дипломатияға, тұрақтылыққа және экономикалық күшке мән береді. Оның күші байлық пен ақылды басқаруда жатыр.
lux2 = Люксембург шағын, бірақ бай мемлекет, қаржылық күшімен және Еуропадағы стратегиялық орналасуымен танымал. Ол тұрақтылыққа, дипломатияға және экономикалық күшке мән береді. Оның күші өркендеу мен тиімді басқаруда жатыр.
macc = Македон қуатты ежелгі патшалық, мықты әскерімен және тәртіпті басшылығымен танымал. Ол жаулап алуға, ұйымдасуға және аймақтық үстемдікке мән береді. Оның күші әскері мен стратегиялық көзқарасында жатыр.
mad = Мадагаскар ерекше биоалуандығымен және географиялық оқшаулануымен танымал арал мемлекеті. Ол тұрақтылыққа, табиғи ресурстарға және аймақтық дамуға мән береді. Оның күші табиғи ресурстар мен ерекше экожүйелерде жатыр.
mag = Магадха ежелгі Оңтүстік Азиядағы қуатты мемлекет, мықты әкімшілігімен және әскерімен танымал. Ол кеңеюге, басқаруға және аймақтық үстемдікке мән береді. Оның күші ұйымдасқан билік пен стратегиялық көшбасшылықта жатыр.
gmag3 = Магриб Араб Федерациясы Солтүстік Африка мемлекеттерінің ынтымақтастығына және ортақ дамуына бағытталған аймақтық одақ. Ол экономикалық өсуге, мәдени бірлікке және саяси ынтымақтастыққа мән береді. Оның күші бірлік пен ортақ ресурстарда жатыр.
magy3 = Мадьяр Империясы күшті ұлттық бірегейлігімен және жауынгерлік дәстүрлерімен танымал Орталық Еуропа мемлекеті. Ол кеңеюге, басқаруға және өз аумақтарын бақылауға мән береді. Оның күші бірлік пен тәртіпті басшылықта жатыр.
gmaj3 = Маджапахит Империясы қуатты теңіз мемлекеті, күшті флотымен және Оңтүстік-Шығыс Азиядағы ықпалымен танымал. Ол саудаға, кеңеюге және аймақтық бақылауға мән береді. Оның күші теңіз үстемдігі мен стратегиялық одақтарда жатыр.
mal = Малайзия мәдени алуан түрлілігімен және стратегиялық орналасуымен танымал Оңтүстік-Шығыс Азия мемлекеті. Ол экономикалық өсуге, тұрақтылыққа және аймақтық ынтымақтастыққа мән береді. Оның күші бірлік пен күшті сауда желілерінде жатыр.
mara = Маратха Империясы қуатты Үнді мемлекеті, мықты әскерімен және орталықтандырылмаған басқаруымен танымал. Ол кеңеюге, қозғалысқа және ірі империяларға қарсы тұруға мән береді. Оның күші атты әскерде, стратегияда және аймақтық бірлікте жатыр.
maur = Маурья Империясы кең аумақты бақылауымен және орталықтандырылған басқаруымен танымал қуатты ежелгі мемлекет. Ол кеңеюге, басқаруға және аймақтарда тәртіп сақтауға мән береді. Оның күші тәртіпті басқару мен тиімді ұйымдасуда жатыр.
meko3 = Меконг Империясы Меконг өзені бойында орналасқан, құнарлы жерлері мен сауда жолдарымен танымал аймақтық мемлекет. Ол ауыл шаруашылығына, саудаға және аймақтық ынтымақтастыққа мән береді. Оның күші өзен жүйесі мен ресурстарға бай ортада жатыр.
mex2 = Мексика Империясы аймақты біріктіруге және тұрақтандыруға ұмтылған тарихи монархия. Ол билікке, ұлттық бірегейлікке және саяси бірігуге мән береді. Оның күші орталықтандырылған басқару мен егемендікте жатыр.
mo = Мексика Империясы аумақтық кеңеюімен және мәдени мұрасымен танымал қуатты мемлекет. Ол басқаруға, аймақтық ықпалға және экономикалық дамуға мән береді. Оның күші бірлік пен мықты басшылықта жатыр.
mone3 = Моңғол Империясы кең аумағымен және жылдам әскери қозғалысымен танымал қуатты мемлекет. Ол жаулап алуға, кеңеюге және үлкен аумақты бақылауға мән береді. Оның күші тәртіпті атты әскер мен стратегиялық көшбасшылықта жатыр.
moor3 = Мавр Империясы мәдени жетістіктерімен және аймақтарға ықпалымен танымал қуатты мемлекет. Ол саудаға, білімге және аумақтық бақылауға мән береді. Оның күші жаңашылдықта, ғылымда және стратегиялық кеңеюде жатыр.
mog = Марокко бай мәдениетімен, тарихымен және стратегиялық орналасуымен танымал Солтүстік Африка мемлекеті. Ол тұрақтылыққа, экономикалық өсуге және аймақтық ықпалға мән береді. Оның күші бірлік пен мәдени мұрада жатыр.
mosi = Моси Батыс Африка мемлекеті, күшті атты әскерімен және ұйымдасқан патшалықтарымен танымал. Ол қорғанысқа, кеңеюге және аймақтық бақылауға мән береді. Оның күші тәртіпті басқару мен жауынгерлік дәстүрлерде жатыр.
mugh = Моғол Империясы бай мәдениетімен, сәулетімен және мықты басқаруымен танымал қуатты Оңтүстік Азия мемлекеті. Ол кеңеюге, басқаруға және экономикалық өркендеуге мән береді. Оның күші орталық билік пен күшті әскери құрылымда жатыр.
nand3 = Нанда Империясы байлығымен және мықты орталық билігімен танымал ежелгі Үнді мемлекеті. Ол кеңеюге, бақылауға және экономикалық күшке мән береді. Оның күші мол ресурстар мен тәртіпті басқаруда жатыр.
nep = Непал таулы географиясымен және мәдени мұрасымен танымал Гималай мемлекеті. Ол тұрақтылыққа, тәуелсіздікке және аймақтық ынтымақтастыққа мән береді. Оның күші бірлік, төзімділік және стратегиялық орналасуда жатыр.
net = Нидерланд теңіз сауда желілерімен және экономикалық дамуымен танымал еуропалық мемлекет. Ол саудаға, инновацияға және экономикалық күшке мән береді. Оның күші сауда, инженерия және жағалауды бақылауда жатыр.
nors = Солтүстік Теңіз Империясы теңіз жолдарын және жағалау аумақтарын бақылауымен танымал қуатты теңіз мемлекеті. Ол теңіз үстемдігіне, саудаға және кеңеюге мән береді. Оның күші флоты мен теңіз желілерін бақылауда жатыр.
occa = Окситания ерекше тілі мен мәдени мұрасымен танымал Оңтүстік Еуропа аймағы. Ол мәдениетті сақтауға, аймақтық бірегейлікке және ынтымақтастыққа мән береді. Оның күші ортақ дәстүрлер мен мәдени бірлікте жатыр.
nez = Жаңа Зеландия табиғи ландшафттарымен және географиялық оқшаулануымен танымал арал мемлекеті. Ол тұрақтылыққа, экологиялық қорғауға және экономикалық дамуға мән береді. Оның күші табиғи ресурстар мен ұлттық бірегейлікте жатыр.
goma3 = Оман Империясы теңіздегі қуатты ықпалымен және сауда жолдарын бақылауымен танымал мемлекет. Ол саудаға, кеңеюге және аймақтық ықпалға мән береді. Оның күші теңіз шеберлігі мен стратегиялық көшбасшылықта жатыр.
oma2 = Оман стратегиялық орналасуымен және теңіз мұрасымен танымал Таяу Шығыс мемлекеті. Ол тұрақтылыққа, саудаға және аймақтық ынтымақтастыққа мән береді. Оның күші жағалау орналасуы мен тепе-тең дипломатияда жатыр.
tur = Осман Империясы кең аумақты бақылауымен және қуатты әскерімен танымал мемлекет. Ол кеңеюге, басқаруға және стратегиялық үстемдікке мән береді. Оның күші тәртіпті басқару мен ұйымдасқан әкімшілікте жатыр.
mya = Паган Империясы діни мәдениетімен және сәулеттік жетістіктерімен танымал ежелгі мемлекет. Ол кеңеюге, құрылысқа және аймақтық ықпалға мән береді. Оның күші мәдени мұра мен стратегиялық көшбасшылықта жатыр.
pak = Пәкістан стратегиялық орналасуымен және мәдени алуан түрлілігімен танымал Оңтүстік Азия мемлекеті. Ол тұрақтылыққа, экономикалық дамуға және қауіпсіздікке мән береді. Оның күші бірлік, төзімділік және ұлттық бірегейлікте жатыр.
pagr4 = Патриа Гранде Латын Америкасындағы біртұтас аймақ идеясын білдіреді. Ол ынтымақтастыққа, мәдени бірлікке және экономикалық бірігуге мән береді. Оның күші аймақтық интеграция мен ортақ бірегейлікте жатыр.
ira = Парсы Империясы кең аумақты бақылауымен және дамыған басқару жүйесімен танымал қуатты ежелгі мемлекет. Ол кеңеюге, басқаруға және мәдени интеграцияға мән береді. Оның күші тиімді ұйымдасу мен стратегиялық көшбасшылықта жатыр.
pebo = Перу-Боливия Конфедерациясы екі елді біріктірген қысқа мерзімді аймақтық одақ. Ол ынтымақтастыққа, ортақ басқаруға және аймақтық күшке мән береді. Оның күші бірлік пен ортақ ресурстарда жатыр.
per = Перу бай тарихымен және алуан түрлі географиясымен танымал Оңтүстік Америка мемлекеті. Ол экономикалық дамуға, тұрақтылыққа және мәдени мұраға мән береді. Оның күші ресурстарда, тарихта және ұлттық бірегейлікте жатыр.
phi = Филиппиндер көптеген аралдарымен және мәдени алуан түрлілігімен танымал Оңтүстік-Шығыс Азия мемлекеті. Ол экономикалық өсуге, теңіз күшіне және аймақтық ынтымақтастыққа мән береді. Оның күші бірлік пен аралдық орналасуда жатыр.
pizz3 = Пицца Империясы тағам мәдениеті мен шығармашылыққа негізделген жеңіл және көңілді мемлекет. Ол ләззатқа, саудаға және мәдени ықпалға мән береді. Оның күші танымалдықта, ортақ қуанышта және аспаздық бірегейлікте жатыр.
pol = Польша бай тарихымен және мәдени төзімділігімен танымал Орталық Еуропа мемлекеті. Ол тұрақтылыққа, экономикалық дамуға және ынтымақтастыққа мән береді. Оның күші бірлік, мұра және ұлттық бірегейлікте жатыр.
pome = Померания Балтық теңізіне шығатын жағалаулық тарихи аймақ. Ол саудаға, теңіз қызметіне және аймақтық ықпалға мән береді. Оның күші порттары мен стратегиялық орналасуда жатыр.
prus = Пруссия күшті әскери дәстүрімен және тәртіпті басқаруымен танымал қуатты тарихи мемлекет. Ол кеңеюге, ұйымдасуға және тиімділікке мән береді. Оның күші әскери құрылым мен орталықтандырылған билікте жатыр.
qara = Қара Қоюнлу күшті атты әскерімен және аймақтық бақылауымен танымал тайпалық конфедерация. Ол кеңеюге, соғысқа және аумақтық билікті сақтауға мән береді. Оның күші әскери қозғалыс пен тайпалық бірлікте жатыр.
qin = Цин Империясы кең аумағымен және орталықтандырылған билігімен танымал қуатты мемлекет. Ол басқаруға, мәдени интеграцияға және әртүрлі аймақтарды бақылауға мән береді. Оның күші тәртіпті басқару мен үлкен армияда жатыр.
rash = Рашидун Халифаты жылдам кеңеюімен және діни бірлігімен танымал қуатты ерте ислам мемлекеті. Ол басқаруға, сенімді таратуға және кең аумақты бақылауға мән береді. Оның күші діни көшбасшылық пен тәртіпті басқаруда жатыр.
ratt = Раттанакосин Корольдігі дәстүрі мен патшалық сабақтастығымен танымал тарихи тай мемлекеті. Ол басқаруға, дәстүрге және аймақтық тұрақтылыққа мән береді. Оның күші орталық монархия мен мәдени сақтауда жатыр.
red3 = Қызыл теңіз империясы Қызыл теңізге бағытталған, маңызды сауда жолдарын бақылауымен танымал теңіздік мемлекет. Ол саудаға, теңіз қызметіне және аймақтық ықпалға басымдық береді. Оның күші стратегиялық су жолдары мен теңіз сауда желілерінен келеді.
cono3 = Конусур Республикасы Оңтүстік Американың оңтүстік елдеріне бағытталған аймақтық саяси тұжырымдама. Ол ынтымақтастыққа, экономикалық интеграцияға және ортақ басқаруға басымдық береді. Оның күші аймақтық бірліктен және біріктірілген экономикалық қуаттан келеді.
rom = Румыния әртүрлі мәдениеті мен тарихи мұрасы бар еуропалық мемлекет. Ол даму, тұрақтылық және аймақтық ынтымақтастыққа басымдық береді. Оның күші мәдени байлығы мен стратегиялық географиялық орналасуынан келеді.
spqr = Рим империясы кең аумақтық бақылауымен және дамыған басқару жүйесімен танымал қуатты ежелгі өркениет. Ол кеңеюге, заңға және инфрақұрылымға басымдық береді. Оның күші ұйымшылдықта, әскери қуатта және әкімшілік жүйелерде жатыр.
rum = Рум сұлтандығы мәдениеттердің араласуымен және стратегиялық орналасуымен танымал тарихи Анадолы мемлекеті. Ол басқаруға, саудаға және мәдени алмасуға басымдық береді. Оның күші өркениеттер тоғысындағы орналасуынан келеді.
rus2 = Ресей империясы кең аумағымен және орталықтандырылған билігімен танымал қуатты және ауқымды мемлекет. Ол кеңеюге, басқаруға және геосаяси ықпалға басымдық береді. Оның күші үлкен аумағында және тәртіпті әкімшілігінде жатыр.
gbra3 = Ресей империясы зор аумағымен және күшті автократиялық билігімен танымал қуатты мемлекет. Ол кеңеюге, орталықтандырылған басқаруға және аймақтардағы ықпалын сақтауға басымдық береді. Оның күші өлшемінде, ресурстарында және тәртіпті басқаруында жатыр.
saff3 = Саффаридтер империясы ерте исламдық парсы мемлекеті, тез көтерілуі мен әскери күштілігімен танымал. Ол кеңеюге, басқаруға және аймақтық бақылауға басымдық береді. Оның күші әскери басшылық пен стратегиялық амбициядан келеді.
saku3 = Сакура империясы жапон мәдениеті мен дәстүрлерінен шабыт алған тұжырымдамалық мемлекет. Ол мәдениетке, тәртіпке және технологиялық дамуға басымдық береді. Оның күші ұйымшылдық пен мәдени бірегейліктен келеді.
samo = Само империясы әртүрлі топтарды бір билікке біріктірген славян тайпалық мемлекеті. Ол бірлікке, қорғанысқа және аймақтық тұрақтылыққа басымдық береді. Оның күші ынтымақтастық пен ортақ қарсылықта жатыр.
sard = Сардиния стратегиялық орналасуы мен мәдени мұрасы бар Жерорта теңізіндегі арал мемлекеті. Ол саудаға, тұрақтылыққа және аймақтық ықпалға басымдық береді. Оның күші теңіздік орналасуы мен табиғи ресурстарынан келеді.
sasa = Сасанидтер империясы күшті әкімшілігі мен мәдени жетістіктерімен танымал қуатты ежелгі парсы мемлекеті. Ол кеңеюге, басқаруға және көрші державалармен бәсекеге басымдық береді. Оның күші орталықтандырылған билік пен тәртіпті әскерде жатыр.
sau = Сауд Арабиясы кең шөлдері мен маңызды энергетикалық ресурстарымен танымал Таяу Шығыс мемлекеті. Ол экономикалық дамуға, тұрақтылыққа және аймақтық ықпалға басымдық береді. Оның күші табиғи ресурстар мен стратегиялық көшбасшылықта жатыр.
gsca3 = Скандинавия империясы Скандинавия елдерінің біріккен күшін білдіретін тұжырымдамалық солтүстік мемлекет. Ол ынтымақтастыққа, тұрақтылыққа және экономикалық дамуға басымдық береді. Оның күші бірлікте, инновацияда және күшті әлеуметтік жүйелерде жатыр.
scyt4 = Скифия шебер атты әскерлері мен жауынгер мәдениетімен танымал ежелгі көшпелі аймақ. Ол қозғалысқа, соғысқа және аумақтық ықпалға басымдық береді. Оның күші атты әскерінде және кең аумаққа бейімделуінде жатыр.
ser2 = Сербия империясы аумақтық кеңеюі мен мәдени жетістіктерімен танымал қуатты ортағасырлық Балқан мемлекеті. Ол басқаруға, жаулап алуға және аймақтық ықпалға басымдық береді. Оның күші күшті көшбасшылық пен әскери ұйымшылдықта жатыр.
tha2 = Сиам бай мәдениеті мен дипломатиясымен танымал тарихи Оңтүстік-Шығыс Азия мемлекеті. Ол басқаруға, мәдени сақтауға және аймақтық тепе-теңдікке басымдық береді. Оның күші бейімделгіштік пен орталықтандырылған көшбасшылықта жатыр.
sic = Сицилия корольдігі мәдениеттердің тоғысуы мен стратегиялық орналасуымен танымал тарихи Жерорта теңізі мемлекеті. Ол саудаға, басқаруға және мәдени алмасуға басымдық береді. Оның күші өркениеттер тоғысындағы орналасуында жатыр.
soko = Сокото күшті діни және әкімшілік құрылымымен танымал қуатты батыс африкалық ислам мемлекеті. Ол басқаруға, кеңеюге және діни құндылықтарды таратуға басымдық береді. Оның күші бірлікте, көшбасшылықта және ұйымдасқан жүйеде жатыр.
somi3 = Сомали империясы теңіздік саудасы мен жағалау ықпалымен танымал тарихи Шығыс Африка мемлекеті. Ол саудаға, теңіз қызметіне және аймақтық бақылауға басымдық береді. Оның күші теңізде жүзу шеберлігі мен жағалаулық желілерінде жатыр.
som = Сомали ұзын жағалау сызығымен және мәдени мұрасымен танымал Африка мүйізіндегі мемлекет. Ол тұрақтылыққа, саудаға және аймақтық ынтымақтастыққа басымдық береді. Оның күші теңізге шығу мүмкіндігі мен мәдени бірлікте жатыр.
gsg3 = Оңтүстік Герман конфедерациясы Оңтүстік Германия аймақтарын біріктірген тарихи аймақтық мемлекет. Ол ынтымақтастыққа, басқаруға және аймақтық тұрақтылыққа басымдық береді. Оның күші ортақ сәйкестік пен үйлесімді көшбасшылықта жатыр.
rus = Кеңес Одағы кең аумағы мен орталықтандырылған саяси жүйесімен танымал қуатты тарихи мемлекет. Ол басқаруға, өнеркәсіптік дамуға және жаһандық ықпалға басымдық береді. Оның күші орталық жоспарлауда және күшті мемлекеттік бақылауда жатыр.
spa = Испания бай тарихы, мәдениеті және теңіздік ықпалымен танымал еуропалық мемлекет. Ол туризмге, мәдени мұраға және экономикалық дамуға басымдық береді. Оның күші мәдени әртүрлілік пен тарихи мұрада жатыр.
spa4 = Испан империясы кең шетелдік аумақтары мен теңіз үстемдігімен танымал қуатты тарихи империя. Ол кеңеюге, саудаға және мәдени ықпалға басымдық береді. Оның күші теңіз қуаты мен отарлық желіде жатыр.
spaem = Спартан империясы ежелгі Спартаға негізделген, тәртіп пен әскери күшке бағытталған тарихи үлгідегі мемлекет. Ол соғысқа, жаттығуға және қоғамдық тәртіпке басымдық береді. Оның күші әскери қатаңдық пен бірлікте жатыр.
sri = Шри-Ланка мәдени мұрасы мен табиғи сұлулығымен танымал арал мемлекет. Ол тұрақтылыққа, саудаға және аймақтық ынтымақтастыққа басымдық береді. Оның күші стратегиялық орналасуы мен мәдени әртүрлілігінде жатыр.
suns3 = Күн батуы империясы өтпелі кезеңді, мұраны және мәдени символиканы білдіретін мемлекет. Ол бірлікке, сәйкестікке және аймақтық ықпалға басымдық береді. Оның күші ортақ көзқарас пен мәдени тұтастықта жатыр.
swab = Швабия орталық Еуропадағы тарихи аймақ, мәдени және саяси ықпалымен танымал. Ол аймақтық сәйкестікке, ынтымақтастыққа және басқаруға басымдық береді. Оның күші мәдени бірлікте және тарихи мұрада жатыр.
swi = Швейцария бейтараптығымен, тұрақтылығымен және күшті қаржы жүйесімен танымал еуропалық мемлекет. Ол бейбітшілікке, басқаруға және экономикалық дамуға басымдық береді. Оның күші саяси бейтараптық пен күшті экономикада жатыр.
thir = Он үш колониясы Солтүстік Америкадағы Ұлыбритания отарларының тарихи тобы, Америка Құрама Штаттарының негізін қалаған. Ол өзін-өзі басқаруға, саудаға және тәуелсіздікке басымдық береді. Оның күші бірлік пен ортақ саяси идеалдардан келеді.
tib2 = Тибет империясы Орталық Азиядағы мәдени және діни ықпалымен танымал қуатты тарихи мемлекет. Ол кеңеюге, басқаруға және рухани көшбасшылыққа басымдық береді. Оның күші мәдени бірлік пен стратегиялық таулы географиядан келеді.
trr = Триполи Солтүстік Африкадағы жағалауда орналасқан, теңіздік маңызымен танымал тарихи аймақ. Ол саудаға, теңіз қызметіне және аймақтық ықпалға басымдық береді. Оның күші порты мен Жерорта теңізіндегі стратегиялық орналасуынан келеді.
gbul3 = Болгария патшалығы Балқандағы ортағасырлық қуаты мен мәдени дамуы арқылы танымал тарихи мемлекет. Ол басқаруға, кеңеюге және мәдени бірегейлікке басымдық береді. Оның күші күшті көшбасшылық пен аймақтық ықпалдан келеді.
tusc = Тоскана Италиядағы өнері, мәдениеті және экономикалық ықпалымен танымал тарихи аймақ. Ол мәдени дамуға, саудаға және инновацияға басымдық береді. Оның күші көркем мұра мен экономикалық өркендеуде жатыр.
ukr = Украина Шығыс Еуропада орналасқан, кең ауыл шаруашылық жерлері мен мәдени мұрасымен танымал мемлекет. Ол тұрақтылыққа, дамуға және аймақтық ынтымақтастыққа басымдық береді. Оның күші табиғи ресурстар мен құнарлы жерде жатыр.
unba = Біріккен Балтық Герцогтігі Балтық аймағындағы бір әкімшілікке біріктіру ұсынылған тарихи тұжырым. Ол басқаруға, аймақтық ынтымақтастыққа және саяси тұрақтылыққа басымдық береді. Оның күші орталықтандырылған көшбасшылық пен аумақтық бірігуде жатыр.
gguy3 = Біріккен Гайана Оңтүстік Америкадағы Гайана аймағын біріктіру идеясын білдіретін тұжырым. Ол ынтымақтастыққа, дамуға және ортақ басқаруға басымдық береді. Оның күші аймақтық интеграция мен ресурстарды басқаруда жатыр.
prbr3 = Португалия, Бразилия және Алгарвес Біріккен Корольдігі Еуропа мен Оңтүстік Америка аумақтарын біріктірген тарихи трансқұрлықтық мемлекет. Ол басқаруға, саудаға және империялық үйлесімге басымдық береді. Оның күші жаһандық ауқым мен саяси бірлікте жатыр.
uni = Біріккен Корольдік саяси тұрақтылығы мен жаһандық ықпалымен танымал еуропалық конституциялық монархия. Ол басқаруға, дипломатияға және экономикалық дамуға басымдық береді. Оның күші мықты институттар мен тарихи ықпалында жатыр.
uso = Мұхиттық Біріккен Штаттар Тынық мұхитындағы арал мемлекеттерін біріктіретін тұжырымдамалық федерация. Ол бірлікке, ынтымақтастыққа және теңіз стратегиясына басымдық береді. Оның күші ортақ ресурстар мен мұхиттық байланыста жатыр.
ural4 = Орал Одағы Орал тілдерінде сөйлейтін халықтардың тұжырымдамалық аймақтық бірлестігі. Ол мәдени бірлікке, ынтымақтастыққа және ортақ дамуға басымдық береді. Оның күші тілдік және мәдени байланыстарда жатыр.
vand = Вандал патшалығы Солтүстік Африкадағы жаулап алуымен танымал тарихи герман мемлекеті. Ол кеңеюге, әскери күшке және басқаруға басымдық береді. Оның күші қозғалыс пен тиімді көшбасшылықта жатыр.
visi = Вестготтар Батыс Еуропада қуатты патшалық құрған тарихи герман халқы. Олар кеңеюге, қоныстануға және басқаруға басымдық береді. Олардың күші әскери ұйымшылдық пен бейімделгіштікте жатыр.
wal = Уэльс таулы жерлері мен бай мәдени мұрасымен танымал Ұлыбритания құрамындағы ел. Ол мәдениетті сақтауға, басқаруға және ұлттық бірегейлікке басымдық береді. Оның күші дәстүрлер мен ерекше ұлттық мәдениетінде жатыр.
wife = Вест-Индия Федерациясы бірнеше арал аумақтарын біріктіруге бағытталған қысқа мерзімді Кариб одағы. Ол ынтымақтастыққа, басқаруға және аймақтық бірлікке басымдық береді. Оның күші ортақ сәйкестік пен біріккен ресурстарда жатыр.
wepp = Вестфалия Еуропадағы тарихи аймақ, қазіргі саяси жүйелердің қалыптасуында маңызды рөл атқарған. Ол басқаруға, дипломатияға және аймақтық тұрақтылыққа басымдық береді. Оның күші тарихи келісімдер мен саяси ықпалда жатыр.
bew = Ақ Русь Беларусьпен байланысты тарихи және аймақтық атау. Ол мәдени мұраға, басқаруға және аймақтық бірегейлікке басымдық береді. Оның күші ортақ дәстүрлер мен тарихи сабақтастықта жатыр.
yuan = Юань әулеті моңғолдар құрған, Қытайдағы кең аумақтарды біріктірген тарихи әулет. Ол кеңеюге, басқаруға және бақылауға басымдық береді. Оның күші мықты әскери ұйым мен орталықтандырылған билікте жатыр.
yugo = Югославия Оңтүстік-Шығыс Еуропада бірнеше этностарды біріктірген тарихи мемлекет. Ол ынтымақтастыққа, басқаруға және аймақтық тұрақтылыққа басымдық береді. Оның күші әртүрлі қауымдардың бірлігі мен ортақ көшбасшылықта жатыр.
drc = Заир Африкадағы табиғи ресурстары мол және орталық орналасқан тарихи мемлекет. Ол басқаруға, экономикалық дамуға және ресурстарды басқаруға басымдық береді. Оның күші табиғи байлық пен стратегиялық географияда жатыр.
zim = Зимбабве бай тарихы мен табиғи ресурстарымен танымал Оңтүстік Африка мемлекеті. Ол тұрақтылыққа, дамуға және аймақтық ынтымақтастыққа басымдық береді. Оның күші минералдық байлық пен мәдени мұрада жатыр.
