LANGUAGENAME = Қазақша
baby = Вавилон ежелгі заң, мәдениет және жаңашылдық мұрасына негізделген қайта жаңғырған өркениет. Ол күшті басқаруға, дамуға және стратегиялық кеңеюге назар аударады. Оның мақсаты аймақтағы тарихи ықпалын қалпына келтіру.
eunn = Еуропалық Одақ ынтымақтастыққа, саудаға және ұжымдық шешім қабылдауға басымдық беретін ірі саяси және экономикалық одақ. Ол тұрақтылыққа, дамуға және мүше мемлекеттер арасындағы бейбітшілікті сақтауға бағытталған. Оның ықпалы дипломатия мен экономика арқылы бүкіл құрлыққа таралады.
int = Интермарий Орталық және Шығыс Еуропа елдері арасындағы ынтымақтастыққа бағытталған өңірлік одақ. Ол өзара қорғанысқа, экономикалық байланыстарға және ірі державалардан тәуелсіздікке басымдық береді. Оның күші әртүрлі мемлекеттердің бірлігінде жатыр.
lech3 = Лехиттер Империясы лехит халықтарының мұрасына негізделген қуатты мемлекет, ол бірлікке, дәстүрге және күшке мән береді. Ол мәдени бірегейлікке, аумақтық бақылауға және ұзақ мерзімді тұрақтылыққа назар аударады. Оның мақсаты көрші аймақтарға үстемдік орнату.
pier3 = Пирогтық Республика ортақ мәдениет пен дәстүрге негізделген жеңіл мінезді, бірақ біртұтас мемлекет. Ол кеңеюден гөрі ішкі тұрақтылыққа, қауымдастыққа және мәдени бірегейлікке мән береді. Әзілге қарамастан, ол берік әрі төзімді болып қала береді.
plsr = Балтық Империясы Балтық теңізі маңындағы жерлерді біріктіру арқылы құрылған қуатты мемлекет. Ол маңызды сауда жолдарын бақылап, теңіз күшіне және экономикалық өсуге назар аударады. Оның бірлігі салыстырмалы шағын болса да, аймақта үстем болуға мүмкіндік береді.
pol2 = Достастық қорғаныс пен ынтымақтастықты нығайту үшін бірнеше елдер құрған одақ. Бір билеушінің орнына билік оның мүшелері арасында бөлінген. Ол тұрақтылыққа, дипломатияға және ұжымдық дамуға бағытталған.
reda = Редания тәртіпті әскері мен стратегиялық басшылығымен танымал күшті және орталықтандырылған корольдік. Ол кеңеюге, бақылауға және өз жерлерінде тәртіпті сақтауға мән береді. Оның күші оны аймақтағы жетекші күштердің біріне айналдырады.
zapa3 = Западославия батыс славян халықтарының мәдени және саяси байланыстарын нығайтатын біртұтас мемлекет. Ол бірлікке, аймақтық тұрақтылыққа және экономикалық ынтымақтастыққа бағытталған. Бірге ол сыртқы күштерге қарсы әлдеқайда мықты болады.
slav3 = Славян Империясы славян жерлерін бір қуатты билікке біріктірген кең мемлекет. Ол күшке, кеңеюге және мәдени үстемдікке назар аударады. Оның ауқымы оны әлемдік істердегі ірі күшке айналдырады.
eth = Абиссиния ежелгі дәстүрлер мен мықты басшылыққа негізделген тарихи және төзімді мемлекет. Ол тәуелсіздікке, қорғанысқа және мәдени мұраны сақтауға мән береді. Оның мұрасы аймақта ұзақ мерзімді ықпал береді.
afg = Ауғанстан Әмірлігі қатаң басшылық пен берік дәстүрлерге негізделген мемлекет. Ол ішкі бақылауға, қорғанысқа және шекараларындағы тұрақтылықты сақтауға бағытталған. Оның жер бедері мен төзімділігі оны жаулап алуды қиын етеді.
afri = Африка Одағы Африка елдері арасындағы бірлік пен ынтымақтастықты қолдайтын құрлықтық ұйым. Ол экономикалық өсуге, дипломатияға және аймақтық тұрақтылыққа бағытталған. Оның күші құрлық бойынша ұжымдық әрекеттен туындайды.
aksu = Аксум сауда, дін және ерте жаңашылдықтарымен танымал ежелгі әрі қуатты патшалық. Ол саудаға, ықпалға және тарихи мұраны сақтауға назар аударады. Оның тамыры оған тұрақты күш пен бірегейлік береді.
andd = Әл-Андалус оқу, сәулет және саудасымен танымал мәдениеті бай және дамыған мемлекет. Ол білімге, өркендеуге және алуан түрлі қоғамға мән береді. Оның ықпалы ақыл-ой мен экономикалық күштен келеді.
alb3 = Албания тәуелсіздік пен тұрақтылыққа бағытталған төзімді және табанды мемлекет. Ол қорғанысқа, бірлікке және ұлттық бірегейлікті сақтауға басымдық береді. Оның күші төзімділік пен бейімделе алу қабілетінде жатыр.
alpi3 = Альпі Империясы таулы аймақтарды бақылауға негізделген жоғары таулы империя. Ол қорғанысқа, мықты инфрақұрылымға және стратегиялық орналасуға назар аударады. Оның жер бедері оны басып кіруді қиын әрі қорғауды жеңіл етеді.
anda3 = Андалусия бай мәдениетімен, саудасымен және тарихи ықпалымен танымал аймақ. Ол экономикалық өсуге, мәдени мұраға және күшті аймақтық бірегейлікке мән береді. Оның орналасуы оны аймақтар арасындағы маңызды көпір етеді.
gang3 = Англосфера ағылшын тілінде сөйлейтін елдерді біріктіретін мәдени және саяси кеңістік. Ол ынтымақтастыққа, ортақ құндылықтарға және жаһандық ықпалға бағытталған. Оның күші бүкіл әлемге таралған ықпалында жатыр.
anti = Антиль конфедерациясы саудаға, теңіз күшіне және теңіздер арқылы ынтымақтастыққа бағытталған арал мемлекеттер одағы. Ол ықпалын сақтау үшін теңіз бақылауы мен экономикалық байланыстарға сүйенеді. Оның бірлігі шашыраңқы аралдарды бір күшке айналдырады.
ani = Антиохия мәдениетімен, саудасымен және стратегиялық орналасуымен танымал тарихи әрі ықпалды қала-мемлекет. Ол саудаға, дипломатияға және аймақтық маңызға назар аударады. Оның орны әртүрлі өркениеттерді байланыстыратын маңызды орталық етеді.
abbr = Арам Ислам Республикасы сенімге, бірлікке және жүйелі басқаруға негізделген мемлекет. Ол ішкі тұрақтылыққа, мәдени бірегейлікке және мықты басшылыққа бағытталған. Оның күші тәртіп пен ортақ сенімнен келеді.
arab = Арабия кең жерлері мен сауда жолдарын бақылауымен танымал қуатты шөл өркениеті. Ол ресурстарды басқаруға, стратегиялық қозғалысқа және экономикалық ықпалға мән береді. Оның бірлігі қиын ортада дамуға мүмкіндік береді.
arm = Армения бай тарихы мен мықты мәдени бірегейлігімен танымал ежелгі және төзімді мемлекет. Ол қорғанысқа, дәстүрге және тәуелсіздігін сақтауға басымдық береді. Оның төзімділігі көптеген қиындықтардан аман қалуына мүмкіндік берді.
arzt = Арстотцка қауіпсіздік пен тәртіпке бағытталған қатаң әрі қатты бақылаудағы мемлекет. Ол шекараға, бақылауға және ішкі тәртіпке бәрінен жоғары мән береді. Оның күші тәртіп пен мызғымас билікте жатыр.
asha = Ашанти алтын байлығымен және мықты әскери дәстүрлерімен танымал қуатты Батыс Африка мемлекеті. Ол саудаға, ресурстарды бақылауға және аймақтық ықпалын сақтауға назар аударады. Оның күші бірлік пен тәртіпті басшылықта жатыр.
gase3 = Оңтүстік-Шығыс Азия мемлекеттері қауымдастығы мүше елдер арасындағы ынтымақтастықты, сауданы және тұрақтылықты дамытатын өңірлік ұйым. Ол экономикалық өсуге, дипломатияға және ортақ дамуға бағытталған. Оның күші алуан түрлі елдер арасындағы бірлік пен ынтымақтастықта жатыр.
auhh = Австрия-Венгрия отарлық ықпал мен күшті орталық басқаруды біріктірген гибридті мемлекет. Ол кеңеюге, ресурстарды бақылауға және алыс жерлерде стратегиялық үстемдікке назар аударады. Оның күші ескі дәстүрлер мен жаңа аумақтарды біріктіруде жатыр.
anz3 = Австралия–Жаңа Зеландия ынтымақтастыққа, саудаға және ортақ қауіпсіздікке басымдық беретін тығыз өңірлік одақ. Ол экономикалық күшке, теңіз мүмкіндіктеріне және Тынық мұхиттағы тұрақтылыққа бағытталған. Оның бірлігі екі елді серіктестік арқылы күшейтеді.
atr = Австрия тұрақтылығымен, дипломатиясымен және мәдени мұрасымен танымал орталық еуропалық мемлекет. Ол ішкі дамуға, мықты басқаруға және аймақта тепе-теңдікті сақтауға бағытталған. Оның күші тәртіп пен сабақтастықта жатыр.
gatr3 = Австриялық Рейх қатаң басқару мен ұлттық бірлікке негізделген орталықтандырылған және авторитарлы мемлекет. Ол күшке, тәртіпке және ықпалын кеңейтуге бағытталған. Оның күші тәртіп пен орталықтандырылған бақылауда жатыр.
asit = Австро-Италия Империясы орталық еуропалық құрылымды итальяндық мәдениетпен біріктіретін мемлекет. Ол кеңеюге, экономикалық күшке және аймақтағы стратегиялық үстемдікке назар аударады. Оның күші өндірістік қуат пен мәдени мұраны біріктіруден келеді.
aslr = Австрословакия орталық еуропалық және славян аймақтарын бір басқару астында біріктірген мемлекет. Ол тұрақтылыққа, ынтымақтастыққа және теңгерімді дамуға бағытталған. Оның күші әртүрлі мәдениеттер мен аумақтардың бірлігінде жатыр.
aval3 = Авалон Империясы ежелгі мифтер мен күшті мәдени мұраға негізделген аңызға айналған мемлекет. Ол бірлікке, құпиялылыққа және дәстүр мен күш арқылы ықпалын кеңейтуге бағытталған. Оның болмысы мұра мен амбицияға негізделген.
azan4 = Азания Империясы бірлікке, ресурстарды бақылауға және өз аумақтарында аймақтық үстемдікке бағытталған қуатты мемлекет. Ол мықты басшылыққа, дамуға және тұрақтылықты сақтауға мән береді. Оның күші тәртіп пен стратегиялық өсуде жатыр.
azte = Ацтек Империясы әскери күшімен, бай дәстүрлерімен және дамыған қоғамымен танымал өркениет. Ол кеңеюге, салық жинауға және мәдени ықпалға назар аударады. Оның күші мықты ұйымдасу мен жауынгерлік жүйеде жатыр.
batv = Батавия Империясы теңіз саудасы мен су жолдарын стратегиялық бақылауға негізделген күшті мемлекет. Ол саудаға, теңіз күшіне және тиімді басқаруға мән береді. Оның ықпалы маңызды сауда жолдары мен порттарды бақылаудан келеді.
bava = Бавария мықты экономикасымен, мәдениетімен және дәстүрлерімен танымал аймақтық мемлекет. Ол тұрақтылыққа, өнеркәсіптік күшке және ішкі дамуға бағытталған. Оның бірегейлігі мұра мен заманауи дамудың үйлесімінен қалыптасқан.
bel = Бельгия дипломатияға, саудаға және ынтымақтастыққа бағытталған орталық еуропалық мемлекет. Ол экономикалық күшке, бейтараптыққа және халықаралық қатынастарға мән береді. Оның ықпалы стратегиялық орналасуы мен саяси маңыздылығынан келеді.
bene = Бенилюкс Бельгия, Нидерланд және Люксембург елдерінің ынтымақтастық одағы. Ол экономикалық интеграцияға, саудаға және аймақтық тұрақтылыққа бағытталған. Оның күші тығыз ынтымақтастық пен ортақ өркендеуде жатыр.
bbl3 = Қара Лига қатаң тәртіп пен орталықтандырылған бақылауға негізделген тәртіпті әрі әскери мемлекет. Ол күшке, ішкі бірлікке және күш арқылы кеңеюге мән береді. Оның күші мызғымас билік пен ұйымшылдықтан келеді.
bohe = Богемия бай мәдениеті мен стратегиялық орналасуымен танымал тарихи орталық еуропалық мемлекет. Ол тұрақтылыққа, дамуға және аймақтық ықпалын сақтауға мән береді. Оның күші дәстүр мен төзімділіктен келеді.
gboh3 = Богемия Империясы Орталық Еуропада өз ықпалын кеңейтетін орталықтандырылған мемлекет. Ол мықты басқаруға, әскери күшке және мәдени бірегейлікке мән береді. Оның күші бірлік пен стратегиялық бақылаудан келеді.
buls = Болгар Империясы терең тарихи тамырлары бар, күшті әрі экспансияшыл мемлекет. Ол әскери күшке, аумақтық бақылауға және аймақтық ықпалға мән береді. Оның күші бірлік, төзімділік және стратегиялық басшылықтан келеді.
burg3 = Бургунд Империясы сауда жолдарын бақылауға және аумақтық кеңеюге негізделген қуатты мемлекет. Ол әскери ұйымдасуға, экономикалық күшке және аймақтық үстемдікке мән береді. Оның ықпалы стратегиялық орналасу мен тәртіпті басқарудан келеді.
byza = Византия Империясы мықты басқару жүйесі мен мәдени мұрасымен танымал қуатты әрі ұзақ өмір сүрген мемлекет. Ол дипломатияға, қорғанысқа және өз ықпалын сақтауға мән береді. Оның күші ұйымдасу мен ұзақ дәстүрден келеді.
cary3 = Карпат Империясы мықты табиғи қорғанысы мен қиын жер бедеріне негізделген таулы мемлекет. Ол әскери күшке, стратегиялық орналасуға және аймақтық бақылауға мән береді. Оның күші қиын жері мен төзімді халқынан келеді.
carr = Карфаген саудасымен, теңіз күштерімен және экономикалық ықпалымен танымал қуатты теңіз мемлекеті. Ол саудаға, кеңеюге және маңызды теңіз жолдарын бақылауға мән береді. Оның күші байлық пен Жерорта теңізіндегі үстемдіктен келеді.
cast = Кастилия кеңеюімен және әскери күшімен танымал күшті ибериялық корольдік. Ол жаулап алуға, бірігуге және аумақтық өсуге мән береді. Оның күші тәртіпті әскерлер мен орталықтандырылған биліктен келеді.
argg3 = Каталон Империясы саудаға, мәдениетке және теңіз ықпалына бағытталған аймақтық держава. Ол экономикалық өсуге, стратегиялық порттарға және мықты бірегейлікке мән береді. Оның күші сауда мен жағалауды бақылаудан келеді.
cau3 = Кавказ Империясы негізгі тау асулары мен сауда жолдарын бақылауға негізделген биік таулы мемлекет. Ол қорғанысқа, стратегиялық орналасуға және аймақтық ықпалға мән береді. Оның күші жер бедері мен төзімді халқынан келеді.
gleg = Кельт Одағы ортақ мұра мен ынтымақтастықты бағалайтын кельт халықтарының мәдени одағы. Ол бірлікке, мәдениетті сақтауға және аймақтық күшке мән береді. Оның ықпалы ортақ бірегейлік пен берік дәстүрлерден келеді.
cent = Орталық Америка елдерді сауда және ынтымақтастық арқылы байланыстыратын аймақтық одақ. Ол экономикалық өсуге, тұрақтылыққа және ортақ дамуға мән береді. Оның күші алуан түрлі елдер арасындағы бірлікте жатыр.
chee = Чера саудасымен, теңіз күштерімен және мәдени ықпалымен танымал ежелгі Оңтүстік Үнді мемлекеті. Ол саудаға, теңіз жолдарына және аймақтық өркендеуге мән береді. Оның күші жағалау саудасы мен стратегиялық порттарды бақылаудан келеді.
chol = Чола теңіз үстемдігімен және кеңеюімен танымал қуатты Оңтүстік Үнді империясы. Ол саудаға, жаулап алуға және мықты басқаруға мән береді. Оның күші қуатты флот пен ұйымдасқан басқарудан келеді.
plai3 = Далалар Конфедерациясы ынтымақтастық пен ортақ қорғанысқа мән беретін аумақтардың әлсіз одағы. Ол ауыл шаруашылығына, қозғалысқа және аймақтар арасындағы үйлесімділікке мән береді. Оның күші ашық әрі ресурсты бай жерлердегі бірлікте жатыр.
cos = Казактар тәуелсіздігімен, қозғалыс қабілетімен және әскери шеберлігімен танымал жауынгер қоғам. Олар қорғанысқа, жорықтарға және өз жерін қорғауға мән береді. Олардың күші еркіндік, тәртіп және берік дәстүрлерде жатыр.
coub = Курляндия саудасымен және отарлық бастамаларымен танымал шағын, бірақ амбициялы мемлекет. Ол теңіз арқылы кеңеюге, саудаға және стратегиялық ықпалға мән береді. Оның күші өз көлемінен тыс ықпал ете алуында жатыр.
crkh = Қырым Хандығы жылдам атты әскерімен және жорық күшімен танымал дала мемлекеті. Ол қозғалысқа, әскери күшке және сауда жолдарын бақылауға мән береді. Оның күші жылдамдық пен стратегиялық соғыста жатыр.
cum = Қыпшақтар көшпелі жауынгерлерімен және кең жайылымдарымен танымал дала конфедерациясы. Ол қозғалысқа, жорықтарға және ашық аумақтарды бақылауға мән береді. Оның күші жылдам атты әскер мен бейімделгіштікте жатыр.
cypk = Кипр Корольдігі стратегиялық орналасуымен және теңіз ықпалымен танымал арал мемлекеті. Ол саудаға, дипломатияға және теңіз күшіне мән береді. Оның күші аймақтағы маңызды теңіз жолдарын бақылаудан келеді.
cze = Чехия мықты экономикасы мен мәдени мұрасымен танымал орталық еуропалық мемлекет. Ол тұрақтылыққа, өнеркәсіпке және ішкі дамуға мән береді. Оның күші ұйымдасу мен аймақтық маңыздылықта жатыр.
czsl = Чехословакия аймақтар арасындағы бірлікке және мықты өнеркәсіптік дамуға бағытталған орталық еуропалық мемлекет. Ол тұрақтылыққа, қорғанысқа және экономикалық өсуге мән береді. Оның күші ынтымақтастық пен ортақ бірегейлікте жатыр.
dacc = Дакия ежелгі жауынгер мәдениетімен және қуатты империяларға қарсы төзімділігімен танымал мемлекет. Ол қорғанысқа, аумақтық бақылауға және өз бірегейлігін сақтауға мән береді. Оның күші төзімділік пен табандылықта жатыр.
dalm2 = Далматия теңіз бойындағы стратегиялық орналасуымен және күшті теңіз ықпалымен танымал жағалаулық мемлекет. Ол саудаға, теңіз күшіне және аймақтық бақылауға мән береді. Оның күші порттары мен жағалау жолдарын бақылаудан келеді.
danu3 = Дунай Империясы Дунай өзені бойындағы аумақтарды біріктіретін ірі өзендік мемлекет. Ол саудаға, стратегиялық бақылауға және аймақтар арасындағы экономикалық бірігуге мән береді. Оның күші Еуропадағы маңызды су жолдарының бірін бақылауда жатыр.
nodm = Дания–Норвегия теңіз күшін және мықты теңіз дәстүрлерін бөлісетін екі корольдіктің одағы. Ол саудаға, теңізді бақылауға және ынтымақтастыққа мән береді. Оның күші қуатты флот пен ортақ басқаруда жатыр.
durr = Дуррани Империясы әскери күшімен және аумақтық кеңеюімен танымал Орталық және Оңтүстік Азия мемлекеті. Ол жаулап алуға, бақылауға және аймақтық үстемдікке мән береді. Оның күші мықты басшылық пен тәртіпті әскерлерде жатыр.
eagl3 = Бүркіт Одағы өнеркәсіпке, әскери күшке және технологиялық дамуға бағытталған заманауи қуатты мемлекет. Ол теңіз үстемдігіне және жаһандық ықпалға мән береді. Оның күші инновация мен орасан қуатта жатыр.
eaff = Шығыс Африка Федерациясы мүшелер арасындағы ынтымақтастықты, сауданы және ортақ дамуды қолдайтын аймақтық одақ. Ол экономикалық өсуге, инфрақұрылымға және аймақтық тұрақтылыққа мән береді. Оның күші алуан түрлі елдер арасындағы бірлікте жатыр.
east2 = Шығыс Рим Империясы мықты әкімшілік пен стратегиялық қорғанысқа негізделген Рим мұрасының жалғасы. Ол дипломатияға, әскери күшке және өз ықпалын сақтауға мән береді. Оның күші ұйымдасу мен төзімділікте жатыр.
egy = Египет Корольдігі мәдениетімен, ауыл шаруашылығымен және Ніл өзенін бақылауымен танымал тарихи мемлекет. Ол тұрақтылыққа, ресурстарды басқаруға және аймақтық ықпалға мән береді. Оның күші құнарлы жерлер мен мықты басқаруда жатыр.
bra = Бразилия Империясы кең аумақтарды бақылауға, тұрақтылыққа және кеңеюге бағытталған қуатты мемлекет. Ол экономикалық өсуге, ресурстарды басқаруға және орталықтандырылған билікке мән береді. Оның күші көлемі мен стратегиялық басшылықта жатыр.
jauu3 = Джаунпур Империясы мәдениетімен, сәулетімен және әскери күшімен танымал мықты аймақтық мемлекет. Ол кеңеюге, басқаруға және аймақтық ықпалын сақтауға мән береді. Оның күші тәртіпті билік пен стратегиялық орналасуда жатыр.
rij3 = Риека Империясы стратегиялық порттарымен және теңіз саудасымен танымал жағалаулық мемлекет. Ол теңіз күшіне, саудаға және аймақтық бақылауға мән береді. Оның күші теңіз жолдары бойындағы орналасуында жатыр.
sarr3 = Сардиндер Империясы балық шаруашылығына негізделген жағалаулық және теңізге бағытталған мемлекет. Ол теңіз саудасына, ресурстарды басқаруға және теңіздерді бақылауға мән береді. Оның күші өндіріс пен бірлікте жатыр.
engk = Англия Корольдігі қуатты теңіз күшімен және саяси ықпалымен танымал мемлекет. Ол кеңеюге, саудаға және жаһандық ықпалға мән береді. Оның күші теңіз үстемдігі мен ұйымдасқан басқаруда жатыр.
eng = Англия қуатты теңіз күшімен, өнеркәсібімен және жаһандық ықпалымен танымал мемлекет. Ол саудаға, кеңеюге және халықаралық ықпалын сақтауға мән береді. Оның күші теңіз қуаты мен экономикалық үстемдікте жатыр.
est = Эстония солтүстіктегі төзімділігімен және күшті ұлттық бірегейлігімен танымал мемлекет. Ол тұрақтылыққа, қорғанысқа және аймақтық дамуға мән береді. Оның күші бірлік пен табандылықта жатыр.
evil3 = Зұлым Шотландия қатыгез кеңеюі мен үстемдігімен танымал қараңғы әрі агрессивті мемлекет. Ол жаулап алуға, қорқытуға және орасан күшке мән береді. Оның күші жеңіске жету үшін кез келген тәсілді қолдануында жатыр.
fin = Финляндия төзімділігімен, мықты қорғанысымен және жеріне байланысымен танымал солтүстік мемлекет. Ол тұрақтылыққа, өз-өзіне сенуге және тәуелсіздікті сақтауға мән береді. Оның күші қиын жағдайда бірлік пен табандылықта жатыр.
fish3 = Балық пен картоп империясы жағалаудағы сауда мен балық шаруашылығына негізделген жеңіл көңілді теңіз мемлекеті. Ол ресурстар өндіруге, теңіз ықпалына және тұрақты кеңеюге мән береді. Оның күші өндіріс пен теңіздерді бақылауда жатыр.
fra = Франция мәдениетімен, әскери тарихымен және жаһандық ықпалымен танымал ірі еуропалық держава. Ол дипломатияға, кеңеюге және экономикалық күшке мән береді. Оның күші стратегиялық басшылық пен ұлттық бірлікте жатыр.
frc = Франкония орталық Еуропадағы мәдени бірегейлігі мен стратегиялық орналасуымен танымал аймақтық мемлекет. Ол тұрақтылыққа, дамуға және аймақтық ықпалға мән береді. Оның күші бірлік пен дәстүрде жатыр.
frat3 = Фраталония саудасымен, инновациясымен және аймақтық ықпалымен танымал жағалаулық әрі мәдени бай мемлекет. Ол экономикалық өсуге, тұрақтылыққа және стратегиялық кеңеюге мән береді. Оның күші мәдениет пен сауданың үйлесімінде жатыр.
