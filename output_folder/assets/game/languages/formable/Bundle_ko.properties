LANGUAGENAME = 한국어
baby = 바빌론은 초기 법, 문화, 혁신의 유산 위에 세워진 고대 문명을 부활시킨 국가입니다. 강력한 통치, 발전, 전략적 확장을 중점으로 하며, 목표는 지역 내 역사적 영향력을 회복하는 것입니다.
eunn = 유럽 연합은 협력, 무역, 집단적 의사결정을 강조하는 대규모 정치·경제 연합입니다. 안정, 발전, 회원국 간 평화 유지에 중점을 두며, 외교와 경제를 통해 대륙 전역에 영향력을 미칩니다.
int = 인터마리움은 중앙·동유럽 국가 간 협력에 중점을 둔 지역 동맹입니다. 상호 방어, 경제적 유대, 대국으로부터의 독립을 우선하며, 다양한 국가 간 단합에서 힘을 얻습니다.
lech3 = 레키토프 제국은 레히치트 민족의 유산을 기반으로 한 강력한 국가로, 단합, 전통, 힘을 강조합니다. 문화 정체성, 영토 통제, 장기적 안정성에 집중하며, 목표는 인접 지역에서 지배력을 행사하는 것입니다.
pier3 = 피에르고바 공화국은 유머러스하지만 단합된 국가로, 공유 문화와 전통을 중심으로 합니다. 확장보다는 내부 안정, 공동체, 문화 정체성에 중점을 두며, 유머에도 불구하고 결속력과 회복력을 유지합니다.
plsr = 발트 제국은 발트해 주변 지역을 통합하여 형성된 강력한 국가입니다. 주요 무역로를 통제하며, 해군력과 경제 성장에 집중합니다. 작은 규모에도 불구하고 단합 덕분에 지역에서 우위를 점합니다.
pol2 = 연방국은 여러 국가가 결합하여 방어와 협력을 강화한 연합체입니다. 단일 통치자가 아닌 회원국 간 권력을 공유하며, 안정, 외교, 집단적 성장에 중점을 둡니다.
reda = 레다니아는 규율 있는 군대와 전략적 지도력을 갖춘 강력하고 중앙집권적인 왕국입니다. 확장, 통제, 질서 유지에 집중하며, 지역에서 지배적 세력 중 하나로 자리잡고 있습니다.
zapa3 = 자파도슬라비아는 서슬라브 국가들을 통합한 국가로, 문화적·정치적 유대 강화를 중점으로 합니다. 단합, 지역 안정, 경제 협력에 집중하며, 외부 세력에 맞서 더 강하게 서 있습니다.
slav3 = 슬라브 제국은 슬라브 영토를 하나의 강력한 권위 아래 통합한 광대한 국가입니다. 힘, 확장, 지역 문화 지배에 집중하며, 규모 덕분에 세계 무대에서 주요 세력입니다.
eth = 아비시니아는 고대 전통과 강력한 지도력을 기반으로 한 역사적·회복력 있는 국가입니다. 독립, 방어, 문화 유산 보존에 중점을 두며, 유산 덕분에 지역에서 지속적 영향력을 가집니다.
afg = 아프가니스탄 토후국은 엄격한 지도력과 강력한 전통에 따라 운영되는 국가입니다. 내부 통제, 방어, 국경 내 안정 유지에 중점을 두며, 지형과 회복력으로 정복이 어렵습니다.
afri = 아프리카 연합은 아프리카 국가 간 단합과 협력을 촉진하는 대륙 조직입니다. 경제 성장, 외교, 지역 안정에 중점을 두며, 대륙 전역의 공동 행동에서 힘을 얻습니다.
aksu = 악숨은 무역, 종교, 초기 혁신으로 알려진 고대 강국입니다. 상업, 영향력, 역사적 유산 유지에 집중하며, 뿌리 덕분에 지속적 힘과 정체성을 가집니다.
andd = 알안달루스는 학문, 건축, 무역으로 알려진 문화적·선진 국가입니다. 지식, 번영, 다양한 사회를 강조하며, 지적·경제적 힘에서 영향력을 얻습니다.
alb3 = 알바니아는 독립과 안정을 중점으로 한 회복력 있고 결단력 있는 국가입니다. 방어, 단합, 국가 정체성 보존에 우선하며, 적응력과 인내가 강점입니다.
alpi3 = 알프스 제국은 산악 지역 통제에 기반한 고지대 제국입니다. 방어, 강력한 인프라, 전략적 위치에 집중하며, 지형 덕분에 침략이 어렵고 방어가 쉽습니다.
anda3 = 안달루시아는 풍부한 문화, 무역, 역사적 영향으로 알려진 지역입니다. 경제 성장, 문화 유산, 강한 지역 정체성에 집중하며, 위치 덕분에 지역 간 중요한 연결 고리입니다.
gang3 = 앵글로스피어는 영어권 국가들을 통합하는 문화적·정치적 영역입니다. 협력, 공유 가치, 글로벌 영향력에 집중하며, 전 세계적 범위와 영향력에서 힘을 얻습니다.
anti = 안틸레안 연방은 섬 국가들의 연합으로, 무역, 해군력, 해상 협력에 중점을 둡니다. 해상 통제와 경제적 유대에 의존하며, 분산된 섬들을 하나의 세력으로 강화합니다.
ani = 안티오크는 문화, 무역, 전략적 위치로 유명한 역사적 도시국가입니다. 상업, 외교, 지역 중요성에 중점을 두며, 위치 덕분에 다양한 문명을 연결하는 핵심 허브 역할을 합니다.
abbr = 아람 이슬람 공화국은 신앙, 단합, 체계적 통치를 기반으로 한 국가입니다. 내부 안정, 문화 정체성, 강력한 지도력에 집중하며, 힘은 규율과 공유된 신념에서 나옵니다.
arab = 아라비아는 광활한 사막과 무역로 통제로 알려진 강력한 문명입니다. 자원 관리, 전략적 이동성, 경제적 영향력에 중점을 두며, 단합 덕분에 척박한 환경에서도 번성할 수 있습니다.
arm = 아르메니아는 풍부한 역사와 강한 문화 정체성을 가진 고대 회복력 있는 국가입니다. 방어, 전통, 독립 유지에 집중하며, 오랜 세월 도전을 견뎌 살아남았습니다.
arzt = 아르스토츠카는 엄격하고 강력하게 통제되는 국가로, 보안과 질서에 집중합니다. 국경, 감시, 내부 통제를 최우선하며, 힘은 규율과 흔들림 없는 권위에서 나옵니다.
asha = 아샨티는 금과 강력한 군사 전통으로 유명한 서아프리카 국가입니다. 무역, 자원 통제, 지역 영향력 유지에 집중하며, 힘은 단합과 규율 있는 지도력에서 나옵니다.
gase3 = 동남아시아 국가 연합은 회원국 간 협력, 무역, 안정성을 촉진하는 지역 조직입니다. 경제 성장, 외교, 공동 발전에 집중하며, 다양한 국가 간 단합과 협력에서 힘을 얻습니다.
auhh = 호주-헝가리는 식민지 영향과 강력한 중앙 통치를 결합한 혼합 국가입니다. 확장, 자원 통제, 먼 지역에서 전략적 지배에 집중하며, 전통과 신영토의 결합에서 힘을 얻습니다.
anz3 = 호주-뉴질랜드 연합은 협력, 무역, 공동 안보를 강조하는 밀접한 지역 연합입니다. 경제력, 해군력, 태평양 안정에 집중하며, 단합 덕분에 양국이 상호 지원과 협력을 통해 강화됩니다.
atr = 오스트리아는 안정, 외교, 문화 유산으로 알려진 중부 유럽 국가입니다. 내부 발전, 강력한 통치, 지역 균형 유지에 집중하며, 힘은 질서와 연속성에서 나옵니다.
gatr3 = 오스트리아 제국은 엄격한 통치와 국가 단합을 기반으로 한 중앙집권적 권위 국가입니다. 힘, 질서, 영향력 확장에 집중하며, 권력은 규율과 중앙 통제에서 나옵니다.
asit = 오스트로-이탈리아 제국은 중부 유럽 구조와 이탈리아 문화 영향을 결합한 국가입니다. 확장, 경제력, 지역 전략적 지배에 집중하며, 산업력과 문화 유산의 결합에서 힘을 얻습니다.
aslr = 오스트로슬로바키아는 중부 유럽과 슬라브 지역을 하나의 행정으로 통합한 국가입니다. 안정, 협력, 균형 있는 발전에 집중하며, 다양한 문화와 영토 간 단합에서 힘을 얻습니다.
aval3 = 아발로니아 제국은 고대 신화와 강력한 문화 유산에서 영감을 받은 전설적 국가입니다. 단합, 신비, 전통과 힘을 통한 영향력 확장에 집중하며, 정체성은 유산과 야망에 뿌리를 두고 있습니다.
azan4 = 아자니아 제국은 단합, 자원 통제, 지역 지배를 중점으로 한 강력한 국가입니다. 강력한 지도력, 발전, 영토 안정 유지에 중점을 두며, 힘은 규율과 전략적 성장에서 나옵니다.
azte = 아즈텍 제국은 군사력, 풍부한 전통, 발전된 사회로 알려진 문명입니다. 확장, 공물 징수, 문화적 영향력에 집중하며, 강력한 조직과 전사 중심 체계에서 힘을 얻습니다.
batv = 바타비아 제국은 해상 무역과 수로 통제에 기반한 강력한 국가입니다. 상업, 해군력, 효율적 통치에 집중하며, 주요 무역로와 항구 통제로 영향력을 행사합니다.
bava = 바이에른은 강력한 경제, 문화, 전통으로 알려진 지역 국가입니다. 안정, 산업력, 내부 발전에 집중하며, 유산과 현대적 발전이 정체성을 형성합니다.
bel = 벨기에는 외교, 무역, 협력에 중점을 둔 중부 유럽 국가입니다. 경제력, 중립성, 국제 관계를 강조하며, 전략적 위치와 정치적 중요성에서 영향력을 얻습니다.
bene = 베네룩스는 벨기에, 네덜란드, 룩셈부르크의 협력 연합입니다. 경제 통합, 무역, 지역 안정에 중점을 두며, 긴밀한 협력과 공유 번영에서 힘을 얻습니다.
bbl3 = 블랙 리그는 엄격한 질서와 중앙 통제에 기반한 규율 있는 군사 국가입니다. 힘, 내부 단합, 무력 확장에 집중하며, 권위와 조직에서 힘을 얻습니다.
bohe = 보헤미아는 풍부한 문화와 전략적 위치로 알려진 역사적 중부 유럽 국가입니다. 안정, 발전, 지역 영향력 유지에 집중하며, 전통과 회복력에서 힘을 얻습니다.
gboh3 = 보헤미아 제국은 중부 유럽 전역에 영향력을 확장하는 중앙집권 국가입니다. 강력한 통치, 군사력, 문화 정체성에 집중하며, 단합과 전략적 통제에서 힘을 얻습니다.
buls = 불가리아 제국은 역사적 뿌리가 깊고 강력하며 팽창적인 국가입니다. 군사력, 영토 통제, 지역 영향력에 집중하며, 단합, 회복력, 전략적 지도력에서 힘을 얻습니다.
burg3 = 부르고뉴 제국은 무역로 통제와 강력한 영토 확장에 중심을 둔 강력한 국가입니다. 군사 조직, 경제력, 지역 지배에 집중하며, 전략적 위치와 규율 있는 통치에서 영향력을 얻습니다.
byza = 비잔틴 제국은 강력한 행정과 문화 유산으로 알려진 강력하고 지속적인 국가입니다. 외교, 방어, 지역 영향력 유지에 집중하며, 조직력과 오랜 전통에서 힘을 얻습니다.
cary3 = 카르파티아 제국은 강력한 자연 방어와 험준한 지형을 중심으로 형성된 산악 국가입니다. 군사력, 전략적 위치, 지역 통제에 집중하며, 어려운 지형과 회복력 있는 국민에서 힘을 얻습니다.
carr = 카르타고는 무역, 해군력, 경제 영향력으로 알려진 강력한 해양 국가입니다. 상업, 확장, 주요 해상 무역로 통제에 집중하며, 부와 지중해 지배력에서 힘을 얻습니다.
cast = 카스티야는 팽창과 군사력으로 알려진 강력한 이베리아 왕국입니다. 정복, 통합, 영토 확장에 집중하며, 규율 있는 군대와 중앙 통치에서 힘을 얻습니다.
argg3 = 카탈루냐 제국은 무역, 문화, 해양 영향력에 중점을 둔 지역 강국입니다. 경제 성장, 전략적 항구, 강한 정체성을 강조하며, 상업과 해안 통제에서 힘을 얻습니다.
cau3 = 코카서스 제국은 주요 산길과 무역로를 통제하는 고지대 국가입니다. 방어, 전략적 위치, 지역 영향력에 집중하며, 지형과 회복력 있는 국민에서 힘을 얻습니다.
gleg = 켈틱 연합은 공유된 유산과 협력을 중시하는 켈트 국가들의 문화적 동맹입니다. 단합, 문화 보존, 지역 강점에 집중하며, 공통 정체성과 강력한 전통에서 영향력을 얻습니다.
cent = 중앙아메리카는 무역과 협력을 통해 국가들을 연결하는 지역 연합입니다. 경제 성장, 안정, 공동 발전에 집중하며, 다양한 국가 간 단합에서 힘을 얻습니다.
chee = 체라는 무역, 해군력, 문화적 영향으로 알려진 고대 남인도 국가입니다. 상업, 해상 무역로, 지역 번영에 집중하며, 해안 무역과 전략적 항구 통제에서 힘을 얻습니다.
chol = 촐라는 해상 지배력과 팽창으로 알려진 강력한 남인도 제국입니다. 무역, 정복, 강력한 통치에 집중하며, 강력한 함대와 조직된 행정에서 힘을 얻습니다.
plai3 = 평원 연합은 협력과 공동 방어를 강조하는 느슨한 영토 연합입니다. 농업, 이동성, 지역 간 조정에 집중하며, 개방적이고 자원이 풍부한 땅에서의 단합이 힘의 근원입니다.
cos = 코사크는 독립적이고 기동력 있으며 군사적 기술로 알려진 전사 사회입니다. 방어, 약탈, 고향 보호에 집중하며, 자유, 규율, 강력한 전통에서 힘을 얻습니다.
coub = 쿠를란트는 작지만 야심 있는 국가로, 무역과 식민지 활동으로 알려져 있습니다. 해상 확장, 상업, 전략적 영향력에 집중하며, 규모를 넘어선 힘을 발휘하는 능력에서 힘을 얻습니다.
crkh = 크림 칸국은 빠른 기병과 약탈 능력으로 알려진 초원 국가입니다. 기동력, 군사력, 무역로 통제에 집중하며, 속도와 전략적 전쟁에서 힘을 얻습니다.
cum = 쿠마니아는 유목 전사와 광활한 목초지로 알려진 초원 연합입니다. 기동성, 약탈, 개방된 영토 통제에 집중하며, 빠른 기병과 적응력에서 힘을 얻습니다.
cypk = 키프로스 왕국은 전략적 위치와 해양 영향력으로 알려진 섬 국가입니다. 무역, 외교, 해군력에 집중하며, 지역 주요 해상 경로 통제에서 힘을 얻습니다.
cze = 체코는 강력한 경제와 문화 유산으로 알려진 중부 유럽 국가입니다. 안정, 산업, 내부 발전에 집중하며, 조직력과 지역적 중요성에서 힘을 얻습니다.
czsl = 체코슬로바키아는 지역 간 단합과 강력한 산업 발전에 중점을 둔 중부 유럽 국가입니다. 안정, 방어, 경제 성장에 집중하며, 협력과 공유된 정체성에서 힘을 얻습니다.
dacc = 다키아는 강력한 전사 문화와 강력 제국에 대한 저항으로 알려진 고대 국가입니다. 방어, 영토 통제, 정체성 유지에 집중하며, 회복력과 결단력에서 힘을 얻습니다.
dalm2 = 달마티아는 해안선과 강력한 해양 영향력으로 알려진 해안 국가입니다. 무역, 해군력, 지역 통제에 집중하며, 항구와 해안 경로 통제에서 힘을 얻습니다.
danu3 = 다뉴브 제국은 다뉴브를 따라 영토를 통합한 강력한 강 기반 국가입니다. 무역, 전략적 통제, 지역 경제 통합에 집중하며, 유럽에서 중요한 수로 통제에서 힘을 얻습니다.
nodm = 덴마크-노르웨이는 해군력과 강력한 해양 전통을 공유하는 두 왕국의 연합입니다. 무역, 해상 통제, 영토 간 협력에 집중하며, 강력한 해군과 공동 통치에서 힘을 얻습니다.
durr = 두라니 제국은 중앙 및 남아시아에서 군사력과 영토 확장으로 유명한 강력한 국가입니다. 정복, 통제, 지역 지배에 집중하며, 강력한 지도력과 규율 있는 군대에서 힘을 얻습니다.
eagl3 = 독수리 연합은 산업, 군사력, 기술 발전에 중점을 둔 현대적 강국입니다. 해상 우위와 세계적 영향력에 집중하며, 혁신과 압도적 능력에서 힘을 얻습니다.
eaff = 동아프리카 연방은 회원국 간 협력, 무역, 공동 발전을 강조하는 지역 연합입니다. 경제 성장, 인프라, 지역 안정에 집중하며, 다양한 국가 간 단합에서 힘을 얻습니다.
east2 = 동로마 제국은 강력한 행정과 전략적 방어를 중심으로 로마 유산을 계승한 국가입니다. 외교, 군사력, 영향력 유지에 집중하며, 조직력과 지속력에서 힘을 얻습니다.
egy = 이집트 왕국은 문화, 농업, 나일 통제로 유명한 역사적 영향력 있는 국가입니다. 안정, 자원 관리, 지역 영향력에 집중하며, 비옥한 땅과 강력한 통치에서 힘을 얻습니다.
bra = 브라질 제국은 확장, 안정, 광활한 영토 통제에 중점을 둔 강력한 국가입니다. 경제 성장, 자원 관리, 중앙 권력에 집중하며, 규모와 전략적 지도력에서 힘을 얻습니다.
jauu3 = 자운푸르 제국은 문화, 건축, 군사력으로 유명한 강력한 지역 국가입니다. 확장, 통치, 지역 영향력 유지에 집중하며, 규율 있는 통치와 전략적 위치에서 힘을 얻습니다.
rij3 = 리예카 제국은 전략적 항구와 해상 무역으로 알려진 해안 국가입니다. 해군력, 상업, 지역 통제에 집중하며, 주요 해상 경로 위치에서 힘을 얻습니다.
sarr3 = 정어리 제국은 강력한 어업 경제로 알려진 해안 및 해군 중심 국가입니다. 해상 무역, 자원 관리, 바다 통제에 집중하며, 산업력과 단합에서 힘을 얻습니다.
engk = 잉글랜드 왕국은 강력한 해군과 정치적 영향력으로 알려진 강력한 국가입니다. 확장, 무역, 세계적 영향력에 집중하며, 해상 우위와 조직된 통치에서 힘을 얻습니다.
eng = 잉글랜드는 강력한 해군, 산업, 세계적 영향력으로 알려진 강력한 국가입니다. 무역, 확장, 국제적 영향력 유지에 집중하며, 해군력과 경제적 우위에서 힘을 얻습니다.
est = 에스토니아 왕국은 회복력과 강한 정체성으로 알려진 북부 국가입니다. 안정, 방어, 지역 발전에 집중하며, 단합과 결단력에서 힘을 얻습니다.
evil3 = 악의 스코틀랜드는 잔혹한 확장과 지배로 알려진 어둡고 공격적인 국가입니다. 정복, 공포, 압도적 힘에 집중하며, 승리를 위해 무엇이든 할 의지에서 힘을 얻습니다.
fin = 핀란드는 회복력, 강력한 방어, 땅과의 연결로 알려진 북부 국가입니다. 안정, 자립, 독립 유지에 집중하며, 척박한 환경에서의 단합과 결단력에서 힘을 얻습니다.
fish3 = 피시 앤 칩스 제국은 해안 무역과 어업을 중심으로 한 가벼운 해양 국가입니다. 자원 생산, 해군력, 안정적 확장에 집중하며, 산업력과 바다 통제에서 힘을 얻습니다.
fra = 프랑스는 강력한 문화, 군사 역사, 세계적 영향력으로 알려진 주요 유럽 강국입니다. 외교, 확장, 경제력에 집중하며, 전략적 지도력과 국가 단합의 결합에서 힘을 얻습니다.
frc = 프랑코니아는 강한 문화 정체성과 중부 유럽에서 전략적 위치로 알려진 지역 국가입니다. 안정, 발전, 지역 영향력에 집중하며, 단합과 전통에서 힘을 얻습니다.
frat3 = 프라탈로니아는 무역, 혁신, 지역 영향력으로 알려진 해안과 문화적 풍부한 국가입니다. 경제 성장, 안정, 전략적 확장에 집중하며, 문화와 상업의 결합에서 힘을 얻습니다.
fri = 프리지아는 해양 전통과 무역망으로 알려진 해안 국가입니다. 해상 통제, 상업, 지역 안정에 집중하며, 항구와 해군 기술에서 힘을 얻습니다.
gaja3 = 가자파티 제국은 강력한 군사력과 문화적 영향력으로 알려진 강력한 지역 국가입니다. 확장, 통치, 지역 지배 유지에 집중하며, 규율 있는 통치와 전략적 지도력에서 힘을 얻습니다.
frak3 = 갈리아 제국은 군사력과 전략적 통제로 알려진 강력하고 규율 있는 국가입니다. 확장, 조직화, 영토 내 질서 유지에 집중하며, 단합과 강력한 지도력에서 힘을 얻습니다.
ger = 독일 제국은 강력한 산업과 군사력으로 유명한 고도로 조직된 국가입니다. 확장, 효율성, 국가적 힘에 집중하며, 규율, 기술, 중앙집권적 지도력에서 힘을 얻습니다.
ghav = 가즈나는 군사 원정과 확장으로 알려진 강력한 중세 국가입니다. 정복, 무역로 통제, 지역 지배에 집중하며, 규율 있는 군대와 전략적 지도력에서 힘을 얻습니다.
gogg = 고구려는 강력한 군사력과 요새화된 국경으로 알려진 고대 왕국입니다. 방어, 확장, 영토 통제 유지에 집중하며, 회복력과 전략적 전쟁에서 힘을 얻습니다.
grc = 그란 콜롬비아는 남미 영토를 통합하는 데 중점을 둔 대규모 지역 국가입니다. 독립, 안정, 강력한 통치에 집중하며, 광대한 영토 통제와 단합에서 힘을 얻습니다.
uni2 = 대영제국은 강력한 해군과 세계적 영향력으로 알려진 강력한 섬나라입니다. 무역, 확장, 먼 영토 통제 유지에 집중하며, 해상 우위와 경제력에서 힘을 얻습니다.
gmor3 = 대모라비아는 문화적·종교적 발전으로 알려진 초기 슬라브 국가입니다. 단합, 확장, 지역 영향력 확산에 집중하며, 초기 조직력과 공유된 정체성에서 힘을 얻습니다.
spir3 = 대정령 연방은 공유된 신념과 전통에 의해 안내되는 신비적 연합입니다. 단합, 조화, 집단적 힘에 집중하며, 협력과 강한 영적 정체성에서 힘을 얻습니다.
grea3 = 대동아 공영권은 동아시아 국가 간 단합과 협력을 강조하는 지역 블록입니다. 경제 통합, 자원 공유, 집단적 힘에 집중하며, 지역 내 협조와 공유된 영향력에서 힘을 얻습니다.
nirr3 = 대니제르 제국은 니제르 지역과 그 자원을 중심으로 한 강력한 국가입니다. 무역, 확장, 지역 지배에 집중하며, 경제 통제와 전략적 단합에서 힘을 얻습니다.
porg = 대포르투갈은 해상 무역과 해외 영향력에 중점을 둔 확장 국가입니다. 탐험, 상업, 해로 통제에 집중하며, 해군력과 글로벌 영향력에서 힘을 얻습니다.
gre = 그리스는 풍부한 역사, 문화, 전략적 위치로 알려진 유럽 국가입니다. 안정, 방어, 지역 영향력 유지에 집중하며, 단합과 강력한 문화적 정체성에서 힘을 얻습니다.
hans3 = 한자동맹은 상업 도시들의 강력한 무역 동맹입니다. 무역, 상호 방어, 공동 번영에 집중하며, 회원 간 단합에서 힘을 얻습니다.
hgr4 = 신성 독일 제국은 단합, 질서, 전통에 기반한 중앙집권적 권위 국가입니다. 힘, 확장, 영토 통제 유지에 집중하며, 규율과 강력한 지도력에서 힘을 얻습니다.
holy = 신성 로마 제국은 여러 영토가 공통 권위 아래 연합된 분권적 국가입니다. 협력, 정치적 균형, 지역 영향력 유지에 집중하며, 단합과 공유된 통치에서 힘을 얻습니다.
hun = 헝가리는 강한 정체성과 역사적 유산으로 알려진 중부 유럽 국가입니다. 안정, 방어, 지역 영향력 유지에 집중하며, 단합과 회복력에서 힘을 얻습니다.
ical3 = 이베리아 칼리프국은 이베리아 반도를 하나의 통치 아래 통합한 강력한 국가입니다. 확장, 문화, 강력한 통치에 집중하며, 단합과 전략적 지도력에서 힘을 얻습니다.
iber = 이베리아 연합은 이베리아 반도의 국가들을 통합한 지역 국가입니다. 협력, 경제 성장, 공유된 안정성에 집중하며, 단합과 강력한 지역적 유대에서 힘을 얻습니다.
ots3 = 오스만 제국은 군사력과 광대한 영토 통제로 알려진 강력한 국가입니다. 확장, 강력한 통치, 전략적 지배에 집중하며, 규율 있는 지도력과 강력한 군대에서 힘을 얻습니다.
inca = 잉카 제국은 조직력, 농업, 공학으로 유명한 강력한 안데스 국가입니다. 확장, 자원 관리, 강력한 중앙 통제에 집중하며, 단합과 선진 인프라에서 힘을 얻습니다.
ind = 인도는 풍부한 문화, 경제, 역사로 알려진 크고 다양한 국가입니다. 개발, 안정, 지역 영향력 유지에 집중하며, 다양성 속 단합과 강력한 성장에서 힘을 얻습니다.
indo3 = 인도차이나 제국은 동남아시아 영토를 통합한 지역 국가입니다. 농업, 무역, 지역 전략적 통제에 집중하며, 단합과 공유된 발전에서 힘을 얻습니다.
ins = 인도네시아는 광활한 섬과 풍부한 자원으로 알려진 큰 군도 국가입니다. 경제 성장, 해상 통제, 국가 단합에 집중하며, 다양성과 전략적 위치에서 힘을 얻습니다.
kita = 이탈리아 왕국은 문화 유산과 전략적 위치로 알려진 유럽 국가입니다. 단합, 경제 개발, 지역 영향력에 집중하며, 공유된 정체성과 강력한 통치에서 힘을 얻습니다.
ita = 이탈리아는 풍부한 문화, 역사, 경제력으로 알려진 유럽 국가입니다. 개발, 안정, 지역 영향력 유지에 집중하며, 문화적 유산과 전략적 위치에서 힘을 얻습니다.
jap = 일본 제국은 군사력, 산업 성장, 확장 야망으로 알려진 강력한 국가입니다. 현대화, 통제, 지역 지배에 집중하며, 규율, 기술, 강력한 조직력에서 힘을 얻습니다.
jur = 예루살렘 왕국은 전략적 위치와 종교적 중요성으로 알려진 중세 국가입니다. 방어, 신앙, 핵심 영토 통제 유지에 집중하며, 상징적 가치와 강력한 요새화에서 힘을 얻습니다.
keis3 = 카이저라이히는 카이저가 통치하는 제국으로, 강력한 권위와 중앙집권적 통치로 알려져 있습니다. 군사력, 확장, 엄격한 통치에 집중하며, 규율과 통합된 지도력에서 힘을 얻습니다.
kalm = 칼마르 연합은 단일 군주 아래 통합된 북유럽 왕국의 정치적 연합입니다. 협력, 해군력, 지역 안정에 집중하며, 회원국 간 단합에서 힘을 얻습니다.
kek = 케카스탄은 밈 기반 인터넷의 가상·풍자적 국가입니다. 유머, 아이러니, 온라인 문화에 집중하며, 정치력이나 영토보다 인터넷 커뮤니티와 패러디 정체성에서 힘을 얻습니다.
kilw = 킬와는 동아프리카 연안에서 무역과 해양 영향력으로 알려진 강력한 스와힐리 도시국가입니다. 상업, 항해, 인도양 무역로 통제에 집중하며, 부, 전략적 위치, 강력한 무역망에서 힘을 얻습니다.
arles4 = 아를 왕국은 전략적 위치와 문화적 융합으로 알려진 서유럽의 역사적 중세 국가입니다. 무역, 외교, 지역 안정에 집중하며, 위치와 다양한 지역 간 연결에서 힘을 얻습니다.
ire = 아일랜드는 풍부한 문화, 역사, 강한 민족 정체성으로 알려진 섬 국가입니다. 안정, 경제 성장, 독립 유지에 집중하며, 단합과 문화적 유산에서 힘을 얻습니다.
rivi3 = 리비에라 왕국은 전략적 해안선과 해양 영향력으로 알려진 해안 국가입니다. 무역, 관광, 경제적 번영에 집중하며, 해안 위치와 주요 해상 경로 통제에서 힘을 얻습니다.
jos = 조선은 강력한 유교 전통과 중앙집권적 통치로 알려진 역사적 한국 왕조입니다. 안정, 문화, 학문적 행정에 집중하며, 전통, 교육, 조직화된 통치에서 힘을 얻습니다.
kur = 쿠르디스탄은 강력한 문화 정체성과 산악 지형으로 알려진 지역입니다. 단합, 회복력, 지역 자치에 집중하며, 공유된 유산과 결단력에서 힘을 얻습니다.
glat3 = 라틴 아메리카 연합은 라틴 아메리카 국가들의 지역적 협력 동맹입니다. 경제 성장, 문화적 단합, 회원국 간 상호 지원에 집중하며, 협력, 지역적 연대, 조정된 발전에서 힘을 얻습니다.
lati = 라틴 제국은 강력한 권위와 영토 확장에 기반한 중앙집권 국가입니다. 통치, 문화적 영향력, 지역 통제 유지에 집중하며, 단합과 규율 있는 지도력에서 힘을 얻습니다.
lat = 라트비아는 강한 문화적 정체성과 해안 지리로 알려진 발트 국가입니다. 안정, 경제 발전, 지역 협력에 집중하며, 단합과 회복력에서 힘을 얻습니다.
leva3 = 레반트 제국은 동부 지중해를 중심으로 한 지역 국가입니다. 무역, 문화 교류, 주요 해안 및 내륙 경로의 전략적 통제에 집중하며, 위치와 다양한 문화적 영향력에서 힘을 얻습니다.
liaa = 요는 강력한 기병과 북부 영토 통제로 알려진 역사적 강국입니다. 확장, 군사력, 다양한 인구 관리에 집중하며, 기동성과 효과적 지도력에서 힘을 얻습니다.
lib = 리비아는 광활한 사막과 천연자원으로 알려진 북아프리카 국가입니다. 안정, 자원 관리, 지역 영향력에 집중하며, 지리적 이점과 에너지 부에서 힘을 얻습니다.
lit = 리투아니아는 강한 역사적 유산과 문화적 정체성으로 알려진 발트 국가입니다. 안정, 경제 발전, 지역 협력에 집중하며, 단합과 회복력에서 힘을 얻습니다.
lavv = 리보니아는 발트 해안을 따라 전략적 위치로 알려진 역사적 지역입니다. 무역, 방어, 지역 통제에 집중하며, 항구와 주요 무역로 영향력에서 힘을 얻습니다.
lot = 로타링기아는 주요 강국 사이의 전략적 위치로 알려진 역사적 중부 유럽 국가입니다. 외교, 무역, 지역 균형 유지에 집중하며, 위치와 문화적 다양성에서 힘을 얻습니다.
glux3 = 룩셈부르크 제국은 작지만 영향력 있는 국가로 전략적 위치와 금융력으로 알려져 있습니다. 외교, 안정, 경제력에 집중하며, 부와 스마트한 통치에서 힘을 얻습니다.
lux2 = 룩셈부르크는 작지만 부유한 국가로 금융력과 유럽 내 전략적 위치로 알려져 있습니다. 안정, 외교, 경제력에 집중하며, 번영과 효율적 통치에서 힘을 얻습니다.
macc = 마케도니아는 규율 있는 지도력 아래 강력한 군사력과 확장으로 알려진 고대 왕국입니다. 정복, 조직, 지역 지배에 집중하며, 군대와 전략적 비전에서 힘을 얻습니다.
mad = 마다가스카르는 독특한 생물다양성과 지리적 고립으로 알려진 섬 국가입니다. 안정, 환경 자원, 지역 개발에 집중하며, 자연 자원과 독특한 생태계에서 힘을 얻습니다.
mag = 마가다르는 강력한 행정과 군사력으로 알려진 남아시아 고대 강국입니다. 확장, 통치, 지역 지배에 집중하며, 조직화된 통치와 전략적 지도력에서 힘을 얻습니다.
gmag3 = 마그레브 아랍 연방은 북아프리카 국가들의 지역 연합으로 협력과 공동 발전에 집중합니다. 경제 성장, 문화적 단합, 정치적 협력에서 힘을 얻습니다.
magy3 = 마자르 제국은 강한 정체성과 전사 전통으로 알려진 중부 유럽 강국입니다. 확장, 통치, 영토 통제 유지에 집중하며, 단합과 규율 있는 지도력에서 힘을 얻습니다.
gmaj3 = 마자파힛 제국은 강력한 해군과 동남아시아 전역 영향력으로 알려진 해양 국가입니다. 무역, 확장, 지역 통제에 집중하며, 해상 우위와 전략적 동맹에서 힘을 얻습니다.
mal = 말레이시아는 문화적 다양성과 전략적 위치로 알려진 동남아시아 국가입니다. 경제 성장, 안정, 지역 협력에 집중하며, 단합과 강력한 무역망에서 힘을 얻습니다.
mara = 마라타 제국은 강력한 군사력과 분권적 지도력으로 알려진 인도 국가입니다. 확장, 기동성, 대국에 대한 저항에 집중하며, 기병력, 전략, 지역 단합에서 힘을 얻습니다.
maur = 마우리아 제국은 광대한 영토 통제와 강력한 중앙 행정으로 알려진 고대 강국입니다. 확장, 통치, 지역 질서 유지에 집중하며, 규율 있는 통치와 효율적 조직에서 힘을 얻습니다.
meko3 = 메콩 제국은 메콩강을 중심으로 비옥한 땅과 무역로로 알려진 지역 국가입니다. 농업, 상업, 지역 협력에 집중하며, 강 시스템과 자원 풍부한 환경에서 힘을 얻습니다.
mex2 = 멕시코 제국은 지역 통합과 안정성을 추구한 역사적 북미 군주국입니다. 권위, 국가 정체성, 정치적 통합에 집중하며, 중앙집권적 통치와 강한 주권 의식에서 힘을 얻습니다.
mo = 멕시코 제국은 영토 확장과 문화 유산으로 알려진 강력한 북미 국가입니다. 통치, 지역 영향력, 경제 발전에 집중하며, 단합과 강력한 지도력에서 힘을 얻습니다.
mone3 = 몽골 제국은 전례 없는 기동력과 군사력으로 알려진 광대한 강국입니다. 정복, 확장, 거대한 영토 통제에 집중하며, 규율 있는 기병과 전략적 지도력에서 힘을 얻습니다.
moor3 = 무어 제국은 문화적 성취와 지역적 영향력으로 알려진 강력한 국가입니다. 무역, 지식, 영토 통제에 집중하며, 혁신, 학문, 전략적 확장에서 힘을 얻습니다.
mog = 모로코는 풍부한 문화, 역사, 전략적 위치로 알려진 북아프리카 국가입니다. 안정, 경제 성장, 지역 영향력 유지에 집중하며, 단합과 문화 유산에서 힘을 얻습니다.
mosi = 모시 제국은 강력한 기병과 조직화된 왕국으로 알려진 서아프리카 강국입니다. 방어, 확장, 지역 통제 유지에 집중하며, 규율 있는 지도력과 전사 전통에서 힘을 얻습니다.
mugh = 무굴 제국은 풍부한 문화, 건축, 강력한 행정으로 알려진 남아시아 강국입니다. 확장, 통치, 경제 번영에 집중하며, 중앙집권적 지도력과 강력한 군사력에서 힘을 얻습니다.
nand3 = 난다 제국은 부와 강력한 중앙 통치로 알려진 고대 인도 국가입니다. 확장, 통제, 경제력 유지에 집중하며, 광대한 자원과 규율 있는 행정에서 힘을 얻습니다.
nep = 네팔은 산악 지형과 문화 유산으로 알려진 히말라야 국가입니다. 안정, 독립, 지역 협력에 집중하며, 단합, 회복력, 전략적 위치에서 힘을 얻습니다.
net = 네덜란드는 강력한 무역망과 해양 역사로 알려진 유럽 국가입니다. 상업, 혁신, 경제 발전에 집중하며, 무역, 기술력, 전략적 해안 통제에서 힘을 얻습니다.
nors = 북해 제국은 해상 경로와 해안 영토 통제로 알려진 강력한 해양 국가입니다. 해군 우위, 무역, 해상 확장에 집중하며, 함대와 해양 네트워크 통제에서 힘을 얻습니다.
occa = 옥시타니아는 남부 유럽에서 독특한 언어와 문화 유산으로 알려진 문화적·지역적 국가입니다. 문화 보존, 지역 정체성, 협력에 집중하며, 공유된 전통과 문화적 단합에서 힘을 얻습니다.
nez = 뉴질랜드는 자연경관과 지리적 고립으로 알려진 섬 국가입니다. 안정, 환경 보전, 경제 발전에 집중하며, 천연자원과 강력한 국가 정체성에서 힘을 얻습니다.
goma3 = 오만 제국은 강력한 해군과 무역로 통제로 알려진 강력한 해양 국가입니다. 상업, 확장, 지역 영향력 유지에 집중하며, 항해 기술과 전략적 지도력에서 힘을 얻습니다.
oma2 = 오만은 전략적 위치와 해양 유산으로 알려진 중동 국가입니다. 안정, 무역, 지역 협력에 집중하며, 해안 위치와 균형 잡힌 외교에서 힘을 얻습니다.
tur = 오스만 제국은 광대한 영토 통제와 강력한 군사력으로 알려진 강력하고 장수한 국가입니다. 확장, 통치, 전략적 지배에 집중하며, 규율 있는 지도력과 조직화된 행정에서 힘을 얻습니다.
mya = 파간 제국은 강력한 종교 문화와 건축적 성취로 알려진 고대 국가입니다. 확장, 건설, 지역 영향력 유지에 집중하며, 문화적 유산과 전략적 지도력에서 힘을 얻습니다.
pak = 파키스탄은 전략적 위치와 문화적 다양성으로 알려진 남아시아 국가입니다. 안정, 경제 개발, 지역 안보에 집중하며, 단합, 회복력, 강한 국가 정체성에서 힘을 얻습니다.
pagr4 = 파트리아 그란데는 라틴 아메리카 전역의 통합을 목표로 한 지역 개념입니다. 문화 공유, 정치적 통합, 경제 협력에 집중하며, 지역 통합과 집단 정체성에서 힘을 얻습니다.
ira = 페르시아 제국은 광대한 영토와 고급 행정으로 알려진 강력한 고대 국가입니다. 확장, 통치, 문화 통합에 집중하며, 효율적 조직과 전략적 지도력에서 힘을 얻습니다.
pebo = 페루-볼리비아 연합은 페루와 볼리비아를 통합한 단명한 지역 연합입니다. 협력, 공동 통치, 지역적 힘에 집중하며, 단합과 결합된 자원에서 힘을 얻습니다.
per = 페루는 풍부한 역사와 다양한 지리로 알려진 남아메리카 국가입니다. 경제 개발, 안정, 문화 유산에 집중하며, 자원, 역사, 국가 정체성에서 힘을 얻습니다.
phi = 필리핀은 수많은 섬과 풍부한 문화적 다양성으로 알려진 동남아시아 군도 국가입니다. 경제 성장, 해양력, 지역 협력에 집중하며, 단합과 전략적 섬 지리에서 힘을 얻습니다.
pizz3 = 피자 제국은 음식 문화와 창의력을 중심으로 한 유쾌하고 유머러스한 국가입니다. 즐거움, 무역, 음식 문화를 통한 영향력에 집중하며, 인기, 공동 즐거움, 강한 요리 정체성에서 힘을 얻습니다.
pol = 폴란드는 풍부한 역사와 문화적 회복력으로 알려진 중부 유럽 국가입니다. 안정, 경제 발전, 지역 협력에 집중하며, 단합, 유산, 강한 국가 정체성에서 힘을 얻습니다.
pome = 포메라니아는 발트해 접근으로 알려진 역사적 해안 지역입니다. 무역, 해양 활동, 지역 영향력에 집중하며, 항구와 전략적 해안 위치에서 힘을 얻습니다.
prus = 프로이센은 강력한 군사 전통과 규율 있는 통치로 알려진 역사적 국가입니다. 확장, 조직, 효율성에 집중하며, 군사 구조와 중앙집권적 지도력에서 힘을 얻습니다.
qara = 카라코윤루는 강력한 기병과 지역 영토 통제로 알려진 부족 연합입니다. 확장, 전쟁, 영토 권위 유지에 집중하며, 군사적 기동성과 부족 단합에서 힘을 얻습니다.
qin = 청 제국은 광대한 영토와 강력한 중앙 통치로 알려진 강력한 국가입니다. 통치, 문화 통합, 다양한 지역 통제에 집중하며, 규율 있는 행정과 크고 조직적인 군사력에서 힘을 얻습니다.
rash = 라시둔 칼리프국은 초기 이슬람 강국으로 급속한 확장과 강력한 종교적 단합으로 알려져 있습니다. 통치, 신앙 전파, 광대한 영토 질서 유지에 집중하며, 종교 지도력과 규율 있는 행정에서 힘을 얻습니다.
ratt = 라타나코신 왕국은 문화적 유산과 왕실 계승으로 알려진 역사적 태국 국가입니다. 통치, 전통, 지역 안정에 집중하며, 중앙집권적 군주제와 문화 보존에서 힘을 얻습니다.
red3 = 홍해 제국은 홍해 중심의 해양 국가로 주요 무역로 통제로 알려져 있습니다. 상업, 해군 활동, 지역 영향력에 집중하며, 전략적 수로와 해양 무역망에서 힘을 얻습니다.
cono3 = 코노수르 공화국은 남아메리카 남부 국가 중심의 지역 정치 개념입니다. 협력, 경제 통합, 공동 통치에 집중하며, 지역 단합과 결합된 경제력에서 힘을 얻습니다.
rom = 루마니아는 다양한 문화와 역사적 유산으로 알려진 유럽 국가입니다. 발전, 안정, 지역 협력에 집중하며, 문화적 풍부함과 전략적 지리적 위치에서 힘을 얻습니다.
spqr = 로마 제국은 광대한 영토와 선진 행정으로 알려진 강력한 고대 문명입니다. 확장, 법, 인프라에 집중하며, 강력한 조직력, 군사력, 행정 체계에서 힘을 얻습니다.
rum = 룸 술탄국은 문화적 혼합과 전략적 위치로 알려진 역사적 아나톨리아 국가입니다. 통치, 무역, 문화 교류에 집중하며, 문명 교차점으로서의 위치에서 힘을 얻습니다.
rus2 = 러시아 제국은 광대한 영토와 강력한 중앙 권위로 알려진 강력한 국가입니다. 확장, 통치, 지정학적 영향력에 집중하며, 큰 영토와 규율 있는 행정에서 힘을 얻습니다.
gbra3 = 러시아 제국은 광대하고 강력한 영토와 강력한 전제 정치로 알려진 국가입니다. 확장, 중앙집권적 통치, 지역 영향력 유지에 집중하며, 크기, 자원, 규율 있는 행정에서 힘을 얻습니다.
saff3 = 사파르 왕조는 초기 이슬람 페르시아 국가로 급속한 부상과 군사력으로 알려져 있습니다. 확장, 통치, 지역 통제에 집중하며, 군사 지도력과 전략적 야망에서 힘을 얻습니다.
saku3 = 사쿠라 제국은 일본 문화와 전통에서 영감을 받은 개념적 국가입니다. 문화, 규율, 기술 발전에 집중하며, 조직력과 문화적 정체성에서 힘을 얻습니다.
samo = 사모 제국은 다양한 슬라브 집단을 단일 지도력 아래 통합한 부족 국가입니다. 단합, 방어, 지역 안정에 집중하며, 협력과 집단적 저항에서 힘을 얻습니다.
sard = 사르데냐는 전략적 위치와 문화 유산으로 알려진 지중해 섬 국가입니다. 무역, 안정, 지역 영향력에 집중하며, 해양 위치와 천연 자원에서 힘을 얻습니다.
sasa = 사산 왕조는 강력한 행정과 문화적 성취로 알려진 고대 페르시아 국가입니다. 확장, 통치, 이웃 강국과의 경쟁에 집중하며, 중앙집권적 통치와 규율 있는 군사력에서 힘을 얻습니다.
sau = 사우디아라비아는 광활한 사막과 중요한 에너지 자원으로 알려진 중동 국가입니다. 경제 개발, 안정, 지역 영향력에 집중하며, 천연자원과 전략적 지도력에서 힘을 얻습니다.
gsca3 = 스칸디나비아 제국은 북유럽 국가들의 통합된 힘을 나타내는 개념적 국가입니다. 협력, 안정, 경제 발전에 집중하며, 단합, 혁신, 강력한 사회 시스템에서 힘을 얻습니다.
scyt4 = 스키타이아는 숙련된 기마병과 전사 문화로 알려진 고대 유목 지역입니다. 기동성, 전쟁, 영토 영향력에 집중하며, 기병력과 광활한 땅에서의 적응력에서 힘을 얻습니다.
ser2 = 세르비아 제국은 영토 확장과 문화적 성취로 알려진 강력한 중세 발칸 국가입니다. 통치, 정복, 지역 영향력에 집중하며, 강력한 지도력과 군사 조직에서 힘을 얻습니다.
tha2 = 시암은 풍부한 문화와 외교로 알려진 역사적 동남아시아 국가입니다. 통치, 문화 보존, 지역 균형에 집중하며, 적응력과 강력한 중앙 지도력에서 힘을 얻습니다.
sic = 시칠리아 왕국은 문화적 혼합과 전략적 위치로 알려진 역사적 지중해 국가입니다. 무역, 통치, 문화 교류에 집중하며, 문명 교차점으로서의 위치에서 힘을 얻습니다.
soko = 소코토는 강력한 종교적·행정 구조로 알려진 서아프리카 이슬람 국가입니다. 통치, 확장, 종교적 가치 전파에 집중하며, 단합, 지도력, 조직적 행정에서 힘을 얻습니다.
somi3 = 소말리 제국은 역사적 동아프리카 해양 및 무역 국가로 해안 영향력과 상업으로 알려져 있습니다. 무역, 해군 활동, 지역 통제에 집중하며, 항해 기술과 전략적 해안망에서 힘을 얻습니다.
som = 소말리아는 아프리카 뿔 지역의 긴 해안선과 문화 유산으로 알려진 국가입니다. 안정, 무역, 지역 협력에 집중하며, 해양 접근과 문화적 단합에서 힘을 얻습니다.
gsg3 = 남독일 연방은 남독일 지역을 통합한 역사적 중부 유럽 지역 국가입니다. 협력, 통치, 지역 안정에 집중하며, 공유된 정체성과 협조된 지도력에서 힘을 얻습니다.
rus = 소련은 광대한 영토와 중앙집권적 정치 체제로 알려진 강력한 역사적 국가입니다. 통치, 산업 개발, 세계적 영향력에 집중하며, 중앙 계획과 강력한 국가 통제에서 힘을 얻습니다.
spa = 스페인은 풍부한 역사, 문화, 글로벌 해양 영향력으로 알려진 유럽 국가입니다. 관광, 문화 유산, 경제 개발에 집중하며, 문화적 다양성과 역사적 유산에서 힘을 얻습니다.
spa4 = 스페인 제국은 광대한 해외 영토와 해양 지배력으로 알려진 강력한 역사적 세계 제국입니다. 확장, 무역, 문화적 영향력에 집중하며, 해군력과 식민지 확장에서 힘을 얻습니다.
spaem = 스파르타 제국은 고대 스파르타에서 영감을 받은 역사적 스타일의 국가로, 엄격한 규율과 군사 중심으로 알려져 있습니다. 전쟁, 훈련, 사회 질서 유지에 집중하며, 군사적 엄격함과 단합에서 힘을 얻습니다.
sri = 스리랑카는 남아시아의 섬나라로, 문화 유산과 자연미로 알려져 있습니다. 안정, 무역, 지역 협력에 집중하며, 전략적 위치와 문화적 다양성에서 힘을 얻습니다.
suns3 = 선셋 제국은 전환, 유산, 문화적 상징성을 나타내는 상징적 국가입니다. 단합, 정체성, 지역 영향력에 집중하며, 공유된 비전과 문화적 응집력에서 힘을 얻습니다.
swab = 슈바비아는 중부 유럽의 역사적 지역으로, 문화적·정치적 영향력으로 알려져 있습니다. 지역 정체성, 협력, 통치에 집중하며, 문화적 단합과 역사적 유산에서 힘을 얻습니다.
swi = 스위스는 중립, 안정, 강력한 금융 시스템으로 알려진 유럽 국가입니다. 평화, 통치, 경제 개발에 집중하며, 정치적 중립성과 강력한 경제에서 힘을 얻습니다.
thir = 13개 식민지는 북미에서 미국의 토대를 형성한 역사적 영국 식민지 집단입니다. 자치, 무역, 독립에 집중하며, 단합과 공유된 정치적 이상에서 힘을 얻습니다.
tib2 = 티베트 제국은 중앙아시아의 강력한 역사적 국가로, 문화적·종교적 영향력으로 알려져 있습니다. 확장, 통치, 영적 지도력에 집중하며, 문화적 단합과 전략적 고지대 지리에서 힘을 얻습니다.
trr = 트리폴리는 북아프리카의 해안 도시이자 역사적 지역으로, 해양적 중요성으로 알려져 있습니다. 무역, 해군 활동, 지역 영향력에 집중하며, 항구와 전략적 지중해 위치에서 힘을 얻습니다.
gbul3 = 불가리아 차르국은 중세 발칸 지역의 역사적 국가로, 권력과 문화적 발전으로 알려져 있습니다. 통치, 확장, 문화적 정체성에 집중하며, 강력한 지도력과 지역 영향력에서 힘을 얻습니다.
tusc = 토스카나는 이탈리아의 역사적 지역으로, 예술, 문화, 경제적 영향력으로 알려져 있습니다. 문화 발전, 무역, 혁신에 집중하며, 예술적 유산과 경제적 번영에서 힘을 얻습니다.
ukr = 우크라이나는 광대한 농업지와 문화적 유산으로 알려진 동유럽 국가입니다. 안정, 개발, 지역 협력에 집중하며, 천연 자원과 비옥한 토지에서 힘을 얻습니다.
unba = 연합 발트 공국은 발트 지역의 역사적 국가 개념으로, 단일 행정 통합을 목표로 했습니다. 통치, 지역 협력, 정치적 안정에 집중하며, 중앙집권적 지도력과 영토 통합에서 힘을 얻습니다.
gguy3 = 연합 가이아나는 남아메리카 가이아나 지역의 통합을 나타내는 개념적 국가입니다. 협력, 개발, 공동 통치에 집중하며, 지역 통합과 자원 관리에서 힘을 얻습니다.
prbr3 = 포르투갈-브라질-알가르브 왕국은 유럽과 남아메리카 영토를 통합한 역사적 대서양 국가입니다. 통치, 무역, 제국적 조정에 집중하며, 글로벌 영향력과 대륙 간 정치적 단합에서 힘을 얻습니다.
uni = 영국은 글로벌 영향력과 정치적 안정으로 알려진 유럽의 입헌 군주국입니다. 통치, 외교, 경제 개발에 집중하며, 강력한 제도와 역사적 영향력에서 힘을 얻습니다.
uso = 오세아니아 합중국은 태평양 전역 섬나라들의 개념적 연방입니다. 단합, 협력, 해양 전략에 집중하며, 결합된 자원과 해양 연결성에서 힘을 얻습니다.
ural4 = 우랄 연합은 우랄어족 민족들의 개념적 지역 동맹입니다. 문화적 단합, 협력, 공동 개발에 집중하며, 언어적·문화적 유대에서 힘을 얻습니다.
vand = 반달 왕국은 북아프리카에서 정복과 통치로 알려진 역사적 게르만 국가입니다. 확장, 군사력, 통치에 집중하며, 기동력과 효과적인 지도력에서 힘을 얻습니다.
visi = 서고트족은 서유럽에서 강력한 왕국을 세운 역사적 게르만 민족입니다. 확장, 정착, 통치에 집중하며, 군사 조직과 적응력에서 힘을 얻습니다.
wal = 웨일스는 영국의 일부로, 산악 지형과 풍부한 문화 유산으로 알려져 있습니다. 문화 보존, 통치, 지역 정체성에 집중하며, 강력한 전통과 독특한 민족 문화에서 힘을 얻습니다.
wife = 서인도 제도 연방은 여러 섬 영토를 통합하려 한 단명한 카리브해 연합입니다. 협력, 통치, 지역 단합에 집중하며, 공유된 정체성과 결합된 자원에서 힘을 얻습니다.
wepp = 베스트팔렌은 현대 정치 체제 형성에 기여한 유럽의 역사적 지역입니다. 통치, 외교, 지역 안정에 집중하며, 역사적 조약과 정치적 영향력에서 힘을 얻습니다.
bew = 백루테니아는 벨라루스와 관련된 역사적·지역 명칭입니다. 문화적 유산, 통치, 지역 정체성에 집중하며, 공유된 전통과 역사적 연속성에서 힘을 얻습니다.
yuan = 원은 몽골인에 의해 세워진 중국의 역사적 왕조로, 광대한 영토 통합으로 알려져 있습니다. 확장, 통치, 통제에 집중하며, 강력한 군사 조직과 중앙집권적 통치에서 힘을 얻습니다.
yugo = 유고슬라비아는 여러 민족을 통합한 역사적 동남유럽 국가입니다. 협력, 통치, 지역 안정에 집중하며, 다양한 공동체의 단합과 공동 지도력에서 힘을 얻습니다.
drc = 자이르 는 광대한 천연 자원과 중심 위치로 알려진 역사적 아프리카 국가입니다. 통치, 경제 개발, 자원 관리에 집중하며, 자연 자원과 전략적 지리에서 힘을 얻습니다.
zim = 짐바브웨는 풍부한 역사와 천연 자원으로 알려진 남부 아프리카 국가입니다. 안정, 개발, 지역 협력에 집중하며, 광물 자원과 문화적 유산에서 힘을 얻습니다.