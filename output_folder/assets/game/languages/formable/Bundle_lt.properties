slav3 = Slavų Imperija yra didžiulė valstybė, jungianti slavų žemes po viena galinga valdžia. Ji orientuojasi į stiprybę, plėtrą ir kultūrinį dominavimą regione. Jos mastas daro ją svarbia jėga pasaulio reikaluose.
