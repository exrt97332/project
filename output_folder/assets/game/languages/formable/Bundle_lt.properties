yuan = Juan dinastija yra istorinė Kinijos dinastija, įkurta mongolų, žinoma dėl didelių teritorijų suvienijimo. Ji daugiausia dėmesio skiria plėtrai, valdymui ir kontrolei. Jos stiprybė kyla iš stiprios karinės organizacijos ir centralizuotos valdžios.
yugo = Jugoslavija yra istorinė valstybė Pietryčių Europoje, žinoma dėl įvairių etninių grupių suvienijimo. Ji daugiausia dėmesio skiria bendradarbiavimui, valdymui ir regioniniam stabilumui. Jos stiprybė kyla iš vienybės tarp įvairių bendruomenių ir bendros lyderystės.
drc = Zairas yra istorinė Afrikos valstybė, žinoma dėl savo didžiulių gamtinių išteklių ir centrinės padėties. Ji daugiausia dėmesio skiria valdymui, ekonominei plėtrai ir išteklių valdymui. Jos stiprybė kyla iš gamtinių turtų ir strateginės geografijos.
zim = Zimbabvė yra Pietų Afrikos valstybė, žinoma dėl savo turtingos istorijos ir gamtinių išteklių. Ji daugiausia dėmesio skiria stabilumui, plėtrai ir regioniniam bendradarbiavimui. Jos stiprybė kyla iš mineralinių išteklių ir kultūrinio paveldo.
