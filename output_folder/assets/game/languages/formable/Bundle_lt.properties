LANGUAGENAME = Lithuanian
baby = Babilonas yra atgaivinta senovės civilizacija, sukurta remiantis ankstyvosios teisės, kultūros ir inovacijų palikimu. Ji orientuojasi į stiprų valdymą, plėtrą ir strateginę ekspansiją. Jos tikslas – atkurti savo istorinę įtaką regione.
eunn = Europos Sąjunga yra didelė politinė ir ekonominė sąjunga, pabrėžianti bendradarbiavimą, prekybą ir kolektyvinį sprendimų priėmimą. Ji orientuojasi į stabilumą, plėtrą ir taikos palaikymą tarp savo narių. Jos įtaka per diplomatiją ir ekonomiką apima visą žemyną.
int = Intermariumas yra regioninis aljansas, orientuotas į Vidurio ir Rytų Europos šalių bendradarbiavimą. Jis teikia prioritetą tarpusavio gynybai, ekonominiams ryšiams ir nepriklausomybei nuo didesnių galių. Jo stiprybė slypi skirtingų valstybių vienybėje.
