cos = Kazaki ir karavīru sabiedrība, kas pazīstama ar savu neatkarību, mobilitāti un militārajām prasmēm. Viņi koncentrējas uz aizsardzību, reidiem un savas dzimtenes aizsardzību. Viņu spēks nāk no brīvības, disciplīnas un stiprām tradīcijām.
coub = Kurzeme ir maza, bet ambicioza valsts, kas pazīstama ar tirdzniecību un koloniālām iecerēm. Tā koncentrējas uz jūras paplašināšanos, tirdzniecību un stratēģisku ietekmi. Tās spēks nāk no spējas paplašināt ietekmi ārpus saviem izmēriem.
crkh = Krimas haniste ir stepju valsts, kas pazīstama ar ātru kavalēriju un reidu spēku. Tā koncentrējas uz mobilitāti, militāro spēku un tirdzniecības ceļu kontroli. Tās spēks nāk no ātruma un stratēģiskas karadarbības.
cum = Kumānija ir stepju konfederācija, kas pazīstama ar nomadu karavīriem un plašām ganībām. Tā koncentrējas uz mobilitāti, reidiem un atklātu teritoriju kontroli. Tās spēks nāk no ātrās kavalērijas un pielāgošanās spējas.
cypk = Kipras karaliste ir salu valsts, kas pazīstama ar savu stratēģisko novietojumu un jūras ietekmi. Tā koncentrējas uz tirdzniecību, diplomātiju un jūras spēku. Tās vara nāk no svarīgu jūras ceļu kontroles reģionā.
cze = Čehija ir Centrāleiropas valsts, kas pazīstama ar spēcīgu ekonomiku un kultūras mantojumu. Tā koncentrējas uz stabilitāti, rūpniecību un iekšējo attīstību. Tās spēks nāk no organizētības un reģionālās nozīmes.
