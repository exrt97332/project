dacc = Dakija ir sena valsts, kas pazīstama ar savu spēcīgo karavīru kultūru un pretošanos spēcīgām impērijām. Tā koncentrējas uz aizsardzību, teritorijas kontroli un savas identitātes saglabāšanu. Tās spēks nāk no izturības un apņēmības.
