unba = Apvienotā Baltijas hercogiste ir vēsturiska valsts koncepcija Baltijas reģionā, kas paredzēta apvienošanai vienā administrācijā. Tā koncentrējas uz pārvaldību, reģionālo sadarbību un politisko stabilitāti. Tās spēks nāk no centralizētas vadības un teritorijas konsolidācijas.
gguy3 = Apvienotā Gajāna ir reģionāla ideja, kas pārstāv Gajānas reģiona vienotību Dienvidamerikā. Tā koncentrējas uz sadarbību, attīstību un kopīgu pārvaldību. Tās spēks nāk no reģionālās integrācijas un resursu pārvaldības.
prbr3 = Apvienotā Portugāles, Brazīlijas un Algarves karaliste ir vēsturiska transatlantiska valsts, kas apvienoja teritorijas Eiropā un Dienvidamerikā. Tā koncentrējas uz pārvaldību, tirdzniecību un impērisku koordināciju. Tās spēks nāk no globālās sasniedzamības un politiskās vienotības starp kontinentiem.
uni = Apvienotā Karaliste ir Eiropas konstitucionāla monarhija, kas pazīstama ar savu globālo ietekmi un politisko stabilitāti. Tā koncentrējas uz pārvaldību, diplomātiju un ekonomisko attīstību. Tās spēks nāk no spēcīgām institūcijām un vēsturiskas ietekmes.
uso = Okeānijas Apvienotās Valstis ir konceptuāla federācija, kas apvieno Klusā okeāna salu valstis. Tā koncentrējas uz vienotību, sadarbību un jūras stratēģiju. Tās spēks nāk no apvienotiem resursiem un okeāna savienojamības.
ural4 = Urālu savienība ir konceptuāla reģionāla alianse, kas apvieno urālu valodu tautas. Tā koncentrējas uz kultūras vienotību, sadarbību un kopīgu attīstību. Tās spēks nāk no lingvistiskām un kultūras saitēm.
vand = Vandalu karaliste ir vēsturiska ģermāņu valsts, kas pazīstama ar savu iekarošanu un valdīšanu Ziemeļāfrikā. Tā koncentrējas uz paplašināšanos, militāro spēku un pārvaldību. Tās spēks nāk no mobilitātes un efektīvas vadības.
visi = Visigoti ir vēsturiski ģermāņu cilvēki, kas pazīstami ar spēcīgas karalistes izveidi Rietumeiropā. Tie koncentrējas uz paplašināšanos, apmešanos un pārvaldību. To spēks nāk no militārās organizācijas un pielāgošanās spējas.
wal = Velsa ir Apvienotās Karalistes daļa, kas pazīstama ar kalnainajām ainavām un bagāto kultūras mantojumu. Tā koncentrējas uz kultūras saglabāšanu, pārvaldību un reģionālo identitāti. Tās spēks nāk no spēcīgām tradīcijām un izteiktas nacionālās kultūras.
wife = Rietumindijas federācija bija īslaicīga Karību jūras salu savienība, kuras mērķis bija apvienot vairākas teritorijas. Tā koncentrējas uz sadarbību, pārvaldību un reģionālo vienotību. Tās spēks nāk no kopīgas identitātes un apvienotiem resursiem.
wepp = Vestfālija ir vēsturisks Eiropas reģions, kas pazīstams ar savu lomu mūsdienu politisko sistēmu veidošanā. Tā koncentrējas uz pārvaldību, diplomātiju un reģionālo stabilitāti. Tās spēks nāk no vēsturiskajiem līgumiem un politiskās ietekmes.
bew = Baltkrievija ir vēsturisks un reģionāls nosaukums, kas saistīts ar Baltkrieviju. Tā koncentrējas uz kultūras mantojumu, pārvaldību un reģionālo identitāti. Tās spēks nāk no kopīgām tradīcijām un vēsturiskas nepārtrauktības.
yuan = Juana dinastija ir vēsturiska Ķīnas dinastija, ko izveidoja mongoļi, pazīstama ar lielu teritoriju apvienošanu. Tā koncentrējas uz paplašināšanos, pārvaldību un kontroli. Tās spēks nāk no spēcīgas militārās organizācijas un centralizētas varas.
yugo = Dienvidslāvija ir vēsturiska valsts Dienvidaustrumeiropā, kas pazīstama ar dažādu etnisko grupu apvienošanu. Tā koncentrējas uz sadarbību, pārvaldību un reģionālo stabilitāti. Tās spēks nāk no vienotības starp dažādām kopienām un kopīgas vadības.
drc = Zaira ir vēsturiska Āfrikas valsts, kas pazīstama ar saviem plašajiem dabas resursiem un centrālo atrašanās vietu. Tā koncentrējas uz pārvaldību, ekonomisko attīstību un resursu pārvaldību. Tās spēks nāk no dabas bagātībām un stratēģiskās ģeogrāfijas.
zim = Zimbabve ir Dienvidāfrikas valsts, kas pazīstama ar saviem bagātajiem resursiem un vēsturisko mantojumu. Tā koncentrējas uz stabilitāti, attīstību un reģionālo sadarbību. Tās spēks nāk no minerālu bagātībām un kultūras mantojuma.
