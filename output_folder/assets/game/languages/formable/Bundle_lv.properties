danu3 = Donavas impērija ir liela uz upēm balstīta valsts, kas apvieno teritorijas gar Donavu. Tā koncentrējas uz tirdzniecību, stratēģisku kontroli un ekonomisku integrāciju starp reģioniem. Tās spēks nāk no vienas no svarīgākajām Eiropas ūdensceļu kontroles.
nodm = Dānija–Norvēģija ir divu karalistu savienība, kas apvieno jūras spēku un spēcīgas jūras tradīcijas. Tā koncentrējas uz tirdzniecību, jūras kontroli un sadarbību starp tās zemēm. Tās spēks nāk no spēcīgas flotes un kopīgas pārvaldības.
