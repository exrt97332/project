byza = Bizantijas impērija ir spēcīga un noturīga valsts, kas pazīstama ar savu spēcīgo pārvaldi un kultūras mantojumu. Tā koncentrējas uz diplomātiju, aizsardzību un savas ietekmes saglabāšanu dažādos reģionos. Tās spēks nāk no organizētības un ilgstošām tradīcijām.
cary3 = Karpatu impērija ir kalnaina valsts, kas balstīta uz spēcīgu dabisko aizsardzību un skarbu reljefu. Tā koncentrējas uz militāro spēku, stratēģisku novietojumu un reģionālo kontroli. Tās vara nāk no sarežģītā reljefa un izturīgajiem cilvēkiem.
carr = Kartāga ir spēcīga jūras valsts, kas pazīstama ar tirdzniecību, jūras spēku un ekonomisko ietekmi. Tā koncentrējas uz tirdzniecību, paplašināšanos un svarīgu jūras ceļu kontroli. Tās vara nāk no bagātības un dominances pār Vidusjūru.
