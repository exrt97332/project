LANGUAGENAME = Latvian
baby = Babilona ir atdzīvināta senā civilizācija, kas balstīta agrīno likumu, kultūras un inovāciju mantojumā. Tā koncentrējas uz spēcīgu pārvaldību, attīstību un stratēģisku paplašināšanos. Tās mērķis ir atjaunot savu vēsturisko ietekmi reģionā.
eunn = Eiropas Savienība ir liela politiska un ekonomiska savienība, kas uzsver sadarbību, tirdzniecību un kolektīvu lēmumu pieņemšanu. Tā koncentrējas uz stabilitāti, attīstību un miera uzturēšanu starp dalībvalstīm. Tās ietekme sniedzas visā kontinentā caur diplomātiju un ekonomiku.
int = Intermarium ir reģionāla alianse, kas koncentrējas uz sadarbību starp Centrālās un Austrumeiropas valstīm. Tā prioritizē savstarpējo aizsardzību, ekonomiskās saites un neatkarību no lielvarām. Tās spēks slēpjas vienotībā starp dažādām valstīm.
lech3 = Lehitijas impērija ir spēcīga valsts, kas veidota uz lehitisko tautu mantojuma, uzsverot vienotību, tradīcijas un spēku. Tā koncentrējas uz kultūras identitāti, teritorijas kontroli un ilgtermiņa stabilitāti. Tās ambīcija ir nostiprināt dominanci pār kaimiņu reģioniem.
pier3 = Pierogovā republika ir vieglprātīga, bet vienota valsts, kas balstīta uz kopīgu kultūru un tradīcijām. Tā koncentrējas uz iekšējo stabilitāti, kopienu un kultūras identitāti, nevis paplašināšanos. Neskatoties uz humoru, tā ir saliedēta un noturīga.
plsr = Baltijas impērija ir spēcīga valsts, kas izveidota, apvienojot zemes ap Baltijas jūru. Tā kontrolē svarīgus tirdzniecības ceļus un koncentrējas uz jūras spēku un ekonomisko izaugsmi. Tās vienotība ļauj tai dominēt reģionā, neskatoties uz relatīvi nelielo izmēru.
pol2 = Sadraudzība ir savienība, kas veidota no vairākām valstīm, lai stiprinātu aizsardzību un sadarbību. Tā vietā, lai būtu viens valdnieks, vara tiek dalīta starp tās dalībniekiem. Tā koncentrējas uz stabilitāti, diplomātiju un kolektīvu izaugsmi.
reda = Redānija ir spēcīga un centralizēta karaliste, kas pazīstama ar disciplinētu armiju un stratēģisku vadību. Tā koncentrējas uz paplašināšanos, kontroli un kārtības uzturēšanu visās savās zemēs. Tās spēks padara to par vienu no dominējošajiem spēkiem reģionā.
zapa3 = Zapadoslāvija ir vienota rietumslāvu valsts, kas stiprina kultūras un politiskās saites starp tās tautām. Tā koncentrējas uz vienotību, reģionālo stabilitāti un ekonomisko sadarbību. Kopā tā stāv stiprāka pret ārējiem spēkiem.
slav3 = Slāvu impērija ir plaša valsts, kas apvieno slāvu zemes vienā spēcīgā varā. Tā koncentrējas uz spēku, paplašināšanos un kultūras dominanci visā reģionā. Tās mērogs padara to par nozīmīgu spēku globālajās lietās.
eth = Abesīnija ir vēsturiska un izturīga valsts, kas balstīta senās tradīcijās un spēcīgā vadībā. Tā uzsver neatkarību, aizsardzību un savas kultūras mantojuma saglabāšanu. Tās mantojums piešķir tai ilgstošu ietekmi reģionā.
afg = Afganistānas emirāts ir valsts, kuru vada stingra vadība un spēcīgas tradīcijas. Tā koncentrējas uz iekšējo kontroli, aizsardzību un stabilitātes uzturēšanu savās robežās. Tās reljefs un izturība padara to grūti iekarojamu.
afri = Āfrikas Savienība ir kontinentāla organizācija, kas veicina vienotību un sadarbību starp Āfrikas valstīm. Tā koncentrējas uz ekonomisko izaugsmi, diplomātiju un reģionālo stabilitāti. Tās spēks nāk no kolektīvas rīcības visā kontinentā.
aksu = Aksuma ir sena un spēcīga karaliste, kas pazīstama ar tirdzniecību, reliģiju un agrīnajām inovācijām. Tā koncentrējas uz tirdzniecību, ietekmi un vēsturiskā mantojuma saglabāšanu. Tās saknes piešķir tai ilgstošu spēku un identitāti.
andd = Al-Andalusa ir kulturāli bagāta un attīstīta valsts, kas pazīstama ar zinātni, arhitektūru un tirdzniecību. Tā uzsver zināšanas, labklājību un daudzveidīgu sabiedrību. Tās ietekme nāk gan no intelekta, gan ekonomiskā spēka.
alb3 = Albānija ir izturīga un apņēmīga valsts, kas koncentrējas uz neatkarību un stabilitāti. Tā prioritizē aizsardzību, vienotību un savas nacionālās identitātes saglabāšanu. Tās spēks slēpjas spējā izturēt un pielāgoties.
alpi3 = Alpu impērija ir augstienes valsts, kas balstīta uz kalnainu reģionu kontroli. Tā koncentrējas uz aizsardzību, spēcīgu infrastruktūru un stratēģisku novietojumu. Tās reljefs padara to grūti iebrūkam, bet viegli aizsargājamu.
anda3 = Andalūzija ir reģions, kas pazīstams ar bagātu kultūru, tirdzniecību un vēsturisku ietekmi. Tā koncentrējas uz ekonomisko izaugsmi, kultūras mantojumu un spēcīgu reģionālo identitāti. Tās novietojums padara to par svarīgu saikni starp reģioniem.
gang3 = Anglosfēra ir kultūras un politiska telpa, kas apvieno angliski runājošas valstis. Tā koncentrējas uz sadarbību, kopīgām vērtībām un globālu ietekmi. Tās spēks nāk no plašas sasniedzamības un ietekmes visā pasaulē.
anti = Antiļu konfederācija ir salu valstu savienība, kas koncentrējas uz tirdzniecību, jūras spēku un sadarbību jūrās. Tā paļaujas uz jūras kontroli un ekonomiskajām saitēm, lai uzturētu savu ietekmi. Tās vienotība stiprina izkliedētās salas vienā spēkā.
ani = Antiohija ir vēsturiska un ietekmīga pilsētvalsts, kas pazīstama ar kultūru, tirdzniecību un stratēģisko novietojumu. Tā koncentrējas uz tirdzniecību, diplomātiju un reģionālo nozīmi. Tās atrašanās vieta padara to par svarīgu mezglu, kas savieno dažādas civilizācijas.
abbr = Arama Islāma Republika ir valsts, kuru vada ticība, vienotība un strukturēta pārvaldība. Tā koncentrējas uz iekšējo stabilitāti, kultūras identitāti un spēcīgu vadību. Tās spēks nāk no disciplīnas un kopīgas pārliecības.
arab = Arābija ir spēcīga tuksneša civilizācija, kas pazīstama ar plašām zemēm un tirdzniecības ceļu kontroli. Tā koncentrējas uz resursu pārvaldību, stratēģisku mobilitāti un ekonomisko ietekmi. Tās vienotība ļauj tai plaukt skarbos apstākļos.
arm = Armēnija ir sena un izturīga valsts, kas pazīstama ar bagātu vēsturi un spēcīgu kultūras identitāti. Tā koncentrējas uz aizsardzību, tradīcijām un neatkarības saglabāšanu. Tās izturība ļāvusi tai izdzīvot cauri daudziem izaicinājumiem.
arzt = Arstotzka ir stingra un stingri kontrolēta valsts, kas koncentrējas uz drošību un kārtību. Tā prioritizē robežas, novērošanu un iekšējo kontroli pāri visam. Tās spēks slēpjas disciplīnā un nelokāmā autoritātē.
asha = Ašanti ir spēcīga Rietumāfrikas valsts, kas pazīstama ar zelta bagātībām un spēcīgām militārām tradīcijām. Tā koncentrējas uz tirdzniecību, resursu kontroli un reģionālās ietekmes uzturēšanu. Tās spēks nāk no vienotības un disciplinētas vadības.
gase3 = Dienvidaustrumāzijas Nāciju asociācija ir reģionāla organizācija, kas veicina sadarbību, tirdzniecību un stabilitāti starp dalībvalstīm. Tā koncentrējas uz ekonomisko izaugsmi, diplomātiju un kopīgu attīstību. Tās spēks nāk no vienotības un sadarbības starp dažādām valstīm.
auhh = Austrālija–Ungārija ir hibrīda valsts, kas apvieno koloniālu ietekmi ar spēcīgu centrālo pārvaldību. Tā koncentrējas uz paplašināšanos, resursu kontroli un stratēģisku dominanci tālās zemēs. Tās spēks nāk no veco tradīciju un jaunu teritoriju apvienošanas.
anz3 = Austrālija–Jaunzēlande ir cieša reģionāla savienība, kas uzsver sadarbību, tirdzniecību un kopīgu drošību. Tā koncentrējas uz ekonomisko spēku, jūras spējām un stabilitāti Klusajā okeānā. Tās vienotība stiprina abas valstis caur partnerību un savstarpēju atbalstu.
atr = Austrija ir Centrāleiropas valsts, kas pazīstama ar stabilitāti, diplomātiju un kultūras mantojumu. Tā koncentrējas uz iekšējo attīstību, spēcīgu pārvaldību un līdzsvara uzturēšanu reģionā. Tās spēks slēpjas kārtībā un nepārtrauktībā.
gatr3 = Austrijas Reihs ir centralizēta un autoritatīva valsts, kas balstīta uz stingru pārvaldību un nacionālu vienotību. Tā koncentrējas uz spēku, kārtību un ietekmes paplašināšanu. Tās spēks nāk no disciplīnas un centralizētas kontroles.
asit = Austroungārijas impērija ir valsts, kas apvieno Centrāleiropas struktūru ar itāļu ietekmi un kultūru. Tā koncentrējas uz paplašināšanos, ekonomisko spēku un stratēģisku dominanci reģionā. Tās spēks nāk no industriālā spēka un kultūras mantojuma apvienojuma.
aslr = Austroslovākija ir vienota valsts, kas apvieno Centrāleiropas un slāvu reģionus vienā administrācijā. Tā koncentrējas uz stabilitāti, sadarbību un līdzsvarotu attīstību. Tās spēks nāk no dažādu kultūru un teritoriju vienotības.
aval3 = Avalonas impērija ir leģendāra valsts, kas iedvesmota no senajiem mītiem un spēcīga kultūras mantojuma. Tā koncentrējas uz vienotību, noslēpumainību un ietekmes paplašināšanu caur tradīcijām un spēku. Tās identitāte sakņojas gan mantojumā, gan ambīcijās.
azan4 = Azānijas impērija ir spēcīga valsts, kas koncentrējas uz vienotību, resursu kontroli un reģionālo dominanci savās zemēs. Tā uzsver spēcīgu vadību, attīstību un stabilitātes uzturēšanu visās teritorijās. Tās spēks nāk no disciplīnas un stratēģiskas izaugsmes.
azte = Acteku impērija ir civilizācija, kas pazīstama ar militāro spēku, bagātām tradīcijām un attīstītu sabiedrību. Tā koncentrējas uz paplašināšanos, nodevām un kultūras ietekmi. Tās spēks nāk no spēcīgas organizācijas un karavīru sistēmas.
