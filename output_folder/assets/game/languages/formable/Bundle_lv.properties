bava = Bavārija ir reģionāla valsts, kas pazīstama ar spēcīgu ekonomiku, kultūru un tradīcijām. Tā koncentrējas uz stabilitāti, rūpniecisko spēku un iekšējo attīstību. Tās identitāte veidota gan no mantojuma, gan mūsdienu progresa.
bel = Beļģija ir Centrāleiropas valsts, kas koncentrējas uz diplomātiju, tirdzniecību un sadarbību. Tā uzsver ekonomisko spēku, neitralitāti un starptautiskās attiecības. Tās ietekme nāk no stratēģiskā novietojuma un politiskās nozīmes.
bene = Benilukss ir Beļģijas, Nīderlandes un Luksemburgas sadarbības savienība. Tā koncentrējas uz ekonomisko integrāciju, tirdzniecību un reģionālo stabilitāti. Tās spēks nāk no ciešas sadarbības un kopīgas labklājības.
bbl3 = Melnā Līga ir disciplinēta un militāra valsts, kas balstīta uz stingru kārtību un centralizētu kontroli. Tā koncentrējas uz spēku, iekšējo vienotību un paplašināšanos ar spēku. Tās vara nāk no nelokāmas autoritātes un organizētības.
bohe = Bohēmija ir vēsturiska Centrāleiropas valsts, kas pazīstama ar savu bagāto kultūru un stratēģisko novietojumu. Tā koncentrējas uz stabilitāti, attīstību un reģionālās ietekmes uzturēšanu. Tās spēks nāk no tradīcijām un izturības.
gboh3 = Bohēmijas impērija ir centralizēta valsts, kas paplašina savu ietekmi visā Centrāleiropā. Tā koncentrējas uz spēcīgu pārvaldību, militāro spēku un kultūras identitāti. Tās spēks nāk no vienotības un stratēģiskas kontroles.
