yugo = Југославија е историска држава во Југоисточна Европа позната по обединување на повеќе етнички групи. Се фокусира на соработка, управување и регионална стабилност. Нејзината сила доаѓа од единство меѓу различни заедници и заедничко водство.
drc = Заир е историска африканска држава позната по своите огромни природни ресурси и централна локација. Се фокусира на управување, економски развој и управување со ресурси. Нејзината сила доаѓа од природно богатство и стратешка географија.
zim = Зимбабве е јужноафриканска држава позната по својата богата историја и природни ресурси. Се фокусира на стабилност, развој и регионална соработка. Нејзината сила доаѓа од минерално богатство и културно наследство.
