carr = Картагина е моќна поморска држава позната по трговијата, поморската сила и економското влијание. Таа се фокусира на трговија, експанзија и контрола на клучни морски рути. Нејзината моќ доаѓа од богатство и доминација над Средоземјето.
cast = Кастиља е силно ибериско кралство познато по својата експанзија и воена моќ. Таа се фокусира на освојување, обединување и територијален раст. Нејзината сила доаѓа од дисциплинирани армии и централизирано владеење.
argg3 = Каталонската Империја е регионална сила фокусирана на трговија, култура и поморско влијание. Таа ја нагласува економската раст, стратешките пристаништа и силниот идентитет. Нејзината сила доаѓа од трговија и контрола на крајбрежјето.
cau3 = Кавкаската Империја е високопланинска држава која контролира клучни планински премини и трговски рути. Таа се фокусира на одбрана, стратешка позиција и регионално влијание. Нејзината сила доаѓа од теренот и издржливиот народ.
gleg = Келтската Унија е културен сојуз на келтски нации кој ја цени заедничката традиција и соработка. Таа се фокусира на единство, зачувување на културата и регионална сила. Нејзиното влијание доаѓа од заеднички идентитет и силни традиции.
