bohe = Бохемија е историска централноевропска држава позната по својата богата култура и стратешка локација. Таа се фокусира на стабилност, развој и одржување на своето регионално влијание. Нејзината сила доаѓа од традицијата и издржливоста.
gboh3 = Бохемска Империја е централизирана држава која го проширува своето влијание низ Централна Европа. Таа се фокусира на силно управување, воена моќ и културен идентитет. Нејзината сила доаѓа од единството и стратешката контрола.
buls = Бугарска Империја е силна и експанзионистичка држава со длабоки историски корени. Таа се фокусира на воена сила, територијална контрола и регионално влијание. Нејзината моќ доаѓа од единство, издржливост и стратешко водство.
burg3 = Бургундскиот Империум е моќна држава фокусирана на контрола на трговските рути и силна територијална експанзија. Таа се фокусира на воена организација, економска сила и регионална доминација. Нејзиното влијание доаѓа од стратешка позиција и дисциплинирано владеење.
