LANGUAGENAME = Македонски
baby = Вавилон е возобновена древна цивилизација изградена врз наследството на раниот закон, култура и иновација. Таа се фокусира на силно управување, развој и стратешка експанзија. Нејзината цел е да го врати историското влијание во регионот.
eunn = Европската Унија е голема политичка и економска унија која ја нагласува соработката, трговијата и колективното донесување одлуки. Таа се фокусира на стабилност, развој и одржување мир меѓу своите членки. Нејзиното влијание се протега низ целиот континент преку дипломатија и економија.
int = Интермариум е регионален сојуз фокусиран на соработка помеѓу земјите од Централна и Источна Европа. Тој дава приоритет на меѓусебна одбрана, економски врски и независност од поголеми сили. Неговата сила лежи во единството меѓу различни држави.
lech3 = Imperium Lechitów е моќна држава изградена врз наследството на леќитските народи, која ја нагласува единството, традицијата и силата. Таа се фокусира на културен идентитет, територијална контрола и долгорочна стабилност. Нејзината амбиција е да воспостави доминација над соседните региони.
pier3 = Rzeczpospolita Pierogowa е разиграна, но обединета држава заснована на заедничка култура и традиции. Таа се фокусира на внатрешна стабилност, заедница и културен идентитет, наместо на проширување. И покрај хуморот, останува кохезивна и отпорна.
plsr = Балтичката Империја е моќна држава формирана со обединување на земјите околу Балтичкото Море. Таа контролира клучни трговски рути и се фокусира на поморска сила и економски раст. Нејзиното единство ѝ овозможува да доминира во регионот и покрај релативно малата големина.
pol2 = Комонвелтот е унија формирана од повеќе нации за зајакнување на одбраната и соработката. Наместо еден владетел, власта е поделена меѓу членовите. Се фокусира на стабилност, дипломатија и колективен раст.
reda = Реданија е силно и централизирано кралство познато по дисциплинирана војска и стратешко водство. Се фокусира на проширување, контрола и одржување ред низ своите територии. Нејзината моќ ја прави една од доминантните сили во регионот.
zapa3 = Западославија е обединета западнословенска држава која ги зајакнува културните и политичките врски меѓу своите нации. Се фокусира на единство, регионална стабилност и економска соработка. Заедно, таа стои посилно против надворешни сили.
slav3 = Словенската Империја е огромна држава која ги обединува словенските земји под една моќна власт. Се фокусира на сила, експанзија и културна доминација низ регионот. Нејзината големина ја прави голема сила во глобалните односи.
eth = Абисинија е историска и отпорна држава со длабоки корени во древните традиции и силно водство. Таа ја нагласува независноста, одбраната и зачувувањето на културното наследство. Нејзиното наследство ѝ дава трајно влијание во регионот.
afg = Емиратот на Авганистан е држава водена од строга власт и силни традиции. Се фокусира на внатрешна контрола, одбрана и одржување стабилност во своите граници. Нејзиниот терен и отпорност ја прават тешко освоивa.
afri = Африканската Унија е континентална организација која промовира единство и соработка меѓу африканските нации. Се фокусира на економски раст, дипломатија и регионална стабилност. Нејзината сила доаѓа од колективното дејствување низ континентот.
aksu = Аксум е древно и моќно кралство познато по трговијата, религијата и раната иновација. Се фокусира на трговија, влијание и одржување на своето историско наследство. Неговите корени му даваат трајна сила и идентитет.
andd = Ал-Андалус е културно богата и напредна држава позната по образование, архитектура и трговија. Таа ја нагласува знаењето, просперитетот и разновидното општество. Нејзиното влијание доаѓа и од интелектот и од економската сила.
alb3 = Албанија е отпорна и решителна нација фокусирана на независност и стабилност. Таа дава приоритет на одбраната, единството и зачувувањето на својот национален идентитет. Нејзината сила лежи во способноста да издржи и да се адаптира.
alpi3 = Алпската Империја е висинска империја изградена врз контрола на планински региони. Таа се фокусира на одбрана, силна инфраструктура и стратешка позиција. Нејзиниот терен ја прави тешка за освојување и лесна за одбрана.
anda3 = Андалузија е регион познат по својата богата култура, трговија и историско влијание. Таа се фокусира на економски раст, културно наследство и силен регионален идентитет. Нејзината позиција ја прави клучна врска меѓу регионите.
gang3 = Англосферата е културна и политичка сфера која ги обединува англискојазичните нации. Таа се фокусира на соработка, заеднички вредности и глобално влијание. Нејзината сила доаѓа од нејзиниот широк досег и влијание низ светот.
anti = Антилската Конфедерација е унија на островски нации која се фокусира на трговија, поморска сила и соработка преку морињата. Таа се потпира на поморска контрола и економски врски за да го одржи своето влијание. Нејзиното единство ги зајакнува расфрланите острови во една сила.
ani = Антиохија е историски и влијателен град-држава познат по својата култура, трговија и стратешка локација. Таа се фокусира на трговија, дипломатија и регионално значење. Нејзината позиција ја прави клучен центар што поврзува различни цивилизации.
abbr = Арамската Исламска Република е држава водена од вера, единство и структурирано управување. Таа се фокусира на внатрешна стабилност, културен идентитет и силно водство. Нејзината сила доаѓа од дисциплина и заедничко верување.
arab = Арабија е моќна пустинска цивилизација позната по своите огромни територии и контрола на трговски рути. Таа се фокусира на управување со ресурси, стратешка мобилност и економско влијание. Нејзиното единство ѝ овозможува да напредува во сурови средини.
arm = Ерменија е древна и отпорна држава позната по својата богата историја и силен културен идентитет. Таа се фокусира на одбрана, традиција и зачувување на независноста. Нејзината издржливост ѝ овозможила да опстане низ многу предизвици.
arzt = Арстотцка е строга и силно контролирана држава фокусирана на безбедност и ред. Таа дава приоритет на границите, надзор и внатрешна контрола над сè друго. Нејзината сила лежи во дисциплина и непоколеблива власт.
asha = Ашанти е моќна западноафриканска држава позната по своето златно богатство и силни воени традиции. Таа се фокусира на трговија, контрола на ресурси и одржување регионално влијание. Нејзината сила доаѓа од единство и дисциплинирано водство.
gase3 = Асоцијацијата на државите од Југоисточна Азија е регионална организација која промовира соработка, трговија и стабилност меѓу своите членки. Таа се фокусира на економски раст, дипломатија и заеднички развој. Нејзината сила доаѓа од единство и соработка меѓу различни нации.
auhh = Австралија-Унгарија е хибридна држава која комбинира колонијално влијание со силно централно управување. Таа се фокусира на експанзија, контрола на ресурси и стратешка доминација низ далечни територии. Нејзината моќ доаѓа од спој на стари традиции и нови територии.
anz3 = Австралија–Нов Зеланд е близок регионален сојуз кој ја нагласува соработката, трговијата и заедничката безбедност. Се фокусира на економска сила, поморски капацитет и стабилност во Пацификот. Нивното единство ги зајакнува двете нации преку партнерство и заемна поддршка.
atr = Австрија е централноевропска држава позната по својата стабилност, дипломатија и културно наследство. Таа се фокусира на внатрешен развој, силно управување и одржување рамнотежа во регионот. Нејзината сила лежи во ред и континуитет.
gatr3 = Австрискиот Рајх е централизирана и авторитарна држава изградена врз строга власт и национално единство. Се фокусира на сила, ред и проширување на своето влијание. Неговата моќ доаѓа од дисциплина и централизирана контрола.
asit = Австро-Италијанската Империја е држава која ја обединува централноевропската структура со италијанско влијание и култура. Се фокусира на експанзија, економска сила и стратешка доминација во регионот. Нејзината моќ доаѓа од спој на индустриска сила и културно наследство.
aslr = Австрословачка е обединета држава која ги спојува централноевропските и словенските региони под една администрација. Таа се фокусира на стабилност, соработка и балансиран развој. Нејзината сила доаѓа од единство меѓу различни култури и територии.
aval3 = Авалонската Империја е легендарна држава инспирирана од древни митови и силно културно наследство. Таа се фокусира на единство, мистичност и проширување на своето влијание преку традиција и сила. Нејзиниот идентитет е вкоренет и во наследство и во амбиција.
azan4 = Азанската Империја е моќна држава фокусирана на единство, контрола на ресурси и регионална доминација на своите територии. Таа ја нагласува силната власт, развојот и одржувањето стабилност низ своите територии. Нејзината сила доаѓа од дисциплина и стратешки раст.
azte = Ацтечката Империја е цивилизација позната по својата воена сила, богати традиции и напредно општество. Таа се фокусира на експанзија, даноци и културно влијание. Нејзината моќ доаѓа од силна организација и систем воден од воини.
batv = Батавската Империја е силна држава изградена врз поморска трговија и стратешка контрола на водните патишта. Таа се фокусира на трговија, поморска сила и ефикасно управување. Нејзиното влијание доаѓа од контрола на клучни трговски рути и пристаништа.
bava = Баварија е регионална држава позната по силната економија, култура и традиции. Таа се фокусира на стабилност, индустриска сила и внатрешен развој. Нејзиниот идентитет е обликуван и од наследството и од модерниот напредок.
