LANGUAGENAME = Filipino
baby = Babylon ay isang muling nabuhay na sinaunang sibilisasyon na itinayo sa pamana ng maagang batas, kultura, at inobasyon. Nakatuon ito sa matibay na pamahalaan, pag-unlad, at estratehikong pagpapalawak. Layunin nitong maibalik ang makasaysayang impluwensya nito sa rehiyon.
eunn = Ang European Union ay isang malaki at politikal-ekonomikong unyon na nagbibigay-diin sa kooperasyon, kalakalan, at kolektibong paggawa ng desisyon. Nakatuon ito sa katatagan, pag-unlad, at pagpapanatili ng kapayapaan sa pagitan ng mga kasaping estado. Umaabot ang impluwensya nito sa buong kontinente sa pamamagitan ng diplomasya at ekonomiya.
int = Ang Intermarium ay isang panrehiyong alyansa na nakatuon sa kooperasyon sa pagitan ng mga bansa sa Gitna at Silangang Europa. Binibigyang-priyoridad nito ang mutwal na depensa, ugnayang pang-ekonomiya, at kalayaan mula sa mas malalaking kapangyarihan. Ang lakas nito ay nasa pagkakaisa sa kabila ng magkakaibang estado.
lech3 = Ang Imperium Lechitów ay isang makapangyarihang estado na itinayo sa pamana ng mga Lechitic, na nagbibigay-diin sa pagkakaisa, tradisyon, at lakas. Nakatuon ito sa pagkakakilanlang kultural, kontrol sa teritoryo, at pangmatagalang katatagan. Layunin nitong igiit ang dominasyon sa mga karatig na rehiyon.
pier3 = Ang Rzeczpospolita Pierogowa ay isang magaan at magkakaisang estado na nakasentro sa iisang kultura at tradisyon. Nakatuon ito sa panloob na katatagan, komunidad, at pagkakakilanlan sa kultura sa halip na pagpapalawak. Sa kabila ng pagiging mapaglaro, nananatili itong matatag at buo.
plsr = Ang Baltic Empire ay isang makapangyarihang estado na nabuo sa pamamagitan ng pagsasama ng mga lupain sa paligid ng Dagat Baltic. Kinokontrol nito ang mahahalagang rutang pangkalakalan at nakatuon sa lakas pandagat at paglago ng ekonomiya. Pinapahintulutan ito ng pagkakaisa na mangibabaw sa rehiyon sa kabila ng medyo maliit na sukat.
pol2 = Ang Commonwealth ay isang unyon na binuo ng maraming bansa upang palakasin ang depensa at kooperasyon. Sa halip na iisang pinuno, ibinabahagi ang kapangyarihan sa mga kasapi nito. Nakatuon ito sa katatagan, diplomasya, at kolektibong pag-unlad.
reda = Ang Redania ay isang malakas at sentralisadong kaharian na kilala sa disiplinadong militar at estratehikong pamumuno. Nakatuon ito sa pagpapalawak, kontrol, at pagpapanatili ng kaayusan sa mga lupain nito. Ang lakas nito ay ginagawa itong isa sa mga nangingibabaw na puwersa sa rehiyon.
zapa3 = Ang Zapadoslavia ay isang pinag-isang estadong West Slavic na nagpapalakas ng ugnayang kultural at politikal sa pagitan ng mga bansa nito. Nakatuon ito sa pagkakaisa, katatagang panrehiyon, at kooperasyong pang-ekonomiya. Sa sama-sama, mas malakas itong tumindig laban sa mga panlabas na kapangyarihan.
slav3 = Ang Slavic Empire ay isang malawak na estado na pinag-iisa ang mga lupain ng Slavic sa ilalim ng iisang makapangyarihang awtoridad. Nakatuon ito sa lakas, pagpapalawak, at dominasyong kultural sa rehiyon. Dahil sa laki nito, isa itong pangunahing puwersa sa pandaigdigang usapin.
eth = Ang Abyssinia ay isang makasaysayan at matatag na estado na nakaugat sa sinaunang tradisyon at matibay na pamumuno. Binibigyang-diin nito ang kalayaan, depensa, at pangangalaga ng pamana ng kultura nito. Ang kasaysayan nito ay nagbibigay dito ng pangmatagalang impluwensya sa rehiyon nito.
afg = Ang Emirate of Afghanistan ay isang estadong ginagabayan ng mahigpit na pamumuno at matibay na tradisyon. Nakatuon ito sa panloob na kontrol, depensa, at pagpapanatili ng katatagan sa loob ng mga hangganan nito. Ang lupain at tibay nito ay nagpapahirap na sakupin ito.
afri = Ang African Union ay isang organisasyong kontinental na nagtataguyod ng pagkakaisa at kooperasyon sa mga bansang Aprikano. Nakatuon ito sa paglago ng ekonomiya, diplomasya, at katatagang panrehiyon. Ang lakas nito ay nagmumula sa sama-samang pagkilos sa buong kontinente.
aksu = Ang Aksum ay isang sinaunang at makapangyarihang kaharian na kilala sa kalakalan, relihiyon, at maagang inobasyon. Nakatuon ito sa komersyo, impluwensya, at pagpapanatili ng makasaysayang pamana nito. Ang mga ugat nito ay nagbibigay dito ng pangmatagalang lakas at pagkakakilanlan.
andd = Ang Al-Andalus ay isang mayamang kultura at maunlad na estado na kilala sa pag-aaral, arkitektura, at kalakalan. Binibigyang-diin nito ang kaalaman, kasaganaan, at isang magkakaibang lipunan. Ang impluwensya nito ay nagmumula sa talino at lakas pang-ekonomiya.
alb3 = Ang Albania ay isang matatag at determinadong bansa na nakatuon sa kalayaan at katatagan. Inuuna nito ang depensa, pagkakaisa, at pangangalaga sa pambansang pagkakakilanlan. Ang lakas nito ay nasa kakayahang magtiis at umangkop.
alpi3 = Ang Alpine Imperium ay isang imperyong nasa kabundukan na nakabatay sa kontrol ng mga bulubunduking rehiyon. Nakatuon ito sa depensa, matibay na imprastraktura, at estratehikong posisyon. Ang lupain nito ay nagpapahirap lusubin at madaling ipagtanggol.
anda3 = Ang Andalucia ay isang rehiyon na kilala sa mayamang kultura, kalakalan, at makasaysayang impluwensya. Nakatuon ito sa paglago ng ekonomiya, pamana ng kultura, at matibay na pagkakakilanlan sa rehiyon. Ang posisyon nito ay ginagawa itong mahalagang ugnayan sa pagitan ng mga rehiyon.
gang3 = Ang Anglosphere ay isang kultural at politikal na saklaw na nagbubuklod sa mga bansang nagsasalita ng Ingles. Nakatuon ito sa kooperasyon, mga pinagsasaluhang halaga, at pandaigdigang impluwensya. Ang lakas nito ay nagmumula sa malawak na saklaw at impluwensya sa buong mundo.
anti = Ang Antillean Confederation ay isang unyon ng mga bansang isla na nakatuon sa kalakalan, lakas pandagat, at kooperasyon sa mga dagat. Umaasa ito sa kontrol sa dagat at ugnayang pang-ekonomiya upang mapanatili ang impluwensya nito. Ang pagkakaisa nito ay nagpapalakas sa magkakalat na isla bilang iisang kapangyarihan.
ani = Ang Antioch ay isang makasaysayan at maimpluwensyang lungsod-estado na kilala sa kultura, kalakalan, at estratehikong lokasyon. Nakatuon ito sa komersyo, diplomasya, at kahalagahang panrehiyon. Ang posisyon nito ay ginagawa itong mahalagang sentro na nag-uugnay sa iba't ibang sibilisasyon.
abbr = Ang Aram Islamic Republic ay isang estadong ginagabayan ng pananampalataya, pagkakaisa, at istrukturadong pamamahala. Nakatuon ito sa panloob na katatagan, pagkakakilanlan sa kultura, at matibay na pamumuno. Ang lakas nito ay nagmumula sa disiplina at pinagsasaluhang paniniwala.
arab = Ang Arabia ay isang makapangyarihang sibilisasyon sa disyerto na kilala sa malalawak na lupain at kontrol sa mga rutang pangkalakalan. Nakatuon ito sa pamamahala ng yaman, estratehikong paggalaw, at impluwensyang pang-ekonomiya. Ang pagkakaisa nito ay nagbibigay-daan upang umunlad sa mahihirap na kapaligiran.
arm = Ang Armenia ay isang sinaunang at matatag na estado na kilala sa mayamang kasaysayan at malakas na pagkakakilanlang kultural. Nakatuon ito sa depensa, tradisyon, at pagpapanatili ng kalayaan nito. Ang tibay nito ay nagbigay-daan upang makaligtas sa maraming hamon.
arzt = Ang Arstotzka ay isang mahigpit at lubos na kontroladong estado na nakatuon sa seguridad at kaayusan. Inuuna nito ang mga hangganan, pagmamanman, at panloob na kontrol higit sa lahat. Ang lakas nito ay nasa disiplina at hindi matitinag na awtoridad.
asha = Ang Ashanti ay isang makapangyarihang estado sa Kanlurang Aprika na kilala sa yaman ng ginto at malakas na tradisyong militar. Nakatuon ito sa kalakalan, kontrol sa yaman, at pagpapanatili ng impluwensyang panrehiyon. Ang lakas nito ay nagmumula sa pagkakaisa at disiplinadong pamumuno.
gase3 = Ang Association of Southeast Asian Nations ay isang panrehiyong organisasyon na nagtataguyod ng kooperasyon, kalakalan, at katatagan sa mga kasaping bansa. Nakatuon ito sa paglago ng ekonomiya, diplomasya, at pinagsasaluhang pag-unlad. Ang lakas nito ay nagmumula sa pagkakaisa at kolaborasyon sa magkakaibang bansa.
auhh = Ang Australia-Hungary ay isang hybrid na estado na pinagsasama ang impluwensyang kolonyal at matibay na sentral na pamahalaan. Nakatuon ito sa pagpapalawak, kontrol sa yaman, at estratehikong dominasyon sa malalayong lupain. Ang kapangyarihan nito ay nagmumula sa pagsasanib ng lumang tradisyon at bagong teritoryo.
anz3 = Ang Australia–New Zealand ay isang malapit na panrehiyong unyon na nagbibigay-diin sa kooperasyon, kalakalan, at pinagsasaluhang seguridad. Nakatuon ito sa lakas pang-ekonomiya, kakayahang pandagat, at katatagan sa Pasipiko. Pinatitibay ng pagkakaisa ang parehong bansa sa pamamagitan ng pakikipagtulungan at mutwal na suporta.
atr = Ang Austria ay isang estadong nasa Gitnang Europa na kilala sa katatagan, diplomasya, at pamana ng kultura. Nakatuon ito sa panloob na pag-unlad, matibay na pamamahala, at pagpapanatili ng balanse sa rehiyon. Ang lakas nito ay nasa kaayusan at pagpapatuloy.
gatr3 = Ang Austrian Reich ay isang sentralisado at awtoritaryong estado na binuo sa mahigpit na pamamahala at pambansang pagkakaisa. Nakatuon ito sa lakas, kaayusan, at pagpapalawak ng impluwensya nito. Ang kapangyarihan nito ay nagmumula sa disiplina at sentralisadong kontrol.
asit = Ang Austro-Italian Empire ay isang estadong pinagsasama ang istruktura ng Gitnang Europa at kulturang Italyano. Nakatuon ito sa pagpapalawak, lakas pang-ekonomiya, at estratehikong dominasyon sa rehiyon. Ang kapangyarihan nito ay nagmumula sa pagsasanib ng industriyal na lakas at pamana ng kultura.
aslr = Ang Austroslovakia ay isang pinag-isang estado na pinagsasama ang mga rehiyon ng Gitnang Europa at Slavic sa ilalim ng iisang administrasyon. Nakatuon ito sa katatagan, kooperasyon, at balanseng pag-unlad. Ang lakas nito ay nagmumula sa pagkakaisa ng magkakaibang kultura at teritoryo.
aval3 = Ang Avalonian Empire ay isang maalamat na estado na hango sa sinaunang mito at malakas na pamana ng kultura. Nakatuon ito sa pagkakaisa, hiwaga, at pagpapalawak ng impluwensya sa pamamagitan ng tradisyon at lakas. Ang pagkakakilanlan nito ay nakaugat sa pamana at ambisyon.
azan4 = Ang Azanian Empire ay isang makapangyarihang estado na nakatuon sa pagkakaisa, kontrol sa yaman, at dominasyon sa mga lupain nito. Binibigyang-diin nito ang matibay na pamumuno, pag-unlad, at pagpapanatili ng katatagan sa buong teritoryo. Ang lakas nito ay nagmumula sa disiplina at estratehikong paglago.
azte = Ang Aztec Empire ay isang sibilisasyong kilala sa lakas militar, mayamang tradisyon, at maunlad na lipunan. Nakatuon ito sa pagpapalawak, pagbubuwis, at impluwensyang kultural. Ang kapangyarihan nito ay nagmumula sa matibay na organisasyon at sistemang nakasentro sa mandirigma.
batv = Ang Batavian Empire ay isang malakas na estado na nakabatay sa kalakalang pandagat at estratehikong kontrol sa mga daluyan ng tubig. Nakatuon ito sa komersyo, kapangyarihang pandagat, at episyenteng pamamahala. Ang impluwensya nito ay nagmumula sa pagkontrol sa mahahalagang rutang pangkalakalan at daungan.
bava = Ang Bavaria ay isang panrehiyong estado na kilala sa matibay na ekonomiya, kultura, at tradisyon. Nakatuon ito sa katatagan, lakas industriyal, at panloob na pag-unlad. Ang pagkakakilanlan nito ay hinubog ng pamana at modernong pag-unlad.
bel = Ang Belgium ay isang estadong nasa Gitnang Europa na nakatuon sa diplomasya, kalakalan, at kooperasyon. Binibigyang-diin nito ang lakas pang-ekonomiya, neutralidad, at ugnayang pandaigdig. Ang impluwensya nito ay nagmumula sa estratehikong lokasyon at kahalagahang politikal.
bene = Ang Benelux ay isang kooperatibong unyon ng Belgium, Netherlands, at Luxembourg. Nakatuon ito sa integrasyong pang-ekonomiya, kalakalan, at katatagang panrehiyon. Ang lakas nito ay nagmumula sa malapit na kolaborasyon at pinagsasaluhang kasaganaan.
bbl3 = Ang Black League ay isang disiplinado at militante na estado na binuo sa mahigpit na kaayusan at sentralisadong kontrol. Nakatuon ito sa lakas, panloob na pagkakaisa, at pagpapalawak sa pamamagitan ng puwersa. Ang kapangyarihan nito ay nagmumula sa hindi matitinag na awtoridad at organisasyon.
bohe = Ang Bohemia ay isang makasaysayang estado sa Gitnang Europa na kilala sa mayamang kultura at estratehikong lokasyon. Nakatuon ito sa katatagan, pag-unlad, at pagpapanatili ng impluwensyang panrehiyon. Ang lakas nito ay nagmumula sa tradisyon at katatagan.
gboh3 = Ang Bohemian Empire ay isang sentralisadong estado na nagpapalawak ng impluwensya nito sa Gitnang Europa. Nakatuon ito sa matibay na pamamahala, kapangyarihang militar, at pagkakakilanlang kultural. Ang lakas nito ay nagmumula sa pagkakaisa at estratehikong kontrol.
buls = Ang Bulgarian Empire ay isang malakas at ekspansyunistang estado na may malalim na makasaysayang ugat. Nakatuon ito sa lakas militar, kontrol sa teritoryo, at impluwensyang panrehiyon. Ang kapangyarihan nito ay nagmumula sa pagkakaisa, katatagan, at estratehikong pamumuno.
burg3 = Ang Burgundian Imperium ay isang makapangyarihang estado na nakasentro sa kontrol ng mga rutang pangkalakalan at malawak na pagpapalawak ng teritoryo. Nakatuon ito sa organisasyong militar, lakas pang-ekonomiya, at dominasyong panrehiyon. Ang impluwensya nito ay nagmumula sa estratehikong posisyon at disiplinadong pamamahala.
byza = Ang Byzantine Empire ay isang makapangyarihan at matibay na estado na kilala sa malakas na administrasyon at pamana ng kultura. Nakatuon ito sa diplomasya, depensa, at pagpapanatili ng impluwensya sa iba’t ibang rehiyon. Ang lakas nito ay nagmumula sa organisasyon at mahabang tradisyon.
cary3 = Ang Carpathian Empire ay isang estadong nasa kabundukan na binuo sa matibay na natural na depensa at masungit na lupain. Nakatuon ito sa lakas militar, estratehikong posisyon, at kontrol sa rehiyon. Ang kapangyarihan nito ay nagmumula sa mahirap nitong kapaligiran at matatag na mamamayan.
carr = Ang Carthage ay isang makapangyarihang estadong pandagat na kilala sa kalakalan, lakas ng hukbong-dagat, at impluwensyang pang-ekonomiya. Nakatuon ito sa komersyo, pagpapalawak, at kontrol sa mahahalagang rutang pandagat. Ang kapangyarihan nito ay nagmumula sa kayamanan at dominasyon sa Mediterranean.
cast = Ang Castile ay isang malakas na kahariang Iberian na kilala sa pagpapalawak at kapangyarihang militar. Nakatuon ito sa pananakop, pagsasama-sama, at paglago ng teritoryo. Ang lakas nito ay nagmumula sa disiplinadong hukbo at sentralisadong pamumuno.
argg3 = Ang Catalan Imperium ay isang panrehiyong kapangyarihan na nakatuon sa kalakalan, kultura, at impluwensyang pandagat. Binibigyang-diin nito ang paglago ng ekonomiya, estratehikong mga daungan, at matibay na pagkakakilanlan. Ang lakas nito ay nagmumula sa komersyo at kontrol sa baybayin.
cau3 = Ang Caucasian Empire ay isang estadong nasa kabundukan na kumokontrol sa mahahalagang tawiran ng bundok at mga rutang pangkalakalan. Nakatuon ito sa depensa, estratehikong posisyon, at impluwensyang panrehiyon. Ang lakas nito ay nagmumula sa lupain nito at matatag na mamamayan.
gleg = Ang Celtic Union ay isang kultural na alyansa ng mga bansang Celtic na pinahahalagahan ang iisang pamana at kooperasyon. Nakatuon ito sa pagkakaisa, pangangalaga sa kultura, at lakas panrehiyon. Ang impluwensya nito ay nagmumula sa iisang pagkakakilanlan at matibay na tradisyon.
cent = Ang Central America ay isang panrehiyong unyon na nag-uugnay sa mga bansa sa pamamagitan ng kalakalan at kooperasyon. Nakatuon ito sa paglago ng ekonomiya, katatagan, at pinagsasaluhang pag-unlad. Ang lakas nito ay nagmumula sa pagkakaisa ng magkakaibang bansa.
chee = Ang Chera ay isang sinaunang estadong Timog India na kilala sa kalakalan, lakas pandagat, at impluwensyang kultural. Nakatuon ito sa komersyo, mga rutang pandagat, at kasaganaan sa rehiyon. Ang lakas nito ay nagmumula sa kontrol sa baybaying kalakalan at estratehikong mga daungan.
chol = Ang Chola ay isang makapangyarihang imperyong Timog India na kilala sa dominasyong pandagat at pagpapalawak. Nakatuon ito sa kalakalan, pananakop, at matibay na administrasyon. Ang lakas nito ay nagmumula sa makapangyarihang hukbong-dagat at organisadong pamamahala.
plai3 = Ang Confederation of the Plains ay isang maluwag na unyon ng mga teritoryo na nagbibigay-diin sa kooperasyon at pinagsasaluhang depensa. Nakatuon ito sa agrikultura, mobilidad, at koordinasyon sa pagitan ng mga rehiyon. Ang lakas nito ay nagmumula sa pagkakaisa sa malalawak at mayamang lupain.
cos = Ang Cossacks ay isang lipunang mandirigma na kilala sa kalayaan, kadaliang kumilos, at kasanayang militar. Nakatuon sila sa depensa, pagsalakay, at pagprotekta sa kanilang lupain. Ang kanilang lakas ay nagmumula sa kalayaan, disiplina, at matibay na tradisyon.
coub = Ang Courland ay isang maliit ngunit ambisyosong estado na kilala sa kalakalan at kolonyal na mga paglalakbay. Nakatuon ito sa pagpapalawak pandagat, komersyo, at estratehikong impluwensya. Ang lakas nito ay nagmumula sa kakayahang magpalawak ng kapangyarihan lampas sa sukat nito.
crkh = Ang Crimean Khanate ay isang steppe na estado na kilala sa mabilis na kabalyerya at lakas sa pagsalakay. Nakatuon ito sa mobilidad, kapangyarihang militar, at kontrol sa mga rutang pangkalakalan. Ang lakas nito ay nagmumula sa bilis at estratehikong pakikidigma.
cum = Ang Cumania ay isang steppe na konfederasyon na kilala sa mga nomadikong mandirigma at malalawak na pastulan. Nakatuon ito sa mobilidad, pagsalakay, at kontrol sa bukas na teritoryo. Ang lakas nito ay nagmumula sa mabilis na kabalyerya at kakayahang umangkop.
cypk = Ang Kingdom of Cyprus ay isang estadong isla na kilala sa estratehikong lokasyon at impluwensyang pandagat. Nakatuon ito sa kalakalan, diplomasya, at lakas pandagat. Ang kapangyarihan nito ay nagmumula sa kontrol sa mahahalagang rutang pandagat sa rehiyon.
cze = Ang Czechia ay isang estadong nasa Gitnang Europa na kilala sa matibay na ekonomiya at pamana ng kultura. Nakatuon ito sa katatagan, industriya, at panloob na pag-unlad. Ang lakas nito ay nagmumula sa organisasyon at kahalagahang panrehiyon.
czsl = Ang Czechoslovakia ay isang estadong nasa Gitnang Europa na nakatuon sa pagkakaisa sa pagitan ng mga rehiyon nito at malakas na industriyal na pag-unlad. Binibigyang-diin nito ang katatagan, depensa, at paglago ng ekonomiya. Ang lakas nito ay nagmumula sa kooperasyon at pinagsasaluhang pagkakakilanlan.
dacc = Ang Dacia ay isang sinaunang estado na kilala sa matibay na kulturang mandirigma at paglaban sa makapangyarihang imperyo. Nakatuon ito sa depensa, kontrol sa teritoryo, at pagpapanatili ng pagkakakilanlan nito. Ang lakas nito ay nagmumula sa katatagan at determinasyon.
dalm2 = Ang Dalmatia ay isang estadong baybayin na kilala sa estratehikong lokasyon nito sa dagat at malakas na impluwensyang pandagat. Nakatuon ito sa kalakalan, kapangyarihang pandagat, at kontrol sa rehiyon. Ang lakas nito ay nagmumula sa mga daungan at kontrol sa mga rutang baybayin.
danu3 = Ang Danubian Empire ay isang malaking estadong nakabatay sa ilog na pinag-iisa ang mga teritoryo sa kahabaan ng Danube. Nakatuon ito sa kalakalan, estratehikong kontrol, at integrasyong pang-ekonomiya sa iba’t ibang rehiyon. Ang lakas nito ay nagmumula sa kontrol sa isa sa pinakamahalagang ilog sa Europa.
nodm = Ang Denmark–Norway ay isang unyon ng dalawang kaharian na nagbabahagi ng kapangyarihang pandagat at matibay na tradisyong pandagat. Nakatuon ito sa kalakalan, kontrol sa dagat, at kooperasyon sa pagitan ng mga lupain nito. Ang lakas nito ay nagmumula sa makapangyarihang hukbong-dagat at pinagsasaluhang pamamahala.
durr = Ang Durrani Empire ay isang makapangyarihang estado sa Gitna at Timog Asya na kilala sa lakas militar at pagpapalawak ng teritoryo. Nakatuon ito sa pananakop, kontrol, at dominasyong panrehiyon. Ang lakas nito ay nagmumula sa matibay na pamumuno at disiplinadong hukbo.
eagl3 = Ang Eagle Union ay isang makabagong makapangyarihang estado na nakatuon sa industriya, lakas militar, at teknolohikal na pag-unlad. Binibigyang-diin nito ang dominasyong pandagat at pandaigdigang impluwensya. Ang lakas nito ay nagmumula sa inobasyon at napakalaking kakayahan.
eaff = Ang East African Federation ay isang panrehiyong unyon na nagbibigay-diin sa kooperasyon, kalakalan, at pinagsasaluhang pag-unlad sa mga kasapi nito. Nakatuon ito sa paglago ng ekonomiya, imprastraktura, at katatagang panrehiyon. Ang lakas nito ay nagmumula sa pagkakaisa ng magkakaibang bansa.
east2 = Ang Eastern Roman Empire ay isang pagpapatuloy ng pamana ng Roma na nakasentro sa matibay na administrasyon at estratehikong depensa. Nakatuon ito sa diplomasya, lakas militar, at pagpapanatili ng impluwensya. Ang kapangyarihan nito ay nagmumula sa organisasyon at pagtitiis.
egy = Ang Kingdom of Egypt ay isang makasaysayan at maimpluwensyang estado na kilala sa kultura, agrikultura, at kontrol sa Ilog Nile. Nakatuon ito sa katatagan, pamamahala ng yaman, at impluwensyang panrehiyon. Ang lakas nito ay nagmumula sa matabang lupain at matibay na pamahalaan.
bra = Ang Empire of Brazil ay isang makapangyarihang estado na nakatuon sa pagpapalawak, katatagan, at kontrol sa malalawak na teritoryo. Binibigyang-diin nito ang paglago ng ekonomiya, pamamahala ng yaman, at sentralisadong awtoridad. Ang lakas nito ay nagmumula sa laki at estratehikong pamumuno.
jauu3 = Ang Empire of Jaunpur ay isang malakas na estadong panrehiyon na kilala sa kultura, arkitektura, at lakas militar. Nakatuon ito sa pagpapalawak, pamamahala, at pagpapanatili ng impluwensya sa rehiyon. Ang kapangyarihan nito ay nagmumula sa disiplinadong pamumuno at estratehikong posisyon.
