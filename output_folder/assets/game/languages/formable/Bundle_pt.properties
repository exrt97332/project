prbr3 = Reino Unido de Portugal, Brasil e Algarves é um estado histórico transatlântico que uniu territórios na Europa e América do Sul. Foca em governança, comércio e coordenação imperial. Sua força vem do alcance global e unidade política entre continentes.
uni = Reino Unido é uma monarquia constitucional europeia conhecida por sua influência global e estabilidade política. Foca em governança, diplomacia e desenvolvimento econômico. Sua força vem de instituições fortes e influência histórica.
uso = Estados Unidos da Oceania é uma federação conceitual de nações insulares no Pacífico. Foca em unidade, cooperação e estratégia marítima. Sua força vem da combinação de recursos e conectividade oceânica.
ural4 = União Uralica é uma aliança regional conceitual dos povos que falam línguas urálicas. Foca em unidade cultural, cooperação e desenvolvimento compartilhado. Sua força vem de laços linguísticos e culturais.
vand = Reino Vândalo é um estado germânico histórico conhecido por sua conquista e domínio na África do Norte. Foca em expansão, força militar e governança. Sua força vem da mobilidade e liderança eficaz.
visi = Visigodos são um povo germânico histórico conhecido por estabelecer um reino poderoso na Europa Ocidental. Focam em expansão, assentamento e governança. Sua força vem da organização militar e adaptabilidade.
wal = País de Gales é um país no Reino Unido conhecido por suas paisagens montanhosas e rico patrimônio cultural. Foca em preservação cultural, governança e identidade regional. Sua força vem de tradições fortes e cultura nacional distinta.
wife = Federação das Índias Ocidentais foi uma união caribenha de curta duração visando unir várias ilhas. Foca em cooperação, governança e unidade regional. Sua força vem da identidade compartilhada e recursos combinados.
wepp = Vestfália é uma região histórica na Europa conhecida por seu papel na formação dos sistemas políticos modernos. Foca em governança, diplomacia e estabilidade regional. Sua força vem de tratados históricos e influência política.
bew = Ruthênia Branca é um nome histórico e regional associado à Bielorrússia. Foca em patrimônio cultural, governança e identidade regional. Sua força vem de tradições compartilhadas e continuidade histórica.
yuan = Dinastia Yuan é uma dinastia histórica na China estabelecida pelos mongóis, conhecida por unificar grandes territórios. Foca em expansão, governança e controle. Sua força vem de organização militar forte e governo centralizado.
yugo = Iugoslávia é um estado histórico no Sudeste da Europa conhecido por unir múltiplos grupos étnicos. Foca em cooperação, governança e estabilidade regional. Sua força vem da unidade entre comunidades diversas e liderança compartilhada.
drc = Zaire é um estado histórico africano conhecido por seus vastos recursos naturais e localização central. Foca em governança, desenvolvimento econômico e gestão de recursos. Sua força vem da riqueza natural e geografia estratégica.
zim = Zimbábue é um estado da África Austral conhecido por sua rica história e recursos naturais. Foca em estabilidade, desenvolvimento e cooperação regional. Sua força vem da riqueza mineral e patrimônio cultural.
