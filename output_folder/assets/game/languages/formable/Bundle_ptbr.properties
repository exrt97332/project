tusc = Toscana é uma região histórica da Itália conhecida por sua arte, cultura e influência econômica. Foca em desenvolvimento cultural, comércio e inovação. Sua força vem do patrimônio artístico e da prosperidade econômica.
ukr = Ucrânia é um estado da Europa Oriental conhecido por suas vastas terras agrícolas e herança cultural. Foca em estabilidade, desenvolvimento e cooperação regional. Sua força vem dos recursos naturais e do solo fértil.
unba = Ducado Báltico Unido é um conceito histórico na região do Báltico que propõe a unificação sob uma única administração. Foca em governança, cooperação regional e estabilidade política. Sua força vem da liderança centralizada e da consolidação territorial.
gguy3 = Guiana Unida é uma ideia regional que representa a união da região da Guiana na América do Sul. Foca em cooperação, desenvolvimento e governança compartilhada. Sua força vem da integração regional e da gestão de recursos.
prbr3 = Reino Unido de Portugal, Brasil e Algarves é um estado histórico transatlântico que uniu territórios na Europa e na América do Sul. Foca em governança, comércio e coordenação imperial. Sua força vem do alcance global e da unidade política entre continentes.
uni = Reino Unido é uma monarquia constitucional europeia conhecida por sua influência global e estabilidade política. Foca em governança, diplomacia e desenvolvimento econômico. Sua força vem das instituições fortes e da influência histórica.
uso = Estados Unidos da Oceania é uma federação conceitual de nações insulares no Pacífico. Foca em unidade, cooperação e estratégia marítima. Sua força vem dos recursos combinados e da conectividade oceânica.
ural4 = União Uralica é uma aliança conceitual regional dos povos urálicos. Foca em unidade cultural, cooperação e desenvolvimento compartilhado. Sua força vem dos laços linguísticos e culturais.
vand = Reino Vândalo é um estado histórico germânico conhecido por sua conquista e domínio no Norte da África. Foca em expansão, força militar e governança. Sua força vem da mobilidade e da liderança eficaz.
visi = Visigodos são um povo germânico histórico conhecido por estabelecer um poderoso reino na Europa Ocidental. Focam em expansão, assentamento e governança. Sua força vem da organização militar e adaptabilidade.
wal = País de Gales é uma nação do Reino Unido conhecida por suas paisagens montanhosas e rica herança cultural. Foca em preservação cultural, governança e identidade regional. Sua força vem das tradições fortes e da cultura distinta.
wife = Federação das Índias Ocidentais foi uma união caribenha de curta duração que buscava unir vários territórios insulares. Foca em cooperação, governança e unidade regional. Sua força vem da identidade compartilhada e dos recursos combinados.
wepp = Vestfália é uma região histórica da Europa conhecida por seu papel na formação dos sistemas políticos modernos. Foca em governança, diplomacia e estabilidade regional. Sua força vem de seus tratados históricos e influência política.
bew = Rutênia Branca é um nome histórico e regional associado à Bielorrússia. Foca em herança cultural, governança e identidade regional. Sua força vem das tradições compartilhadas e da continuidade histórica.
yuan = Yuan é uma dinastia histórica da China estabelecida pelos mongóis, conhecida por unificar grandes territórios. Foca em expansão, governança e controle. Sua força vem da organização militar e do governo centralizado.
yugo = Iugoslávia é um estado histórico do sudeste europeu conhecido por unir vários grupos étnicos. Foca em cooperação, governança e estabilidade regional. Sua força vem da unidade entre comunidades diversas e liderança compartilhada.
drc = Zaire é um estado histórico africano conhecido por seus vastos recursos naturais e localização central. Foca em governança, desenvolvimento econômico e gestão de recursos. Sua força vem da riqueza natural e da geografia estratégica.
zim = Zimbábue é um estado da África Austral conhecido por sua rica história e recursos naturais. Foca em estabilidade, desenvolvimento e cooperação regional. Sua força vem da riqueza mineral e da herança cultural.
