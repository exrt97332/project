som = Somalia este un stat din Cornul Africii, cunoscut pentru coasta lungă și patrimoniul cultural. Se concentrează pe stabilitate, comerț și cooperare regională. Puterea sa provine din accesul maritim și unitatea culturală.
gsg3 = Confederația Germană de Sud este un stat regional istoric din Europa Centrală, cunoscut pentru unirea regiunilor germane de sud. Se concentrează pe cooperare, guvernare și stabilitate regională. Puterea sa provine din identitate comună și conducere coordonată.
rus = Uniunea Sovietică este un stat istoric puternic, cunoscut pentru teritoriul vast și sistemul politic centralizat. Se concentrează pe guvernare, dezvoltare industrială și influență globală. Puterea sa provine din planificare centralizată și control puternic al statului.
spa = Spania este un stat european cunoscut pentru istoria bogată, cultură și influența maritimă globală. Se concentrează pe turism, patrimoniu cultural și dezvoltare economică. Puterea sa provine din diversitatea culturală și moștenirea istorică.
spa4 = Imperiul Spaniol este un imperiu global istoric puternic, cunoscut pentru teritoriile sale vaste și dominația maritimă. Se concentrează pe expansiune, comerț și influență culturală. Puterea sa provine din puterea navală și extinderea colonială.
spaem = Imperiul Spartan este un stat inspirat de Sparta antică, cunoscut pentru disciplină strictă și accent pe militarizare. Se concentrează pe război, antrenament și ordine societală. Puterea sa provine din rigoare militară și unitate.
sri = Sri Lanka este un stat insular din Asia de Sud, cunoscut pentru patrimoniul cultural și frumusețea naturală. Se concentrează pe stabilitate, comerț și cooperare regională. Puterea sa provine din poziția strategică și diversitatea culturală.
suns3 = Imperiul Sunset este un stat simbolic, reprezentând tranziția, moștenirea și simbolismul cultural. Se concentrează pe unitate, identitate și influență regională. Puterea sa provine din viziunea comună și coeziunea culturală.
swab = Swabia este o regiune istorică din Europa Centrală, cunoscută pentru influența culturală și politică. Se concentrează pe identitate regională, cooperare și guvernare. Puterea sa provine din unitatea culturală și moștenirea istorică.
swi = Elveția este un stat european cunoscut pentru neutralitate, stabilitate și sistem financiar puternic. Se concentrează pe pace, guvernare și dezvoltare economică. Puterea sa provine din neutralitate politică și economie puternică.
thir = Cele Treisprezece Colonii sunt un grup istoric de colonii britanice în America de Nord, cunoscute pentru crearea fundației Statelor Unite. Se concentrează pe autoguvernare, comerț și independență. Puterea sa provine din unitate și idealuri politice comune.
tib2 = Imperiul Tibetan este un stat istoric puternic în Asia Centrală, cunoscut pentru influența culturală și religioasă. Se concentrează pe expansiune, guvernare și conducere spirituală. Puterea sa provine din unitatea culturală și geografia strategică montană.
trr = Tripoli este un oraș de coastă și o regiune istorică în Africa de Nord, cunoscut pentru importanța sa maritimă. Se concentrează pe comerț, activitate navală și influență regională. Puterea sa provine din portul său și din poziția strategică în Mediterană.
gbul3 = Țaratul Bulgar este un stat istoric balcanic, cunoscut pentru puterea medievală și dezvoltarea culturală. Se concentrează pe guvernare, expansiune și identitate culturală. Puterea sa provine din conducere puternică și influență regională.
tusc = Toscana este o regiune istorică în Italia, cunoscută pentru artă, cultură și influență economică. Se concentrează pe dezvoltare culturală, comerț și inovație. Puterea sa provine din patrimoniul artistic și prosperitatea economică.
ukr = Ucraina este un stat din Europa de Est, cunoscut pentru terenurile agricole vaste și patrimoniul cultural. Se concentrează pe stabilitate, dezvoltare și cooperare regională. Puterea sa provine din resurse naturale și terenuri fertile.
unba = Ducatul Baltică Unit este un concept istoric de stat în regiunea baltică, cunoscut pentru propunerea de unificare sub o administrație unică. Se concentrează pe guvernare, cooperare regională și stabilitate politică. Puterea sa provine din conducere centralizată și consolidarea teritorială.
gguy3 = Guyana Unită este un concept regional care reprezintă unitatea în regiunea Guyanei din America de Sud. Se concentrează pe cooperare, dezvoltare și guvernare comună. Puterea sa provine din integrarea regională și gestionarea resurselor.
prbr3 = Regatul Unit al Portugaliei, Braziliei și Algarvelor este un stat istoric transatlantic care a unit teritorii din Europa și America de Sud. Se concentrează pe guvernare, comerț și coordonare imperială. Puterea sa provine din acoperirea globală și unitatea politică între continente.
uni = Regatul Unit este o monarhie constituțională europeană, cunoscută pentru influența globală și stabilitatea politică. Se concentrează pe guvernare, diplomație și dezvoltare economică. Puterea sa provine din instituții puternice și influență istorică.
uso = Statele Unite ale Oceaniei sunt o federație conceptuală de națiuni insulare din Pacific. Se concentrează pe unitate, cooperare și strategie maritimă. Puterea sa provine din resurse combinate și conectivitate oceanică.
ural4 = Uniunea Uralică este o alianță regională conceptuală a popoarelor vorbitoare de limbi uralice. Se concentrează pe unitate culturală, cooperare și dezvoltare comună. Puterea sa provine din legăturile lingvistice și culturale.
vand = Regatul Vandal este un stat germanic istoric, cunoscut pentru cuceriri și domnie în Africa de Nord. Se concentrează pe expansiune, putere militară și guvernare. Puterea sa provine din mobilitate și conducere eficientă.
visi = Vizigoții sunt un popor germanic istoric, cunoscut pentru întemeierea unui regat puternic în Europa de Vest. Se concentrează pe expansiune, așezare și guvernare. Puterea lor provine din organizarea militară și adaptabilitate.
wal = Țara Galilor este o țară din Regatul Unit, cunoscută pentru peisajele montane și patrimoniul cultural bogat. Se concentrează pe conservarea culturală, guvernare și identitate regională. Puterea sa provine din tradiții puternice și cultură națională distinctă.
wife = Federația Indiilor de Vest a fost o uniune caribiană de scurtă durată, care a încercat să unească mai multe teritorii insulare. Se concentrează pe cooperare, guvernare și unitate regională. Puterea sa provine din identitate comună și resurse combinate.
wepp = Westfalia este o regiune istorică din Europa, cunoscută pentru rolul său în formarea sistemelor politice moderne. Se concentrează pe guvernare, diplomație și stabilitate regională. Puterea sa provine din tratatele istorice și influența politică.
bew = Ruthenia Albă este un nume istoric și regional asociat cu Belarus. Se concentrează pe patrimoniu cultural, guvernare și identitate regională. Puterea sa provine din tradiții comune și continuitate istorică.
yuan = Dinastia Yuan este o dinastie istorică în China, stabilită de mongoli, cunoscută pentru unificarea unor teritorii vaste. Se concentrează pe expansiune, guvernare și control. Puterea sa provine din organizare militară puternică și conducere centralizată.
yugo = Iugoslavia este un stat istoric din Europa de Sud-Est, cunoscut pentru unirea mai multor grupuri etnice. Se concentrează pe cooperare, guvernare și stabilitate regională. Puterea sa provine din unitatea între comunități diverse și conducere comună.
drc = Zair este un stat african istoric, cunoscut pentru resursele naturale vaste și locația centrală. Se concentrează pe guvernare, dezvoltare economică și gestionarea resurselor. Puterea sa provine din bogăția naturală și geografia strategică.
zim = Zimbabwe este un stat din Africa de Sud, cunoscut pentru istoria bogată și resursele naturale. Se concentrează pe stabilitate, dezvoltare și cooperare regională. Puterea sa provine din bogăția minerală și patrimoniul cultural.
