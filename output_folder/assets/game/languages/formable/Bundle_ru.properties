rum = Султанат Рум это историческое анатолийское государство, известное смешением культур и стратегическим положением. Оно сосредоточено на управлении, торговле и культурном обмене. Его сила исходит из положения на перекрёстке цивилизаций.
rus2 = Российская империя это могущественное и обширное государство, известное огромной территорией и сильной централизованной властью. Оно сосредоточено на экспансии, управлении и геополитическом влиянии. Его сила исходит из больших земель и дисциплинированного управления.
gbra3 = Российская империя это огромное и могущественное государство, известное огромной территорией и сильной автократической властью. Оно сосредоточено на экспансии, централизованном управлении и поддержании влияния в регионах. Его сила исходит из размеров, ресурсов и дисциплинированного управления.
saff3 = Саффаридская империя это раннее исламское персидское государство, известное быстрым подъёмом и военной мощью. Оно сосредоточено на экспансии, управлении и региональном контроле. Его сила исходит из военного лидерства и стратегических амбиций.
saku3 = Империя Сакура это концептуальное государство, вдохновлённое японской культурой и традициями. Оно сосредоточено на культуре, дисциплине и технологическом развитии. Его сила исходит из организации и культурной идентичности.
samo = Империя Само это славянское племенное государство, известное объединением различных групп под одним руководством. Оно сосредоточено на единстве, обороне и региональной стабильности. Его сила исходит из сотрудничества и коллективного сопротивления.
sard = Сардиния это средиземноморское островное государство, известное стратегическим положением и культурным наследием. Оно сосредоточено на торговле, стабильности и региональном влиянии. Его сила исходит из морского положения и природных ресурсов.
sasa = Сасанидская империя это могущественное древнее персидское государство, известное сильной администрацией и культурными достижениями. Оно сосредоточено на экспансии, управлении и соперничестве с соседними державами. Его сила исходит из централизованной власти и дисциплинированной армии.
sau = Саудовская Аравия это государство Ближнего Востока, известное обширными пустынями и значительными энергетическими ресурсами. Оно сосредоточено на экономическом развитии, стабильности и региональном влиянии. Его сила исходит из природных ресурсов и стратегического руководства.
gsca3 = Скандинавская империя это концептуальное северное государство, представляющее объединённую силу скандинавских стран. Оно сосредоточено на сотрудничестве, стабильности и экономическом развитии. Его сила исходит из единства, инноваций и сильных социальных систем.
scyt4 = Скифия это древний кочевой регион, известный умелыми всадниками и воинской культурой. Оно сосредоточено на мобильности, войнах и территориальном влиянии. Его сила исходит из кавалерии и адаптивности на обширных землях.
ser2 = Сербская империя это могущественное средневековое балканское государство, известное территориальной экспансией и культурными достижениями. Оно сосредоточено на управлении, завоеваниях и региональном влиянии. Его сила исходит из сильного руководства и военной организации.
tha2 = Сиам это историческое юго-восточноазиатское государство, известное богатой культурой и дипломатией. Оно сосредоточено на управлении, сохранении культуры и региональном балансе. Его сила исходит из адаптивности и сильного центрального руководства.
sic = Королевство Сицилия это историческое средиземноморское государство, известное культурным смешением и стратегическим положением. Оно сосредоточено на торговле, управлении и культурном обмене. Его сила исходит из положения на перекрёстке цивилизаций.
soko = Сокото это могущественное западноафриканское исламское государство, известное сильной религиозной и административной структурой. Оно сосредоточено на управлении, экспансии и распространении религиозных ценностей. Его сила исходит из единства, лидерства и организованного управления.
somi3 = Сомалийская империя это историческое восточноафриканское морское и торговое государство, известное прибрежным влиянием и коммерцией. Оно сосредоточено на торговле, морской деятельности и региональном контроле. Его сила исходит из морского мастерства и стратегических прибрежных сетей.
som = Сомали это государство Рога Африки, известное длинной береговой линией и культурным наследием. Оно сосредоточено на стабильности, торговле и региональном сотрудничестве. Его сила исходит из доступа к морю и культурного единства.
gsg3 = Южногерманский союз это историческое региональное государство в центральной Европе, известное объединением южных немецких регионов. Оно сосредоточено на сотрудничестве, управлении и региональной стабильности. Его сила исходит из общей идентичности и координированного руководства.
rus = Советский Союз это могущественное историческое государство, известное обширной территорией и централизованной политической системой. Оно сосредоточено на управлении, промышленном развитии и глобальном влиянии. Его сила исходит из централизованного планирования и сильного государственного контроля.
spa = Испания это европейское государство, известное богатой историей, культурой и глобальным морским влиянием. Оно сосредоточено на туризме, культурном наследии и экономическом развитии. Его сила исходит из культурного разнообразия и исторического наследия.
spa4 = Испанская империя это могущественная историческая глобальная империя, известная обширными заморскими территориями и морским доминированием. Она сосредоточена на экспансии, торговле и культурном влиянии. Ее сила исходит из морской мощи и колониального охвата.
spaem = Спартанская империя это историческое государство, вдохновлённое древней Спартой, известное строгой дисциплиной и военной направленностью. Оно сосредоточено на войне, обучении и общественном порядке. Его сила исходит из военной строгости и единства.
sri = Шри-Ланка это островное государство в Южной Азии, известное культурным наследием и природной красотой. Оно сосредоточено на стабильности, торговле и региональном сотрудничестве. Его сила исходит из стратегического положения и культурного разнообразия.
suns3 = Империя Заката это символическое государство, представляющее переход, наследие и культурные символы. Оно сосредоточено на единстве, идентичности и региональном влиянии. Его сила исходит из общей концепции и культурного единства.
swab = Швабия это исторический регион в центральной Европе, известный культурным и политическим влиянием. Оно сосредоточено на региональной идентичности, сотрудничестве и управлении. Его сила исходит из культурного единства и исторического наследия.
swi = Швейцария это европейское государство, известное нейтралитетом, стабильностью и сильной финансовой системой. Оно сосредоточено на мире, управлении и экономическом развитии. Его сила исходит из политической нейтральности и прочной экономики.
thir = Тринадцать колоний это историческая группа британских колоний в Северной Америке, известная как фундамент будущих Соединённых Штатов. Она сосредоточена на самоуправлении, торговле и независимости. Ее сила исходит из единства и общих политических идеалов.
tib2 = Тибетская империя это могущественное историческое государство в Центральной Азии, известное культурным и религиозным влиянием. Оно сосредоточено на экспансии, управлении и духовном лидерстве. Его сила исходит из культурного единства и стратегического расположения в горах.
trr = Триполи это прибрежный город и исторический регион в Северной Африке, известный морским значением. Оно сосредоточено на торговле, морской деятельности и региональном влиянии. Его сила исходит из порта и стратегического положения в Средиземноморье.
gbul3 = Царство Болгария это историческое балканское государство, известное средневековой мощью и культурным развитием. Оно сосредоточено на управлении, экспансии и культурной идентичности. Его сила исходит из сильного руководства и регионального влияния.
tusc = Тоскана это исторический регион Италии, известный искусством, культурой и экономическим влиянием. Оно сосредоточено на культурном развитии, торговле и инновациях. Его сила исходит из художественного наследия и экономического процветания.
ukr = Украина это восточноевропейское государство, известное обширными сельскохозяйственными землями и культурным наследием. Оно сосредоточено на стабильности, развитии и региональном сотрудничестве. Его сила исходит из природных ресурсов и плодородных земель.
unba = Объединённое Балтийское герцогство это историческая концепция государства в Балтийском регионе, известная предложением объединения под одной администрацией. Оно сосредоточено на управлении, региональном сотрудничестве и политической стабильности. Его сила исходит из централизованного руководства и территориальной консолидации.
gguy3 = Объединённая Гайана это региональная идея, представляющая единство в регионе Гайаны в Южной Америке. Оно сосредоточено на сотрудничестве, развитии и совместном управлении. Его сила исходит из региональной интеграции и управления ресурсами.
prbr3 = Объединённое королевство Португалии, Бразилии и Алгарве это историческое трансатлантическое государство, объединившее территории Европы и Южной Америки. Оно сосредоточено на управлении, торговле и координации империи. Его сила исходит из глобального охвата и политического единства на разных континентах.
uni = Соединённое королевство это европейская конституционная монархия, известная глобальным влиянием и политической стабильностью. Оно сосредоточено на управлении, дипломатии и экономическом развитии. Его сила исходит из сильных институтов и исторического влияния.
uso = Соединённые Штаты Океании это концептуальная федерация островных государств в Тихом океане. Оно сосредоточено на единстве, сотрудничестве и морской стратегии. Его сила исходит из объединённых ресурсов и океанской связанности.
ural4 = Уральский союз это концептуальный региональный альянс уральскоязычных народов. Оно сосредоточено на культурном единстве, сотрудничестве и совместном развитии. Его сила исходит из лингвистических и культурных связей.
vand = Вандальское королевство это историческое германское государство, известное завоеванием и правлением в Северной Африке. Оно сосредоточено на экспансии, военной мощи и управлении. Его сила исходит из мобильности и эффективного руководства.
visi = Вестготы это исторический германский народ, известный созданием мощного королевства в Западной Европе. Они сосредоточены на экспансии, поселении и управлении. Их сила исходит из военной организации и адаптивности.
wal = Уэльс это страна в составе Соединённого королевства, известная гористыми ландшафтами и богатым культурным наследием. Оно сосредоточено на сохранении культуры, управлении и региональной идентичности. Его сила исходит из сильных традиций и уникальной национальной культуры.
wife = Федерация Вест-Индии это краткосрочный карибский союз, стремившийся объединить несколько островных территорий. Оно сосредоточено на сотрудничестве, управлении и региональном единстве. Его сила исходит из общей идентичности и объединённых ресурсов.
wepp = Вестфалия это исторический регион в Европе, известный ролью в формировании современных политических систем. Оно сосредоточено на управлении, дипломатии и региональной стабильности. Его сила исходит из исторических договоров и политического влияния.
bew = Белая Русь это историческое и региональное название, связанное с Беларусью. Оно сосредоточено на культурном наследии, управлении и региональной идентичности. Его сила исходит из общих традиций и исторической преемственности.
yuan = Юань это историческая китайская династия, основанная монголами, известная объединением обширных территорий. Оно сосредоточено на экспансии, управлении и контроле. Его сила исходит из сильной военной организации и централизованного управления.
yugo = Югославия это историческое государство в Юго-Восточной Европе, известное объединением множества этнических групп. Оно сосредоточено на сотрудничестве, управлении и региональной стабильности. Его сила исходит из единства различных сообществ и совместного руководства.
drc = Заир это историческое африканское государство, известное огромными природными ресурсами и центральным расположением. Оно сосредоточено на управлении, экономическом развитии и управлении ресурсами. Его сила исходит из природного богатства и стратегического положения.
zim = Зимбабве это государство Южной Африки, известное богатой историей и природными ресурсами. Оно сосредоточено на стабильности, развитии и региональном сотрудничестве. Его сила исходит из минерального богатства и культурного наследия.
