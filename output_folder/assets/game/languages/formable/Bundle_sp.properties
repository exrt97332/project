ukr = Ucrania es un estado de Europa del Este conocido por sus vastas tierras agrícolas y patrimonio cultural. Se centra en la estabilidad, el desarrollo y la cooperación regional. Su fuerza proviene de sus recursos naturales y tierras fértiles.
unba = Ducado Báltico Unido es un concepto histórico de estado en la región báltica conocido por la propuesta de unificación bajo una sola administración. Se centra en el gobierno, la cooperación regional y la estabilidad política. Su fuerza proviene del liderazgo centralizado y la consolidación territorial.
gguy3 = Guyana Unida es una idea regional que representa la unidad en la región de Guyana, Sudamérica. Se centra en la cooperación, el desarrollo y el gobierno compartido. Su fuerza proviene de la integración regional y la gestión de recursos.
prbr3 = Reino Unido de Portugal, Brasil y Algarve es un estado histórico transatlántico que unió territorios en Europa y Sudamérica. Se centra en el gobierno, el comercio y la coordinación imperial. Su fuerza proviene del alcance global y la unidad política entre continentes.
uni = Reino Unido es una monarquía constitucional europea conocida por su influencia global y estabilidad política. Se centra en el gobierno, la diplomacia y el desarrollo económico. Su fuerza proviene de instituciones sólidas e influencia histórica.
uso = Estados Unidos de Oceanía es una federación conceptual de naciones insulares del Pacífico. Se centra en la unidad, la cooperación y la estrategia marítima. Su fuerza proviene de los recursos combinados y la conectividad oceánica.
ural4 = Unión Uralica es una alianza regional conceptual de pueblos urálicos. Se centra en la unidad cultural, cooperación y desarrollo compartido. Su fuerza proviene de los lazos lingüísticos y culturales.
vand = Reino Vándalo es un estado germánico histórico conocido por su conquista y gobierno en el norte de África. Se centra en la expansión, fuerza militar y administración. Su fuerza proviene de la movilidad y liderazgo efectivo.
visi = Visigodos son un pueblo germánico histórico conocido por establecer un reino poderoso en Europa occidental. Se centran en la expansión, asentamiento y gobierno. Su fuerza proviene de la organización militar y adaptabilidad.
wal = Gales es un país del Reino Unido conocido por sus paisajes montañosos y rico patrimonio cultural. Se centra en la preservación cultural, gobierno e identidad regional. Su fuerza proviene de tradiciones sólidas y una cultura nacional distintiva.
wife = Federación de las Indias Occidentales fue una unión caribeña de corta duración que buscaba unir varias islas. Se centra en la cooperación, gobierno y unidad regional. Su fuerza proviene de la identidad compartida y los recursos combinados.
wepp = Westfalia es una región histórica de Europa conocida por su papel en la formación de sistemas políticos modernos. Se centra en el gobierno, la diplomacia y la estabilidad regional. Su fuerza proviene de sus tratados históricos e influencia política.
bew = Ruthenia Blanca es un nombre histórico y regional asociado con Bielorrusia. Se centra en el patrimonio cultural, gobierno e identidad regional. Su fuerza proviene de tradiciones compartidas y continuidad histórica.
yuan = Dinastía Yuan es una dinastía histórica de China establecida por los mongoles, conocida por unificar grandes territorios. Se centra en la expansión, el gobierno y el control. Su fuerza proviene de la organización militar y el gobierno centralizado.
yugo = Yugoslavia es un estado histórico del sudeste de Europa conocido por unir múltiples grupos étnicos. Se centra en la cooperación, el gobierno y la estabilidad regional. Su fuerza proviene de la unidad entre comunidades diversas y liderazgo compartido.
drc = Zaire es un estado histórico africano conocido por sus vastos recursos naturales y ubicación central. Se centra en el gobierno, desarrollo económico y gestión de recursos. Su fuerza proviene de la riqueza natural y geografía estratégica.
zim = Zimbabue es un estado del sur de África conocido por su rica historia y recursos naturales. Se centra en la estabilidad, el desarrollo y la cooperación regional. Su fuerza proviene de la riqueza mineral y el patrimonio cultural.
