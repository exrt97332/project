prbr3 = El Reino Unido de Portugal, Brasil y los Algarves es un estado transatlántico histórico que unió territorios en Europa y América del Sur. Se enfoca en el gobierno, el comercio y la coordinación imperial. Su fuerza proviene del alcance global y la unidad política entre continentes.
uni = El Reino Unido es una monarquía constitucional europea conocida por su influencia global y estabilidad política. Se enfoca en el gobierno, la diplomacia y el desarrollo económico. Su fuerza proviene de instituciones sólidas y su influencia histórica.
uso = Los Estados Unidos de Oceanía es una federación conceptual de naciones insulares a través del Pacífico. Se enfoca en la unidad, la cooperación y la estrategia marítima. Su fuerza proviene de los recursos combinados y la conectividad oceánica.
ural4 = La Unión Uralica es una alianza regional conceptual de pueblos de lenguas urálicas. Se enfoca en la unidad cultural, la cooperación y el desarrollo compartido. Su fuerza proviene de los vínculos lingüísticos y culturales.
vand = El Reino Vándalo es un estado histórico germánico conocido por sus conquistas y su dominio en el norte de África. Se enfoca en la expansión, la fuerza militar y el gobierno. Su fuerza proviene de la movilidad y el liderazgo eficaz.
visi = Los Visigodos son un pueblo germánico histórico conocido por establecer un poderoso reino en Europa occidental. Se enfocan en la expansión, el asentamiento y el gobierno. Su fuerza proviene de la organización militar y la adaptabilidad.
wal = Gales es un país del Reino Unido conocido por sus paisajes montañosos y su rica herencia cultural. Se enfoca en la preservación cultural, el gobierno y la identidad regional. Su fuerza proviene de sus tradiciones y su cultura distintiva.
wife = La Federación de las Indias Occidentales fue una unión caribeña de corta duración que buscaba unir varios territorios insulares. Se enfoca en la cooperación, el gobierno y la unidad regional. Su fuerza proviene de la identidad compartida y los recursos combinados.
wepp = Westfalia es una región histórica de Europa conocida por su papel en la formación de los sistemas políticos modernos. Se enfoca en el gobierno, la diplomacia y la estabilidad regional. Su fuerza proviene de sus tratados históricos y su influencia política.
bew = La Rutenia Blanca es un nombre histórico y regional asociado con Bielorrusia. Se enfoca en el patrimonio cultural, el gobierno y la identidad regional. Su fuerza proviene de tradiciones compartidas y continuidad histórica.
yuan = La dinastía Yuan es una dinastía histórica de China establecida por los mongoles, conocida por unificar grandes territorios. Se enfoca en la expansión, el gobierno y el control. Su fuerza proviene de la organización militar y el gobierno centralizado.
yugo = Yugoslavia es un estado histórico del sureste de Europa conocido por unir múltiples grupos étnicos. Se enfoca en la cooperación, el gobierno y la estabilidad regional. Su fuerza proviene de la unidad entre comunidades diversas y el liderazgo compartido.
drc = Zaire es un estado histórico africano conocido por sus vastos recursos naturales y su ubicación central. Se enfoca en el gobierno, el desarrollo económico y la gestión de recursos. Su fuerza proviene de su riqueza natural y su geografía estratégica.
zim = Zimbabue es un estado del sur de África conocido por su rica historia y sus recursos naturales. Se enfoca en la estabilidad, el desarrollo y la cooperación regional. Su fuerza proviene de la riqueza mineral y el patrimonio cultural.
