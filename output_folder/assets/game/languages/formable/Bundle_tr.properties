engk = İngiltere Krallığı, güçlü donanması ve siyasi etkisi ile tanınan güçlü ve etkili bir devlettir. Genişleme, ticaret ve küresel etkiye odaklanır. Gücü, deniz hâkimiyeti ve organize yönetimden gelir.
eng = İngiltere, güçlü donanması, sanayisi ve küresel erişimi ile tanınan güçlü ve etkili bir devlettir. Ticaret, genişleme ve uluslararası etkisini sürdürmeye odaklanır. Gücü, deniz gücü ve ekonomik hâkimiyetten gelir.
est = Estonya Krallığı, direnci ve güçlü kimlik bilinci ile tanınan kuzey devletidir. İstikrar, savunma ve bölgesel kalkınmaya odaklanır. Gücü, birlik ve kararlılıktan gelir.
