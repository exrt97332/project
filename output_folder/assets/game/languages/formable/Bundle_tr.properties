pak = Pakistan, stratejik konumu ve kültürel çeşitliliği ile tanınan Güney Asya devletidir. İstikrar, ekonomik kalkınma ve bölgesel güvenliğe odaklanır. Gücü, birlik, direnç ve güçlü ulusal kimlikten gelir.
pagr4 = Patria Grande, Latin Amerika genelinde birleştirici bir bölge konseptidir. Dayanışma ve iş birliğine odaklanır. Ortak kültür, siyasi birlik ve ekonomik iş birliğini vurgular. Gücü, bölgesel entegrasyon ve kolektif kimlikten gelir.
ira = Pers İmparatorluğu, geniş toprak kontrolü ve gelişmiş yönetimi ile tanınan güçlü bir antik devlettir. Genişleme, yönetim ve kültürel bütünleşmeye odaklanır. Gücü, etkin organizasyon ve stratejik liderlikten gelir.
pebo = Peru–Bolivya Konfederasyonu, kısa ömürlü bir bölgesel birliktir; Peru ve Bolivya’yı bir araya getirmiştir. İş birliği, ortak yönetim ve bölgesel güce odaklanır. Gücü, birlik ve birleşik kaynaklardan gelir.
per = Peru, zengin tarihi ve çeşitli coğrafyası ile tanınan bir Güney Amerika devletidir. Ekonomik kalkınma, istikrar ve kültürel mirasa odaklanır. Gücü, kaynakları, tarihi ve ulusal kimlikten gelir.
phi = Filipinler, çok sayıda adası ve zengin kültürel çeşitliliği ile tanınan Güneydoğu Asya takımada devletidir. Ekonomik büyüme, deniz gücü ve bölgesel iş birliğine odaklanır. Gücü, birlik ve stratejik ada coğrafyasından gelir.
pizz3 = Pizza İmparatorluğu, yemek kültürü ve yaratıcılık etrafında kurulmuş esprili ve eğlenceli bir devlettir. Eğlence, ticaret ve mutfak yoluyla kültürel etkiye odaklanır. Gücü, popülerlik, ortak keyif ve güçlü mutfak kimliğinden gelir.
pol = Polonya, zengin tarihi ve kültürel dayanıklılığı ile tanınan bir Orta Avrupa devletidir. İstikrar, ekonomik kalkınma ve bölgesel iş birliğine odaklanır. Gücü, birlik, miras ve güçlü ulusal kimlikten gelir.
pome = Pomeranya, Baltık Denizi’ne erişimi olan tarihi bir kıyı bölgesidir. Ticaret, denizcilik ve bölgesel etkiye odaklanır. Gücü, limanları ve stratejik kıyı konumundan gelir.
prus = Prusya, güçlü askeri geleneği ve disiplinli yönetimi ile tanınan tarihi bir devlettir. Genişleme, organizasyon ve verimliliğe odaklanır. Gücü, askeri yapı ve merkezi liderlikten gelir.
qara = Kara Koyunlular, güçlü süvarisi ve bölgesel toprak kontrolü ile tanınan güçlü bir kabile konfederasyonudur. Genişleme, savaş ve topraklar üzerindeki otoriteyi sürdürmeye odaklanır. Gücü, askeri hareketlilik ve kabile birliğinden gelir.
qin = Qing İmparatorluğu, geniş toprakları ve güçlü merkezi yönetimi ile tanınan güçlü bir devlettir. Yönetim, kültürel bütünleşme ve çeşitli bölgeler üzerindeki kontrolü sürdürmeye odaklanır. Gücü, disiplinli yönetim ve büyük, iyi organize edilmiş ordudan gelir.
rash = Raşidun Halifeliği, hızlı genişlemesi ve güçlü dini birliği ile tanınan erken İslam devletidir. Yönetim, dini yayma ve geniş topraklarda düzeni sürdürmeye odaklanır. Gücü, dini liderlik ve disiplinli yönetimden gelir.
ratt = Rattanakosin Krallığı, kültürel mirası ve kraliyet sürekliliği ile tanınan tarihi bir Tay devletidir. Yönetim, gelenek ve bölgesel istikrara odaklanır. Gücü, merkezi monarşi ve kültürel korumadan gelir.
red3 = Kızıldeniz İmparatorluğu, Kızıldeniz merkezli denizci bir devlettir ve önemli ticaret yollarının kontrolü ile tanınır. Ticaret, denizcilik ve bölgesel etkiye odaklanır. Gücü, stratejik su yolları ve deniz ticaret ağlarından gelir.
cono3 = Conosur Cumhuriyeti, Güney Amerika’nın güney ülkelerine odaklanan bölgesel bir politik kavramdır. İş birliği, ekonomik entegrasyon ve ortak yönetime odaklanır. Gücü, bölgesel birlik ve birleşik ekonomik güçten gelir.
rom = Romanya, çeşitli kültürü ve tarihi mirası ile tanınan bir Avrupa devletidir. Kalkınma, istikrar ve bölgesel iş birliğine odaklanır. Gücü, kültürel zenginlik ve stratejik coğrafi konumdan gelir.
spqr = Roma İmparatorluğu, geniş toprak kontrolü ve gelişmiş yönetim sistemi ile tanınan güçlü antik bir uygarlıktır. Genişleme, hukuk ve altyapıya odaklanır. Gücü, güçlü organizasyon, askeri güç ve idari sistemlerden gelir.
rum = Rum Sultanlığı, kültürlerin kaynaşması ve stratejik konumu ile tanınan tarihi bir Anadolu devletidir. Yönetim, ticaret ve kültürel değişim üzerine odaklanır. Gücü, medeniyetler kavşağı konumundan gelir.
rus2 = Rus İmparatorluğu, geniş toprakları ve güçlü merkezi otoritesi ile tanınan güçlü bir devlettir. Genişleme, yönetim ve jeopolitik etkiye odaklanır. Gücü, büyük toprakları ve disiplinli yönetimden gelir.
gbra3 = Rus İmparatorluğu, muazzam toprakları ve güçlü otokratik yönetimi ile tanınan büyük bir devlettir. Genişleme, merkezi yönetim ve bölgesel etkiyi sürdürmeye odaklanır. Gücü, büyüklüğü, kaynakları ve disiplinli yönetimden gelir.
saff3 = Saffarîler İmparatorluğu, erken dönem İslamî bir İran devleti olarak hızlı yükselişi ve askeri gücü ile tanınır. Genişleme, yönetim ve bölgesel kontrole odaklanır. Gücü, askeri liderlik ve stratejik hırstan gelir.
saku3 = Sakura İmparatorluğu, Japon kültürü ve geleneklerinden esinlenen kavramsal bir devlettir. Kültür, disiplin ve teknolojik gelişime odaklanır. Gücü, organizasyon ve kültürel kimlikten gelir.
samo = Samo’nun İmparatorluğu, farklı Slav gruplarını tek bir liderlik altında birleştiren bir kabile devletidir. Birlik, savunma ve bölgesel istikrara odaklanır. Gücü, iş birliği ve kolektif dirençten gelir.
sard = Sardinya, stratejik konumu ve kültürel mirası ile tanınan Akdeniz adası devletidir. Ticaret, istikrar ve bölgesel etkiye odaklanır. Gücü, deniz konumu ve doğal kaynaklardan gelir.
sasa = Sasani İmparatorluğu, güçlü yönetimi ve kültürel başarıları ile tanınan antik bir Pers devletidir. Genişleme, yönetim ve komşu güçlerle rekabete odaklanır. Gücü, merkezi yönetim ve disiplinli ordudan gelir.
sau = Suudi Arabistan, geniş çölleri ve önemli enerji kaynakları ile tanınan Orta Doğu devletidir. Ekonomik kalkınma, istikrar ve bölgesel etkiye odaklanır. Gücü, doğal kaynaklar ve stratejik liderlikten gelir.
gsca3 = İskandinav İmparatorluğu, kavramsal bir kuzey devleti olarak İskandinav ülkelerinin birleşik gücünü temsil eder. İş birliği, istikrar ve ekonomik kalkınmaya odaklanır. Gücü, birlik, yenilik ve güçlü sosyal sistemlerden gelir.
scyt4 = Saka, becerikli süvarileri ve savaşçı kültürü ile tanınan antik göçebe bir bölgedir. Hareketlilik, savaş ve toprak etkisine odaklanır. Gücü, süvari yeteneği ve geniş arazilerde adaptasyondan gelir.
ser2 = Sırp İmparatorluğu, Ortaçağ Balkanlarında toprak genişlemesi ve kültürel başarıları ile tanınan güçlü bir devlettir. Yönetim, fetih ve bölgesel etkiye odaklanır. Gücü, güçlü liderlik ve askeri organizasyondan gelir.
tha2 = Siam, zengin kültürü ve diplomasi ile tanınan tarihi bir Güneydoğu Asya devletidir. Yönetim, kültürel koruma ve bölgesel dengeye odaklanır. Gücü, uyum yeteneği ve güçlü merkezi liderlikten gelir.
sic = Sicilya Krallığı, kültürel kaynaşması ve stratejik konumu ile tanınan tarihi bir Akdeniz devletidir. Ticaret, yönetim ve kültürel değişime odaklanır. Gücü, medeniyetler kavşağı konumundan gelir.
soko = Sokoto, güçlü dini ve idari yapısı ile tanınan Batı Afrika İslam devletidir. Yönetim, genişleme ve dini değerlerin yayılmasına odaklanır. Gücü, birlik, liderlik ve organize yönetimden gelir.
somi3 = Somali İmparatorluğu, tarihi bir Doğu Afrika denizci ve ticaret devletidir. Ticaret, denizcilik ve bölgesel kontrol üzerine odaklanır. Gücü, denizcilik becerisi ve stratejik kıyı ağlarından gelir.
som = Somali, uzun kıyı şeridi ve kültürel mirası ile tanınan Horn Afrika devletidir. İstikrar, ticaret ve bölgesel iş birliğine odaklanır. Gücü, deniz erişimi ve kültürel birlikten gelir.
gsg3 = Güney Alman Konfederasyonu, Orta Avrupa’da tarihi bir bölgesel devlettir ve güney Alman bölgelerini birleştirmiştir. İş birliği, yönetim ve bölgesel istikrara odaklanır. Gücü, ortak kimlik ve koordineli liderlikten gelir.
rus = Sovyetler Birliği, geniş toprakları ve merkezi siyasi sistemi ile tanınan güçlü bir tarihi devlettir. Yönetim, sanayi gelişimi ve küresel etkiye odaklanır. Gücü, merkezi planlama ve güçlü devlet kontrolünden gelir.
spa = İspanya, zengin tarihi, kültürü ve küresel denizci etkisi ile tanınan bir Avrupa devletidir. Turizm, kültürel miras ve ekonomik kalkınmaya odaklanır. Gücü, kültürel çeşitlilik ve tarihi mirastan gelir.
spa4 = İspanyol İmparatorluğu, geniş denizaşırı toprakları ve deniz hâkimiyeti ile tanınan güçlü bir tarihî küresel imparatorluktur. Genişleme, ticaret ve kültürel etkiye odaklanır. Gücü, deniz gücü ve sömürge etkisinden gelir.
spaem = Sparta İmparatorluğu, antik Sparta’dan esinlenen tarihi tarzda bir devlettir; sıkı disiplin ve askeri odak ile tanınır. Savaş, eğitim ve toplumsal düzene odaklanır. Gücü, askeri disiplin ve birliğinden gelir.
sri = Sri Lanka, Güney Asya’da ada devleti olarak kültürel mirası ve doğal güzellikleri ile tanınır. İstikrar, ticaret ve bölgesel iş birliğine odaklanır. Gücü, stratejik konum ve kültürel çeşitlilikten gelir.
suns3 = Sunset İmparatorluğu, geçiş, miras ve kültürel sembolizmi temsil eden sembolik bir devlettir. Birlik, kimlik ve bölgesel etkiye odaklanır. Gücü, ortak vizyon ve kültürel uyumdan gelir.
swab = Swabya, kültürel ve siyasi etkisi ile tanınan Orta Avrupa’nın tarihi bir bölgesidir. Bölgesel kimlik, iş birliği ve yönetime odaklanır. Gücü, kültürel birlik ve tarihi mirastan gelir.
swi = İsviçre, tarafsızlığı, istikrarı ve güçlü finans sistemi ile tanınan bir Avrupa devletidir. Barış, yönetim ve ekonomik kalkınmaya odaklanır. Gücü, siyasi tarafsızlık ve güçlü ekonomiden gelir.
thir = On Üç Koloni, Kuzey Amerika’da bir grup Britanya kolonisi olarak ABD’nin temellerini oluşturması ile tanınır. Özyönetim, ticaret ve bağımsızlığa odaklanır. Gücü, birlik ve ortak siyasi ideallerden gelir.
tib2 = Tibet İmparatorluğu, Orta Asya’da güçlü bir tarihî devlet olarak kültürel ve dini etkisi ile tanınır. Genişleme, yönetim ve ruhani liderliğe odaklanır. Gücü, kültürel birlik ve stratejik yüksek dağ coğrafyasından gelir.
trr = Trablus, Kuzey Afrika’da kıyı kenti ve tarihî bölge olarak denizcilikte önemlidir. Ticaret, denizcilik ve bölgesel etkiye odaklanır. Gücü, liman ve stratejik Akdeniz konumundan gelir.
gbul3 = Bulgar Çarlığı, Orta Çağ Balkanlarında güç ve kültürel gelişim ile tanınan tarihî bir devlettir. Yönetim, genişleme ve kültürel kimliğe odaklanır. Gücü, güçlü liderlik ve bölgesel etkiden gelir.
tusc = Toskana, İtalya’da sanat, kültür ve ekonomik etkisi ile tanınan tarihî bir bölgedir. Kültürel gelişim, ticaret ve yeniliğe odaklanır. Gücü, sanatsal miras ve ekonomik refahtan gelir.
ukr = Ukrayna, geniş tarım arazileri ve kültürel mirası ile tanınan Doğu Avrupa devletidir. İstikrar, kalkınma ve bölgesel iş birliğine odaklanır. Gücü, doğal kaynaklar ve verimli topraktan gelir.
unba = Birleşik Baltık Dükalığı, Baltık bölgesinde tek bir yönetim altında birleşme önerisi ile tanınan tarihî bir devlet kavramıdır. Yönetim, bölgesel iş birliği ve siyasi istikrara odaklanır. Gücü, merkezi liderlik ve toprak konsolidasyonundan gelir.
gguy3 = Birleşik Guyana, Güney Amerika’da Guyana bölgesi etrafında birliği temsil eden bir bölgesel fikirdir. İş birliği, kalkınma ve ortak yönetime odaklanır. Gücü, bölgesel entegrasyon ve kaynak yönetiminden gelir.
prbr3 = Portekiz, Brezilya ve Algarve Birleşik Krallığı, Avrupa ve Güney Amerika topraklarını birleştiren tarihî bir transatlantik devlettir. Yönetim, ticaret ve imparatorluk koordinasyonuna odaklanır. Gücü, kıtalar arası ulaşım ve politik birliğe dayanır.
uni = Birleşik Krallık, küresel etkisi ve siyasi istikrarı ile tanınan Avrupa anayasal monarşisidir. Yönetim, diplomasi ve ekonomik kalkınmaya odaklanır. Gücü, güçlü kurumlar ve tarihî etkiden gelir.
uso = Okyanusya Birleşik Devletleri, Pasifik’teki ada ülkelerinin kavramsal bir federasyonudur. Birlik, iş birliği ve deniz stratejisine odaklanır. Gücü, birleşik kaynaklar ve okyanus bağlantısından gelir.
ural4 = Ural Birliği, Ural dillerini konuşan halkların kavramsal bölgesel ittifakıdır. Kültürel birlik, iş birliği ve ortak kalkınmaya odaklanır. Gücü, dil ve kültürel bağlardan gelir.
vand = Vandal Krallığı, Kuzey Afrika’da fetih ve yönetim ile tanınan tarihî bir Cermen devletidir. Genişleme, askeri güç ve yönetime odaklanır. Gücü, hareketlilik ve etkili liderlikten gelir.
visi = Vizigotlar, Batı Avrupa’da güçlü bir krallık kuran tarihî bir Cermen halkıdır. Genişleme, yerleşim ve yönetime odaklanırlar. Gücü, askeri organizasyon ve adaptasyondan gelir.
wal = Galler, Birleşik Krallık’ta dağlık arazileri ve zengin kültürel mirası ile tanınır. Kültürel koruma, yönetim ve bölgesel kimliğe odaklanır. Gücü, güçlü gelenekler ve belirgin ulusal kültürden gelir.
wife = Batı Hintler Federasyonu, birkaç ada bölgesini birleştirmeyi amaçlayan kısa ömürlü bir Karayipler birliğiydi. İş birliği, yönetim ve bölgesel birliğe odaklanır. Gücü, ortak kimlik ve birleşik kaynaklardan gelir.
wepp = Vestfalya, modern siyasi sistemlerin şekillenmesinde rolü ile tanınan tarihî bir Avrupa bölgesidir. Yönetim, diplomasi ve bölgesel istikrara odaklanır. Gücü, tarihî antlaşmalar ve siyasi etkiden gelir.
bew = Beyaz Rusya, Belarus ile ilişkilendirilen tarihî ve bölgesel bir adlandırmadır. Kültürel miras, yönetim ve bölgesel kimliğe odaklanır. Gücü, ortak gelenekler ve tarihî süreklilikten gelir.
yuan = Yuan, Moğollar tarafından kurulan Çin’deki tarihî bir hanedandır ve geniş toprakları birleştirmiştir. Genişleme, yönetim ve kontrole odaklanır. Gücü, güçlü askeri organizasyon ve merkezi yönetimden gelir.
yugo = Yugoslavya, çoklu etnik grupları birleştiren tarihî bir Güneydoğu Avrupa devletidir. İş birliği, yönetim ve bölgesel istikrara odaklanır. Gücü, çeşitli topluluklar arasında birlik ve ortak liderlikten gelir.
drc = Zaire, geniş doğal kaynakları ve merkezi konumu ile tanınan tarihî bir Afrika devletidir. Yönetim, ekonomik kalkınma ve kaynak yönetimine odaklanır. Gücü, doğal zenginlik ve stratejik coğrafyadan gelir.
zim = Zimbabve, zengin tarihi ve doğal kaynakları ile tanınan Güney Afrika devletidir. İstikrar, kalkınma ve bölgesel iş birliğine odaklanır. Gücü, mineral zenginliği ve kültürel mirastan gelir.
