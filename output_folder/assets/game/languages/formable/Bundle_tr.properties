cze = Çekya, güçlü ekonomisi ve kültürel mirası ile tanınan bir Orta Avrupa devletidir. İstikrar, sanayi ve iç kalkınmaya odaklanır. Gücü, organizasyon ve bölgesel öneminden gelir.
czsl = Çekoslovakya, bölgeleri arasında birlik ve güçlü sanayi gelişimine odaklanan bir Orta Avrupa devletidir. İstikrar, savunma ve ekonomik büyümeyi vurgular. Gücü, iş birliği ve ortak kimlikten gelir.
dacc = Dacia, güçlü savaşçı kültürü ve güçlü imparatorluklara karşı direnci ile tanınan eski bir devlettir. Savunma, toprak kontrolü ve kimliği korumaya odaklanır. Gücü, dayanıklılık ve kararlılıktan gelir.
dalm2 = Dalmaçya, deniz boyunca stratejik konumu ve güçlü deniz etkisi ile tanınan bir kıyı devletidir. Ticaret, deniz gücü ve bölgesel kontrole odaklanır. Gücü, limanları ve kıyı yollarının kontrolünden gelir.
danu3 = Tuna İmparatorluğu, Tuna boyunca toprakları birleştiren büyük bir nehir tabanlı devlettir. Ticaret, stratejik kontrol ve bölgeler arası ekonomik bütünleşmeye odaklanır. Gücü, Avrupa’daki en önemli su yollarından birini kontrol etmesinden gelir.
nodm = Danimarka–Norveç, deniz gücü ve güçlü denizcilik geleneklerini paylaşan iki krallığın birliğidir. Ticaret, deniz kontrolü ve topraklar arası iş birliğine odaklanır. Gücü, güçlü bir donanma ve ortak yönetimden gelir.
durr = Durrani İmparatorluğu, Orta ve Güney Asya’da askeri gücü ve toprak genişlemesi ile tanınan güçlü bir devlettir. Fetih, kontrol ve bölgesel hâkimiyete odaklanır. Gücü, güçlü liderlik ve disiplinli ordulardan gelir.
eagl3 = Kartal Birliği, sanayi, askeri güç ve teknolojik ilerlemeye odaklanan modern ve güçlü bir devlettir. Deniz hâkimiyeti ve küresel etkiyi vurgular. Gücü, yenilik ve aşırı yetenekten gelir.
eaff = Doğu Afrika Federasyonu, üyeleri arasında iş birliği, ticaret ve ortak kalkınmayı vurgulayan bölgesel bir birliktir. Ekonomik büyüme, altyapı ve bölgesel istikrara odaklanır. Gücü, çeşitli uluslar arasındaki birlikten gelir.
east2 = Doğu Roma İmparatorluğu, güçlü yönetim ve stratejik savunmaya dayalı Roma mirasının devamıdır. Diplomasi, askeri güç ve etkisini sürdürmeye odaklanır. Gücü, organizasyon ve dayanıklılıktan gelir.
egy = Mısır Krallığı, kültürü, tarımı ve Nil üzerindeki kontrolü ile tanınan tarihi ve etkili bir devlettir. İstikrar, kaynak yönetimi ve bölgesel etkiye odaklanır. Gücü, verimli topraklar ve güçlü yönetimden gelir.
bra = Brezilya İmparatorluğu, geniş topraklar üzerinde genişleme, istikrar ve kontrol odaklı güçlü bir devlettir. Ekonomik büyüme, kaynak yönetimi ve merkezi otoriteyi vurgular. Gücü, büyüklüğü ve stratejik liderliğinden gelir.
jauu3 = Jaunpur İmparatorluğu, kültürü, mimarisi ve askeri gücü ile tanınan güçlü bir bölgesel devlettir. Genişleme, yönetim ve bölgesel etkiyi sürdürmeye odaklanır. Gücü, disiplinli yönetim ve stratejik konumdan gelir.
