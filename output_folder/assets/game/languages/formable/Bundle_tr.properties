fin = Finlandiya, direnci, güçlü savunması ve toprağı ile bağlantısı ile tanınan kuzey devletidir. İstikrar, kendine yeterlilik ve bağımsızlığı sürdürmeye odaklanır. Gücü, zorlu koşullarda birlik ve kararlılıktan gelir.
