LANGUAGENAME = Türkçe
baby = Babil, erken hukuk, kültür ve yeniliğin mirası üzerine kurulmuş yeniden canlandırılmış eski bir uygarlıktır. Güçlü yönetime, kalkınmaya ve stratejik genişlemeye odaklanır. Hedefi bölgedeki tarihi etkisini yeniden kazanmaktır.
eunn = Avrupa Birliği, iş birliği, ticaret ve kolektif karar almayı vurgulayan büyük bir siyasi ve ekonomik birliğe sahiptir. Üye devletler arasında istikrarı, kalkınmayı ve barışı sürdürmeye odaklanır. Etkisi diplomasi ve ekonomi aracılığıyla kıta genelinde hissedilir.
int = Intermarium, Orta ve Doğu Avrupa ülkeleri arasında iş birliğine odaklanan bir bölgesel ittifaktır. Karşılıklı savunma, ekonomik bağlar ve büyük güçlerden bağımsızlık önceliklidir. Gücü, çeşitli devletler arasında birliğe dayanır.
lech3 = Lechitler İmparatorluğu, Lechitik halkların mirası üzerine kurulmuş güçlü bir devlettir ve birlik, gelenek ve gücü vurgular. Kültürel kimlik, toprak kontrolü ve uzun vadeli istikrara odaklanır. Amacı, komşu bölgelerde hakimiyet sağlamaktır.
pier3 = Pierog Rzeczpospolita, paylaşılan kültür ve gelenekler etrafında birleşmiş hafif yürekli bir devlettir. Genişlemeden ziyade iç istikrar, topluluk ve kültürel kimliğe odaklanır. Mizahına rağmen birleşik ve dirençlidir.
plsr = Baltık İmparatorluğu, Baltık Denizi çevresindeki toprakları birleştirerek oluşmuş güçlü bir devlettir. Ana ticaret yollarını kontrol eder ve deniz gücü ile ekonomik büyümeye odaklanır. Birliği, nispeten küçük olmasına rağmen bölgeye hâkim olmasını sağlar.
pol2 = Topluluk, savunmayı ve iş birliğini güçlendirmek için birden fazla ülke tarafından oluşturulmuş bir birliktir. Tek bir hükümdar yerine, güç üyeler arasında paylaşılır. İstikrar, diplomasi ve kolektif büyümeye odaklanır.
reda = Redanya, disiplinli ordusu ve stratejik liderliğiyle tanınan güçlü ve merkezi bir krallıktır. Genişlemeye, kontrol sağlamaya ve topraklarında düzeni sürdürmeye odaklanır. Gücü onu bölgedeki baskın güçlerden biri yapar.
zapa3 = Zapadoslavia, ülkeleri arasındaki kültürel ve siyasi bağları güçlendiren birleşik bir Batı Slav devletidir. Birliğe, bölgesel istikrara ve ekonomik iş birliğine odaklanır. Birlikte, dış güçlere karşı daha güçlü durur.
slav3 = Slav İmparatorluğu, Slav topraklarını güçlü bir otorite altında birleştiren geniş bir devlettir. Güce, genişlemeye ve bölge genelinde kültürel hâkimiyete odaklanır. Ölçeği onu küresel meselelerde önemli bir güç yapar.
eth = Abyssinia, eski geleneklere ve güçlü liderliğe dayanan tarihi ve dirençli bir devlettir. Bağımsızlık, savunma ve kültürel mirası korumaya önem verir. Mirası, bölgesinde kalıcı etki sağlar.
afg = Afganistan Emirliği, sıkı liderlik ve güçlü geleneklerle yönlendirilen bir devlettir. İç kontrol, savunma ve sınırları içinde istikrarı sürdürmeye odaklanır. Arazi yapısı ve direnci fethedilmesini zorlaştırır.
afri = Afrika Birliği, Afrika ülkeleri arasında birlik ve iş birliğini teşvik eden kıtasal bir organizasyondur. Ekonomik büyüme, diplomasi ve bölgesel istikrara odaklanır. Gücü, kıta genelinde kolektif eylemden gelir.
aksu = Aksum, ticaret, din ve erken yeniliklerle tanınan eski ve güçlü bir krallıktır. Ticaret, etki ve tarihî mirası korumaya odaklanır. Kökenleri ona kalıcı güç ve kimlik kazandırır.
andd = Endülüs, öğrenim, mimari ve ticaretle tanınan kültürel açıdan zengin ve gelişmiş bir devlettir. Bilgi, refah ve çeşitlilik içeren bir toplumu vurgular. Etkisi hem entelektüel hem de ekonomik güçten gelir.
alb3 = Arnavutluk, bağımsızlık ve istikrara odaklanan dirençli ve kararlı bir millettir. Savunma, birlik ve ulusal kimliği korumayı önceliklendirir. Gücü, dayanma ve uyum sağlama yeteneğinden gelir.
alpi3 = Alpin İmparatorluğu, dağlık bölgelerin kontrolüne dayalı yüksek arazili bir imparatorluktur. Savunmaya, güçlü altyapıya ve stratejik konumlandırmaya odaklanır. Arazi yapısı işgal edilmesini zorlaştırır ve savunmayı kolaylaştırır.
anda3 = Endülüs, zengin kültürü, ticareti ve tarihî etkisi ile tanınan bir bölgedir. Ekonomik büyüme, kültürel miras ve güçlü bölgesel kimliğe odaklanır. Konumu bölgeler arasında önemli bir bağlantı sağlar.
gang3 = Anglosfer, İngilizce konuşan ülkeleri birleştiren kültürel ve siyasi bir alandır. İş birliği, ortak değerler ve küresel etkiye odaklanır. Gücü, dünya genelindeki yaygın erişim ve etkiden gelir.
anti = Antiller Konfederasyonu, adalar arası ticaret, deniz gücü ve iş birliğine odaklanan bir ada ulusları birliğidir. Etkisini sürdürmek için deniz hakimiyetine ve ekonomik bağlara güvenir. Birliği, dağılmış adaları tek bir güç haline getirir.
ani = Antakya, kültürü, ticareti ve stratejik konumuyla tanınan tarihi ve etkili bir şehir devletidir. Ticaret, diplomasi ve bölgesel öneme odaklanır. Konumu, farklı uygarlıkları birbirine bağlayan kilit bir merkez yapar.
abbr = Aram İslam Cumhuriyeti, inanç, birlik ve yapılandırılmış yönetime dayanan bir devlettir. İç istikrar, kültürel kimlik ve güçlü liderliğe odaklanır. Gücü disiplin ve paylaşılan inançtan gelir.
arab = Arabistan, geniş toprakları ve ticaret yolları üzerindeki kontrolü ile tanınan güçlü bir çöl uygarlığıdır. Kaynak yönetimi, stratejik hareketlilik ve ekonomik etkiye odaklanır. Birliği, sert çevrelerde gelişmesini sağlar.
arm = Ermenistan, zengin tarihi ve güçlü kültürel kimliği ile tanınan eski ve dirençli bir devlettir. Savunma, gelenek ve bağımsızlığını korumaya odaklanır. Dayanıklılığı, birçok zorluğu aşmasını sağlamıştır.
arzt = Arstotzka, güvenlik ve düzene odaklanan sıkı ve ağır kontrol edilen bir devlettir. Her şeyden önce sınırlar, gözetim ve iç kontrol önceliklidir. Gücü disiplin ve sarsılmaz otoriteden gelir.
asha = Aşanti, altın zenginliği ve güçlü askeri gelenekleri ile tanınan güçlü bir Batı Afrika devletidir. Ticaret, kaynak kontrolü ve bölgesel etkiyi sürdürmeye odaklanır. Gücü birlik ve disiplinli liderlikten gelir.
gase3 = Güneydoğu Asya Ülkeleri Birliği, üye devletleri arasında iş birliği, ticaret ve istikrarı teşvik eden bölgesel bir organizasyondur. Ekonomik büyüme, diplomasi ve ortak kalkınmaya odaklanır. Gücü, çeşitli uluslar arasında birlik ve iş birliğinden gelir.
auhh = Avustralya-Macaristan, sömürge etkisini güçlü merkezi yönetim ile birleştiren hibrit bir devlettir. Genişlemeye, kaynak kontrolüne ve uzak topraklarda stratejik üstünlüğe odaklanır. Gücü, eski gelenekleri yeni topraklarla harmanlamasından gelir.
anz3 = Avustralya–Yeni Zelanda, iş birliği, ticaret ve ortak güvenliği vurgulayan yakın bir bölgesel birliktir. Ekonomik güç, deniz yeteneği ve Pasifik’te istikrara odaklanır. Birliği, iki ülkeyi ortaklık ve karşılıklı destekle güçlendirir.
atr = Avusturya, istikrarı, diplomasiyi ve kültürel mirası ile tanınan bir Orta Avrupa devletidir. İç kalkınma, güçlü yönetim ve bölgedeki dengeyi korumaya odaklanır. Gücü, düzen ve sürekliliktedir.
gatr3 = Avusturya İmparatorluğu, sıkı yönetim ve ulusal birliğe dayalı merkeziyetçi ve otoriter bir devlettir. Güç, düzen ve etkisini genişletmeye odaklanır. Gücü, disiplin ve merkezi kontrolden gelir.
asit = Avustro-İtalyan İmparatorluğu, Orta Avrupa yapısını İtalyan etkisi ve kültürü ile birleştiren bir devlettir. Genişleme, ekonomik güç ve bölgesel stratejik üstünlüğe odaklanır. Gücü, sanayi gücünü kültürel mirasla birleştirmesinden gelir.
aslr = Avustroslovakya, Orta Avrupa ve Slav bölgelerini tek bir yönetim altında birleştiren birleşik bir devlettir. İstikrar, iş birliği ve dengeli kalkınmaya odaklanır. Gücü, çeşitli kültürler ve topraklar arasındaki birlikten gelir.
aval3 = Avalonyalı İmparatorluğu, antik mitlerden ve güçlü kültürel mirastan ilham alan efsanevi bir devlettir. Birlik, gizem ve gelenek ile etkisini genişletmeye odaklanır. Kimliği miras ve hırstan beslenir.
azan4 = Azanya İmparatorluğu, topraklarında birlik, kaynak kontrolü ve bölgesel hâkimiyete odaklanan güçlü bir devlettir. Güçlü liderlik, kalkınma ve istikrarı sürdürmeye önem verir. Gücü, disiplin ve stratejik büyümeden gelir.
azte = Aztek İmparatorluğu, askeri gücü, zengin gelenekleri ve gelişmiş toplumu ile tanınan bir uygarlıktır. Genişleme, vergi toplama ve kültürel etkiye odaklanır. Gücü, güçlü organizasyon ve savaşçı temelli sistemden gelir.
