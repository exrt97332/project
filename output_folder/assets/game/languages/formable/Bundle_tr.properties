bohe = Bohemya, zengin kültürü ve stratejik konumu ile tanınan tarihi bir Orta Avrupa devletidir. İstikrar, kalkınma ve bölgesel etkiyi sürdürmeye odaklanır. Gücü, gelenek ve dayanıklılıktan gelir.
gboh3 = Bohemya İmparatorluğu, Orta Avrupa’da etkisini genişleten merkeziyetçi bir devlettir. Güçlü yönetim, askeri güç ve kültürel kimliğe odaklanır. Gücü, birlik ve stratejik kontrolden gelir.
buls = Bulgar İmparatorluğu, güçlü ve yayılmacı bir devlet olup derin tarihi köklere sahiptir. Askeri güç, toprak kontrolü ve bölgesel etkiye odaklanır. Gücü, birlik, dayanıklılık ve stratejik liderlikten gelir.
burg3 = Burgonya İmparatorluğu, ticaret yollarının kontrolüne ve güçlü toprak genişlemesine odaklanan güçlü bir devlettir. Askeri organizasyon, ekonomik güç ve bölgesel hâkimiyete önem verir. Etkisi stratejik konum ve disiplinli yönetimden gelir.
byza = Bizans İmparatorluğu, güçlü yönetimi ve kültürel mirası ile tanınan kalıcı ve güçlü bir devlettir. Diplomasi, savunma ve bölgelerde etkisini sürdürmeye odaklanır. Gücü, organizasyon ve uzun süredir süregelen gelenekten gelir.
cary3 = Karpat İmparatorluğu, güçlü doğal savunmalar ve engebeli arazi etrafında kurulmuş dağlık bir devlettir. Askeri güç, stratejik konum ve bölgesel kontrole odaklanır. Gücü, zorlu arazi ve dirençli halkından gelir.
carr = Kartaca, ticaret, deniz gücü ve ekonomik etki ile tanınan güçlü bir deniz devletidir. Ticaret, genişleme ve ana deniz yollarının kontrolüne odaklanır. Gücü, servet ve Akdeniz üzerindeki hâkimiyetinden gelir.
cast = Kastilya, genişlemesi ve askeri gücü ile tanınan güçlü bir İberya krallığıdır. Fetih, birleşme ve toprak büyümesine odaklanır. Gücü, disiplinli ordular ve merkezi yönetimden gelir.
argg3 = Katalan İmparatorluğu, ticaret, kültür ve deniz etkisine odaklanan bölgesel bir güçtür. Ekonomik büyüme, stratejik limanlar ve güçlü kimliği vurgular. Gücü, ticaret ve kıyı kontrolünden gelir.
cau3 = Kafkas İmparatorluğu, ana dağ geçitlerini ve ticaret yollarını kontrol eden yüksek arazili bir devlettir. Savunma, stratejik konum ve bölgesel etkiye odaklanır. Gücü, arazi yapısı ve dirençli halkından gelir.
gleg = Kelt Birliği, paylaşılan miras ve iş birliğini değer veren Kelt uluslarının kültürel bir ittifakıdır. Birlik, kültürel koruma ve bölgesel güce odaklanır. Etkisi, ortak kimlik ve güçlü geleneklerden gelir.
cent = Orta Amerika, ülkeleri ticaret ve iş birliği ile bağlayan bölgesel bir birliktir. Ekonomik büyüme, istikrar ve ortak kalkınmaya odaklanır. Gücü, çeşitli ülkeler arasında birlikten gelir.
chee = Çera, ticaret, deniz gücü ve kültürel etki ile tanınan eski bir Güney Hindistan devletidir. Ticaret, deniz yolları ve bölgesel refaha odaklanır. Gücü, kıyı ticareti ve stratejik liman kontrolünden gelir.
chol = Çola, deniz hakimiyeti ve genişlemesi ile tanınan güçlü bir Güney Hindistan imparatorluğudur. Ticaret, fetih ve güçlü yönetime odaklanır. Gücü, güçlü filosu ve organize yönetiminden gelir.
plai3 = Ovalar Konfederasyonu, iş birliği ve ortak savunmayı vurgulayan gevşek bir bölge birliğidir. Tarım, hareketlilik ve bölgeler arası koordinasyona odaklanır. Gücü, açık ve kaynak açısından zengin topraklarda birlikten gelir.
cos = Kazaklar, bağımsızlık, hareketlilik ve askeri yetenekleri ile tanınan bir savaşçı toplumdur. Savunma, akınlar ve vatanı korumaya odaklanır. Gücü, özgürlük, disiplin ve güçlü geleneklerden gelir.
coub = Courland, ticaret ve sömürge girişimleri ile tanınan küçük ama iddialı bir devlettir. Deniz aşırı genişleme, ticaret ve stratejik etkiye odaklanır. Gücü, boyutunun ötesinde güç projeksiyonundan gelir.
crkh = Kırım Hanlığı, hızlı süvarileri ve akın gücü ile tanınan bir bozkır devletidir. Hareketlilik, askeri güç ve ticaret yollarının kontrolüne odaklanır. Gücü, hız ve stratejik savaştan gelir.
cum = Kumanlar, göçebe savaşçıları ve geniş otlaklara sahip bir bozkır konfederasyonudur. Hareketlilik, akınlar ve açık toprakların kontrolüne odaklanır. Gücü, hızlı süvariler ve uyum sağlama yeteneğinden gelir.
