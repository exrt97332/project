LANGUAGENAME = Українська
baby = Вавилон є відновленою стародавньою цивілізацією, побудованою на спадщині раннього права, культури та інновацій. Орієнтується на сильне управління, розвиток та стратегічну експансію. Мета полягає у відновленні історичного впливу в регіоні.
eunn = Європейський Союз є великим політичним та економічним союзом, який підкреслює співпрацю, торгівлю та колективне прийняття рішень. Орієнтується на стабільність, розвиток та підтримку миру між державами-членами. Вплив простягається по всьому континенту через дипломатію та економіку.
int = Інтермаріум є регіональним альянсом, орієнтованим на співпрацю між країнами Центральної та Східної Європи. Пріоритет надається взаємній обороні, економічним зв’язкам та незалежності від великих держав. Сила полягає в єдності різних держав.
lech3 = Імперія Лехітів є потужною державою, побудованою на спадщині лехітських народів, підкреслюючи єдність, традиції та силу. Орієнтується на культурну ідентичність, контроль територій та довгострокову стабільність. Амбіція полягає в утвердженні домінування над сусідніми регіонами.
pier3 = Республіка Пірогова є легкою, але об’єднаною державою, що базується на спільній культурі та традиціях. Орієнтується на внутрішню стабільність, спільноту та культурну ідентичність замість експансії. Незважаючи на гумор, залишається згуртованою та стійкою.
plsr = Балтійська Імперія є потужною державою, утвореною шляхом об’єднання земель навколо Балтійського моря. Контролює ключові торгові шляхи та орієнтується на морську міць та економічне зростання. Єдність дозволяє домінувати в регіоні, незважаючи на відносно невеликий розмір.
pol2 = Річ Посполита є союзом кількох держав для зміцнення оборони та співпраці. Замість одного правителя влада розподілена між учасниками. Орієнтується на стабільність, дипломатію та спільне зростання.
reda = Реданія є сильною та централізованою королівською державою, відомою дисциплінованою армією та стратегічним керівництвом. Орієнтується на експансію, контроль та підтримку порядку на своїх землях. Сила робить її однією з домінуючих сил регіону.
zapa3 = Западославія є об’єднаною західнослов’янською державою, що зміцнює культурні та політичні зв’язки між своїми народами. Орієнтується на єдність, регіональну стабільність та економічну співпрацю. Разом вона стає сильнішою проти зовнішніх сил.
slav3 = Слов’янська Імперія є великою державою, що об’єднує слов’янські землі під однією потужною владою. Орієнтується на силу, експансію та культурне домінування в регіоні. Її масштаб робить її важливою силою у світових справах.
eth = Абісинія є історичною та стійкою державою, заснованою на стародавніх традиціях та сильному керівництві. Орієнтується на незалежність, оборону та збереження культурної спадщини. Її спадщина забезпечує довготривалий вплив у регіоні.
afg = Емірат Афганістан є державою під суворим керівництвом та з сильними традиціями. Орієнтується на внутрішній контроль, оборону та підтримку стабільності на своїх територіях. Рельєф та стійкість роблять його складним для завоювання.
afri = Африканський Союз є континентальною організацією, що сприяє єдності та співпраці між африканськими державами. Орієнтується на економічне зростання, дипломатію та регіональну стабільність. Сила походить від колективних дій на континенті.
aksu = Аксуум є стародавнім та потужним королівством, відомим торгівлею, релігією та ранніми інноваціями. Орієнтується на комерцію, вплив та підтримку історичної спадщини. Коріння дає довготривалу силу та ідентичність.
andd = Аль-Андалус є культурно багатою та розвиненою державою, відомою знаннями, архітектурою та торгівлею. Підкреслює знання, процвітання та різноманітне суспільство. Вплив походить як від інтелекту, так і від економічної сили.
alb3 = Албанія є стійкою та рішучою нацією, орієнтованою на незалежність та стабільність. Пріоритет надається обороні, єдності та збереженню національної ідентичності. Сила полягає в здатності витримувати труднощі та адаптуватися.
alpi3 = Альпійська Імперія є високогірною державою, побудованою на контролі гірських районів. Орієнтується на оборону, міцну інфраструктуру та стратегічне розташування. Рельєф робить її складною для вторгнення та легкою для оборони.
anda3 = Андалусія є регіоном, відомим багатою культурою, торгівлею та історичним впливом. Орієнтується на економічне зростання, культурну спадщину та сильну регіональну ідентичність. Позиція робить її ключовим зв’язком між регіонами.
gang3 = Англосфера є культурною та політичною сферою, що об’єднує англомовні держави. Орієнтується на співпрацю, спільні цінності та глобальний вплив. Сила походить від широкого охоплення та впливу у світі.
anti = Антильська Конфедерація є союзом острівних держав, що орієнтується на торгівлю, морську силу та співпрацю через моря. Спирається на морський контроль та економічні зв’язки для збереження впливу. Єдність перетворює розкидані острови на єдину силу.
ani = Антіохія є історичним та впливовим містом-державою, відомою культурою, торгівлею та стратегічним розташуванням. Орієнтується на комерцію, дипломатію та регіональне значення. Позиція робить її ключовим вузлом, що з’єднує різні цивілізації.
abbr = Ісламська Республіка Арам є державою, керованою вірою, єдністю та структурованим управлінням. Орієнтується на внутрішню стабільність, культурну ідентичність та сильне керівництво. Сила походить від дисципліни та спільної віри.
arab = Аравія є потужною пустельною цивілізацією, відомою великими землями та контролем торгових шляхів. Орієнтується на управління ресурсами, стратегічну мобільність та економічний вплив. Єдність дозволяє процвітати в суворих умовах.
arm = Вірменія є стародавньою та стійкою державою, відомою багатою історією та сильною культурною ідентичністю. Орієнтується на оборону, традиції та збереження незалежності. Витривалість дозволила пережити численні виклики.
arzt = Арстотцка є суворою та строго контрольованою державою, орієнтованою на безпеку та порядок. Пріоритет надається кордонам, нагляду та внутрішньому контролю понад усе. Сила полягає у дисципліні та непохитній владі.
asha = Ашанті є потужною західноафриканською державою, відомою золотими багатствами та сильною військовою традицією. Орієнтується на торгівлю, контроль ресурсів та підтримку регіонального впливу. Сила походить від єдності та дисциплінованого керівництва.
gase3 = Асоціація держав Південно-Східної Азії є регіональною організацією, що сприяє співпраці, торгівлі та стабільності між державами-членами. Орієнтується на економічне зростання, дипломатію та спільний розвиток. Сила походить від єдності та співпраці між різними державами.
auhh = Австралія-Угорщина є гібридною державою, що поєднує колоніальний вплив зі сильним центральним урядуванням. Орієнтується на експансію, контроль ресурсів та стратегічне домінування на віддалених територіях. Потужність походить від поєднання старих традицій та нових територій.
anz3 = Австралія та Нова Зеландія є тісним регіональним союзом, що підкреслює співпрацю, торгівлю та спільну безпеку. Орієнтується на економічну міць, морську здатність та стабільність у Тихому океані. Єдність зміцнює обидві держави через партнерство та взаємну підтримку.
atr = Австрія є державою Центральної Європи, відомою стабільністю, дипломатією та культурною спадщиною. Орієнтується на внутрішній розвиток, сильне управління та підтримку балансу в регіоні. Сила полягає в порядку та безперервності.
gatr3 = Австрійський Райх є централізованою та авторитарною державою, побудованою на суворому управлінні та національній єдності. Орієнтується на силу, порядок та розширення впливу. Потужність походить від дисципліни та централізованого контролю.
asit = Австро-італійська імперія є державою, що поєднує структуру Центральної Європи з італійським впливом та культурою. Орієнтується на експансію, економічну міць та стратегічне домінування в регіоні. Потужність походить від поєднання промислової сили та культурної спадщини.
aslr = Австрословакія є об’єднаною державою, що поєднує Центральну Європу та слов’янські регіони під одним урядуванням. Орієнтується на стабільність, співпрацю та збалансований розвиток. Сила походить від єдності між різними культурами та територіями.
aval3 = Авалонська Імперія є легендарною державою, натхненною стародавніми міфами та сильною культурною спадщиною. Орієнтується на єдність, містицизм та розширення впливу через традиції та силу. Її ідентичність ґрунтується як на спадщині, так і на амбіціях.
azan4 = Азанійська Імперія є потужною державою, орієнтованою на єдність, контроль ресурсів та регіональне домінування на своїх землях. Підкреслює сильне керівництво, розвиток та підтримку стабільності на своїх територіях. Сила походить від дисципліни та стратегічного зростання.
azte = Імперія Ацтеків є цивілізацією, відомою військовою міццю, багатими традиціями та розвиненим суспільством. Орієнтується на експансію, збір данини та культурний вплив. Потужність походить від сильної організації та воєнно-орієнтованої системи.
batv = Батавійська Імперія є сильною державою, побудованою на морській торгівлі та стратегічному контролі водних шляхів. Орієнтується на комерцію, морську міць та ефективне управління. Вплив походить від контролю ключових торгових маршрутів і портів.
bava = Баварія є регіональною державою, відомою сильною економікою, культурою та традиціями. Орієнтується на стабільність, промислову міць та внутрішній розвиток. Її ідентичність формується як спадщиною, так і сучасним прогресом.
bel = Бельгія є державою Центральної Європи, орієнтованою на дипломатию, торгівлю та співпрацю. Підкреслює економічну міць, нейтралітет та міжнародні відносини. Вплив походить від стратегічного розташування та політичної ваги.
bene = Бенелюкс є кооперативним союзом Бельгії, Нідерландів та Люксембургу. Орієнтується на економічну інтеграцію, торгівлю та регіональну стабільність. Сила походить із тісної співпраці та спільного процвітання.
bbl3 = Чорна Ліга є дисциплінованою та мілітарною державою, побудованою на суворому порядку та централізованому контролі. Орієнтується на силу, внутрішню єдність та розширення через застосування сили. Потужність походить від непохитної влади та організації.
bohe = Богемія є історичною державою Центральної Європи, відомою багатою культурою та стратегічним розташуванням. Орієнтується на стабільність, розвиток та підтримку регіонального впливу. Сила походить від традицій та стійкості.
gboh3 = Богемська Імперія є централізованою державою, яка розширює свій вплив по Центральній Європі. Орієнтується на сильне управління, військову міць та культурну ідентичність. Сила походить від єдності та стратегічного контролю.
buls = Болгарська Імперія є сильною та експансіоністською державою з глибокими історичними коренями. Орієнтується на військову силу, контроль територій та регіональний вплив. Потужність походить від єдності, стійкості та стратегічного керівництва.
burg3 = Бургундське Імперіум є потужною державою, зосередженою на контролі торгових шляхів та сильної територіальної експансії. Орієнтується на військову організацію, економічну міць та регіональне домінування. Вплив походить від стратегічного розташування та дисциплінованого правління.
byza = Візантійська Імперія є потужною та довговічною державою, відомою сильною адміністрацією та культурною спадщиною. Орієнтується на дипломатію, оборону та збереження свого впливу в регіонах. Сила походить від організації та багатовікових традицій.
cary3 = Карпатська Імперія є гірською державою, побудованою навколо сильних природних оборонних рубежів та складного рельєфу. Орієнтується на військову міць, стратегічне розташування та регіональний контроль. Потужність походить від важкодоступного ландшафту та стійких людей.
carr = Карфаген є потужною морською державою, відомою торгівлею, морською силою та економічним впливом. Орієнтується на комерцію, експансію та контроль ключових морських шляхів. Потужність походить від багатства та домінування над Середземномор’ям.
cast = Кастилія є сильним Іберійським королівством, відомим експансією та військовою силою. Орієнтується на завоювання, об’єднання та територіальне зростання. Сила походить від дисциплінованих армій та централізованого правління.
argg3 = Каталанське Імперіум є регіональною державою, орієнтованою на торгівлю, культуру та морський вплив. Підкреслює економічне зростання, стратегічні порти та сильну ідентичність. Сила походить від комерції та контролю узбережжя.
cau3 = Кавказька Імперія є гірською державою, яка контролює ключові перевали та торгові шляхи. Орієнтується на оборону, стратегічне розташування та регіональний вплив. Сила походить від рельєфу та стійких людей.
gleg = Кельтський Союз є культурним альянсом кельтських націй, який цінує спільну спадщину та співпрацю. Орієнтується на єдність, збереження культури та регіональну силу. Вплив походить від спільної ідентичності та сильних традицій.
cent = Центральна Америка є регіональним союзом, який об’єднує країни через торгівлю та співпрацю. Орієнтується на економічне зростання, стабільність та спільний розвиток. Сила походить від єдності різноманітних країн.
chee = Чера є стародавньою державою Південної Індії, відомою торгівлею, морською силою та культурним впливом. Орієнтується на комерцію, морські маршрути та регіональне процвітання. Сила походить від контролю прибережної торгівлі та стратегічних портів.
chol = Чола є потужною імперією Південної Індії, відомою морським пануванням та експансією. Орієнтується на торгівлю, завоювання та ефективне управління. Сила походить від потужного флоту та організованого правління.
plai3 = Конфедерація Рівнин є вільним союзом територій, що підкреслює співпрацю та спільний захист. Орієнтується на сільське господарство, мобільність та координацію між регіонами. Сила походить від єдності на відкритих і багатих ресурсами землях.
cos = Козаки є воїнським товариством, відомим незалежністю, мобільністю та військовою майстерністю. Орієнтуються на оборону, набіги та захист рідної землі. Сила походить від свободи, дисципліни та сильних традицій.
coub = Курляндія є невеликою, але амбітною державою, відомою торгівлею та колоніальними підприємствами. Орієнтується на морську експансію, комерцію та стратегічний вплив. Сила походить від здатності проєктувати потужність за межами власного розміру.
crkh = Кримське ханство є степовою державою, відомою швидкою кавалерією та силою набігів. Орієнтується на мобільність, військову міць та контроль торгових шляхів. Сила походить від швидкості та стратегічного ведення війни.
cum = Куманія є степовою конфедерацією, відома кочовими воїнами та великими пасовищами. Орієнтується на мобільність, набіги та контроль відкритих територій. Сила походить від швидкої кавалерії та адаптивності.
cypk = Кіпрське Королівство є острівною державою, відомою стратегічним розташуванням та морським впливом. Орієнтується на торгівлю, дипломатію та морську міць. Потужність походить від контролю ключових морських шляхів у регіоні.
cze = Чехія є державою Центральної Європи, відомою сильною економікою та культурною спадщиною. Орієнтується на стабільність, промисловість та внутрішній розвиток. Сила походить від організації та регіональної важливості.
czsl = Чехословаччина є державою Центральної Європи, орієнтованою на єдність регіонів та сильний промисловий розвиток. Підкреслює стабільність, оборону та економічне зростання. Сила походить від співпраці та спільної ідентичності.
dacc = Дація є стародавньою державою, відомою сильною воїнською культурою та опором проти потужних імперій. Орієнтується на оборону, контроль територій та збереження ідентичності. Сила походить від стійкості та рішучості.
dalm2 = Далмація є прибережною державою, відомою стратегічним розташуванням вздовж моря та сильною морською присутністю. Орієнтується на торгівлю, морську міць та регіональний контроль. Сила походить від портів та контролю прибережних маршрутів.
danu3 = Дунайська Імперія є великою державою, що об’єднує території вздовж Дунаю. Орієнтується на торгівлю, стратегічний контроль та економічну інтеграцію регіонів. Сила походить від контролю одного з найважливіших водних шляхів Європи.
nodm = Данія–Норвегія є союзом двох королівств, що поділяють морську потугу та сильні морські традиції. Орієнтується на торгівлю, контроль морів та співпрацю між землями. Сила походить від потужного флоту та спільного управління.
durr = Імперія Дуррані є потужною державою в Центральній та Південній Азії, відомою військовою міццю та територіальною експансією. Орієнтується на завоювання, контроль та регіональне домінування. Сила походить від сильного керівництва та дисциплінованих армій.
eagl3 = Союз Орла є сучасною потужною державою, орієнтованою на промисловість, військову міць та технологічний розвиток. Підкреслює морську перевагу та глобальний вплив. Сила походить від інновацій та переважних можливостей.
eaff = Федерація Східної Африки є регіональним союзом, що підкреслює співпрацю, торгівлю та спільний розвиток серед учасників. Орієнтується на економічне зростання, інфраструктуру та регіональну стабільність. Сила походить від єдності різних держав.
east2 = Східна Римська Імперія є продовженням римської спадщини, орієнтованим на сильну адміністрацію та стратегічну оборону. Орієнтується на дипломатію, військову міць та збереження впливу. Потужність походить від організації та витривалості.
egy = Королівство Єгипет є історичною та впливовою державою, відомою культурою, сільським господарством та контролем над Нілом. Орієнтується на стабільність, управління ресурсами та регіональний вплив. Сила походить від родючих земель та сильної влади.
bra = Імперія Бразилія є потужною державою, орієнтованою на експансію, стабільність та контроль над великими територіями. Підкреслює економічне зростання, управління ресурсами та централізовану владу. Сила походить від розмірів та стратегічного керівництва.
jauu3 = Імперія Джаунпур є сильною регіональною державою, відомою культурою, архітектурою та військовою міццю. Орієнтується на експансію, управління та підтримку регіонального впливу. Потужність походить від дисциплінованого управління та стратегічного розташування.
rij3 = Імперія Рієки є прибережною державою, відомою стратегічними портами та морською торгівлею. Орієнтується на морську міць, комерцію та регіональний контроль. Сила походить від позиції на ключових морських шляхах.
sarr3 = Імперія Сардин є прибережною державою, орієнтованою на морську економіку та рибальство. Підкреслює морську торгівлю, управління ресурсами та контроль над морями. Сила походить від промисловості та єдності.
engk = Королівство Англія є потужною та впливовою державою, відомою сильною морською флотилією та політичним охопленням. Орієнтується на експансію, торгівлю та глобальний вплив. Сила походить від морської переваги та організованого управління.
eng = Англія є потужною та впливовою державою, відомою сильною морською флотилією, промисловістю та глобальним охопленням. Орієнтується на торгівлю, експансію та підтримку міжнародного впливу. Сила походить від морської міць та економічного домінування.
est = Королівство Естонія є північною державою, відомою стійкістю та сильним почуттям ідентичності. Орієнтується на стабільність, оборону та регіональний розвиток. Сила походить від єдності та рішучості.
evil3 = Зла Шотландія є темною та агресивною державою, відомою безжальною експансією та домінуванням. Орієнтується на завоювання, страх та переважаючу силу. Сила походить від готовності робити все для перемоги.
fin = Фінляндія є північною державою, відомою стійкістю, сильною обороною та зв’язком із своєю землею. Орієнтується на стабільність, самодостатність та підтримку незалежності. Сила походить від єдності та рішучості у суворих умовах.
fish3 = Імперія Фіш енд Чіпс є легкою морською державою, побудованою на прибережній торгівлі та рибальстві. Орієнтується на виробництво ресурсів, морську присутність та поступову експансію. Сила походить від промисловості та контролю над морями.
fra = Франція є великою європейською державою, відомою сильною культурою, військовою історією та глобальним впливом. Орієнтується на дипломатію, експансію та економічну міць. Потужність походить від поєднання стратегічного керівництва та національної єдності.
frc = Франконія є регіональною державою, відомою сильною культурною ідентичністю та стратегічним розташуванням у Центральній Європі. Орієнтується на стабільність, розвиток та регіональний вплив. Сила походить від єдності та традицій.
frat3 = Фраталонія є прибережною та культурно багатою державою, відомою торгівлею, інноваціями та регіональним впливом. Орієнтується на економічне зростання, стабільність та стратегічну експансію. Сила походить від поєднання культури та комерції.
fri = Фризія є прибережною державою, відомою морськими традиціями та торговими мережами. Орієнтується на морський контроль, комерцію та регіональну стабільність. Сила походить від портів та морської майстерності.
gaja3 = Імперія Гаджапаті є потужною регіональною державою, відомою сильною військовою та культурною впливовістю. Орієнтується на експансію, управління та підтримку домінування в регіоні. Сила походить від дисциплінованого управління та стратегічного керівництва.
frak3 = Галійський Імперіум є потужною та дисциплінованою державою, відомою військовою міццю та стратегічним контролем. Орієнтується на експансію, організацію та підтримку порядку на своїх територіях. Сила походить від єдності та сильного керівництва.
ger = Німецька Імперія є потужною та добре організованою державою, відомою сильною промисловістю та військовою міццю. Орієнтується на експансію, ефективність та національну силу. Потужність походить від дисципліни, технологій та централізованого керівництва.
ghav = Газна є потужною середньовічною державою, відомою військовими кампаніями та експансією. Орієнтується на завоювання, контроль торгових шляхів та регіональне домінування. Сила походить від дисциплінованих армій та стратегічного керівництва.
gogg = Гогурьо є стародавнім та потужним королівством, відомим сильною армією та укріпленими кордонами. Орієнтується на оборону, експансію та підтримку контролю над територією. Сила походить від стійкості та стратегічного ведення війни.
grc = Велика Колумбія є великою регіональною державою, орієнтованою на об’єднання територій Південної Америки. Підкреслює незалежність, стабільність та сильне управління. Сила походить від єдності та контролю над великими землями.
uni2 = Велика Британія є потужною острівною державою, відомою сильною флотилією та глобальним впливом. Орієнтується на торгівлю, експансію та підтримку контролю над віддаленими територіями. Сила походить від морської переваги та економічної потужності.
gmor3 = Велика Моравія є ранньою слов’янською державою, відомою культурним та релігійним розвитком. Орієнтується на єдність, експансію та поширення впливу в регіоні. Сила походить від ранньої організації та спільної ідентичності.
spir3 = Федерація Великого Духа є містичним союзом, що керується спільними віруваннями та традиціями. Орієнтується на єдність, гармонію та колективну силу. Потужність походить від співпраці та сильної духовної ідентичності.
grea3 = Велика Сфера Спільного Процвітання Східної Азії є регіональним блоком, що підкреслює єдність та співпрацю між країнами Східної Азії. Орієнтується на економічну інтеграцію, обмін ресурсами та колективну силу. Потужність походить від координації та спільного впливу.
nirr3 = Велика Імперія Нігеру є потужною державою, зосередженою на контролі регіону Нігер та його ресурсів. Орієнтується на торгівлю, експансію та регіональне домінування. Сила походить від економічного контролю та стратегічної єдності.
porg = Велика Португалія є розширеною державою, орієнтованою на морську торгівлю та вплив за кордоном. Підкреслює дослідження, комерцію та контроль морських шляхів. Сила походить від морської міць та глобального охоплення.
gre = Греція є європейською державою, відомою багатою історією, культурою та стратегічним розташуванням. Орієнтується на стабільність, оборону та регіональний вплив. Сила походить від єдності та сильної культурної ідентичності.
hans3 = Ганзейський союз є потужним торговим альянсом міст-купців, орієнтованим на комерцію та економічну співпрацю. Підкреслює торгівлю, взаємний захист та спільне процвітання. Сила походить від єдності його членів.
hgr4 = Священний Німецький Райх є централізованою та авторитарною державою, побудованою на єдності, порядку та традиціях. Орієнтується на силу, експансію та підтримку контролю над територіями. Потужність походить від дисципліни та сильного керівництва.
holy = Священна Римська імперія є децентралізованою державою, що складається з багатьох територій, об’єднаних під спільною владою. Орієнтується на співпрацю, політичний баланс та підтримку впливу в регіонах. Сила походить від єдності та спільного управління.
hun = Угорщина є центральноєвропейською державою, відомою сильною ідентичністю та історичною спадщиною. Орієнтується на стабільність, оборону та регіональний вплив. Сила походить від єдності та стійкості.
ical3 = Іберійський халіфат є потужною державою, що об’єднує Іберійський півострів під єдиною владою. Орієнтується на експансію, культуру та сильне управління. Сила походить від єдності та стратегічного керівництва.
iber = Іберійський союз є регіональною державою, що об’єднує країни Іберійського півострова. Орієнтується на співпрацю, економічне зростання та спільну стабільність. Сила походить від єдності та міцних регіональних зв’язків.
