LANGUAGENAME = Tiếng Việt
baby = Babylon là một nền văn minh cổ đại được phục hưng, xây dựng trên di sản của luật pháp, văn hóa và đổi mới thời kỳ đầu. Nó tập trung vào quản trị vững mạnh, phát triển và mở rộng chiến lược. Mục tiêu của nó là khôi phục tầm ảnh hưởng lịch sử trong khu vực.
eunn = Liên minh châu Âu là một liên minh chính trị và kinh tế lớn, nhấn mạnh sự hợp tác, thương mại và việc ra quyết định tập thể. Nó tập trung vào sự ổn định, phát triển và duy trì hòa bình giữa các quốc gia thành viên. Ảnh hưởng của nó trải rộng khắp lục địa thông qua ngoại giao và kinh tế.
int = Intermarium là một liên minh khu vực tập trung vào sự hợp tác giữa các quốc gia Trung và Đông Âu. Nó ưu tiên phòng thủ chung, liên kết kinh tế và độc lập khỏi các cường quốc lớn. Sức mạnh của nó nằm ở sự đoàn kết giữa các quốc gia đa dạng.
lech3 = Imperium Lechitów là một quốc gia hùng mạnh được xây dựng trên di sản của các dân tộc Lechitic, nhấn mạnh sự đoàn kết, truyền thống và sức mạnh. Nó tập trung vào bản sắc văn hóa, kiểm soát lãnh thổ và sự ổn định lâu dài. Tham vọng của nó là khẳng định sự thống trị đối với các khu vực lân cận.
pier3 = Rzeczpospolita Pierogowa là một quốc gia vui nhộn nhưng thống nhất, xoay quanh văn hóa và truyền thống chung. Nó tập trung vào sự ổn định nội bộ, cộng đồng và bản sắc văn hóa thay vì mở rộng. Dù mang tính hài hước, nó vẫn gắn kết và kiên cường.
plsr = Đế quốc Baltic là một quốc gia hùng mạnh được hình thành từ việc thống nhất các vùng quanh biển Baltic. Nó kiểm soát các tuyến thương mại quan trọng và tập trung vào sức mạnh hải quân và tăng trưởng kinh tế. Sự thống nhất giúp nó thống trị khu vực dù quy mô tương đối nhỏ.
pol2 = Thịnh vượng chung là một liên minh được hình thành bởi nhiều quốc gia nhằm tăng cường quốc phòng và hợp tác. Thay vì một người cai trị, quyền lực được chia sẻ giữa các thành viên. Nó tập trung vào sự ổn định, ngoại giao và phát triển tập thể.
reda = Redania là một vương quốc mạnh mẽ và tập trung, nổi tiếng với quân đội kỷ luật và lãnh đạo chiến lược. Nó tập trung vào mở rộng, kiểm soát và duy trì trật tự trên toàn lãnh thổ. Sức mạnh của nó khiến nó trở thành một trong những thế lực thống trị trong khu vực.
zapa3 = Zapadoslavia là một quốc gia Tây Slav thống nhất, tăng cường các mối liên kết văn hóa và chính trị giữa các quốc gia của nó. Nó tập trung vào sự đoàn kết, ổn định khu vực và hợp tác kinh tế. Cùng nhau, nó đứng vững hơn trước các thế lực bên ngoài.
slav3 = Đế chế Slav là một quốc gia rộng lớn объедин các vùng đất Slav dưới một quyền lực mạnh mẽ. Nó tập trung vào sức mạnh, mở rộng và thống trị văn hóa trong khu vực. Quy mô của nó khiến nó trở thành một thế lực lớn trong các vấn đề toàn cầu.
eth = Abyssinia là một quốc gia lịch sử kiên cường, bắt nguồn từ các truyền thống cổ xưa và lãnh đạo mạnh mẽ. Nó nhấn mạnh sự độc lập, phòng thủ và bảo tồn di sản văn hóa. Di sản của nó mang lại ảnh hưởng lâu dài trong khu vực.
afg = Tiểu vương quốc Afghanistan là một quốc gia được dẫn dắt bởi sự lãnh đạo nghiêm ngặt và truyền thống mạnh mẽ. Nó tập trung vào kiểm soát nội bộ, phòng thủ và duy trì ổn định trong biên giới. Địa hình và sự kiên cường khiến nó khó bị chinh phục.
afri = Liên minh châu Phi là một tổ chức lục địa thúc đẩy sự thống nhất và hợp tác giữa các quốc gia châu Phi. Nó tập trung vào tăng trưởng kinh tế, ngoại giao và ổn định khu vực. Sức mạnh của nó đến từ hành động tập thể trên toàn lục địa.
aksu = Aksum là một vương quốc cổ đại và hùng mạnh, nổi tiếng với thương mại, tôn giáo và đổi mới sớm. Nó tập trung vào thương mại, ảnh hưởng và duy trì di sản lịch sử. Nguồn gốc của nó mang lại sức mạnh và bản sắc lâu dài.
andd = Al-Andalus là một quốc gia giàu văn hóa và phát triển, nổi tiếng về học thuật, kiến trúc và thương mại. Nó nhấn mạnh tri thức, thịnh vượng và một xã hội đa dạng. Ảnh hưởng của nó đến từ cả trí tuệ và sức mạnh kinh tế.
alb3 = Albania là một quốc gia kiên cường và quyết tâm, tập trung vào độc lập và ổn định. Nó ưu tiên phòng thủ, đoàn kết và bảo tồn bản sắc quốc gia. Sức mạnh của nó nằm ở khả năng chịu đựng và thích nghi.
alpi3 = Đế chế Alpine là một đế chế vùng núi cao, được xây dựng dựa trên việc kiểm soát các khu vực núi. Nó tập trung vào phòng thủ, cơ sở hạ tầng vững chắc và vị trí chiến lược. Địa hình khiến nó khó bị xâm lược và dễ phòng thủ.
anda3 = Andalucia là một khu vực nổi tiếng với văn hóa phong phú, thương mại và ảnh hưởng lịch sử. Nó tập trung vào tăng trưởng kinh tế, di sản văn hóa và bản sắc khu vực mạnh mẽ. Vị trí của nó khiến nó trở thành cầu nối quan trọng giữa các khu vực.
gang3 = Khối Anglosphere là một không gian văn hóa và chính trị объедин các quốc gia nói tiếng Anh. Nó tập trung vào hợp tác, giá trị chung và ảnh hưởng toàn cầu. Sức mạnh của nó đến từ phạm vi ảnh hưởng rộng khắp trên thế giới.
anti = Liên minh Antillean là một liên minh các quốc gia đảo tập trung vào thương mại, sức mạnh hải quân và hợp tác trên biển. Nó dựa vào kiểm soát hàng hải và liên kết kinh tế để duy trì ảnh hưởng. Sự đoàn kết biến các đảo rời rạc thành một thế lực thống nhất.
ani = Antioch là một thành bang lịch sử có ảnh hưởng lớn, nổi tiếng về văn hóa, thương mại và vị trí chiến lược. Nó tập trung vào thương mại, ngoại giao và tầm quan trọng khu vực. Vị trí của nó khiến nó trở thành trung tâm kết nối các nền văn minh khác nhau.
abbr = Cộng hòa Hồi giáo Aram là một quốc gia được dẫn dắt bởi đức tin, sự đoàn kết và quản trị có tổ chức. Nó tập trung vào ổn định nội bộ, bản sắc văn hóa và lãnh đạo mạnh mẽ. Sức mạnh của nó đến từ kỷ luật và niềm tin chung.
arab = Arabia là một nền văn minh sa mạc hùng mạnh, nổi tiếng với lãnh thổ rộng lớn và kiểm soát các tuyến thương mại. Nó tập trung vào quản lý tài nguyên, khả năng di chuyển chiến lược và ảnh hưởng kinh tế. Sự đoàn kết giúp nó phát triển trong môi trường khắc nghiệt.
arm = Armenia là một quốc gia cổ đại và kiên cường, nổi tiếng với lịch sử phong phú và bản sắc văn hóa mạnh mẽ. Nó tập trung vào phòng thủ, truyền thống và bảo vệ độc lập. Sự bền bỉ giúp nó tồn tại qua nhiều thử thách.
arzt = Arstotzka là một quốc gia nghiêm ngặt và kiểm soát chặt chẽ, tập trung vào an ninh và trật tự. Nó ưu tiên biên giới, giám sát và kiểm soát nội bộ hơn tất cả. Sức mạnh của nó nằm ở kỷ luật và quyền lực tuyệt đối.
asha = Ashanti là một quốc gia Tây Phi hùng mạnh, nổi tiếng với sự giàu có về vàng và truyền thống quân sự mạnh mẽ. Nó tập trung vào thương mại, kiểm soát tài nguyên và duy trì ảnh hưởng khu vực. Sức mạnh của nó đến từ sự đoàn kết và lãnh đạo kỷ luật.
gase3 = Hiệp hội các quốc gia Đông Nam Á là một tổ chức khu vực thúc đẩy hợp tác, thương mại và ổn định giữa các quốc gia thành viên. Nó tập trung vào tăng trưởng kinh tế, ngoại giao và phát triển chung. Sức mạnh của nó đến từ sự đoàn kết và hợp tác giữa các quốc gia đa dạng.
auhh = Australia-Hungary là một quốc gia lai kết hợp ảnh hưởng thuộc địa với hệ thống quản trị tập trung mạnh. Nó tập trung vào mở rộng, kiểm soát tài nguyên và thống trị chiến lược trên các vùng đất xa xôi. Sức mạnh của nó đến từ sự kết hợp giữa truyền thống cũ và lãnh thổ mới.
anz3 = Australia–New Zealand là một liên minh khu vực gần gũi, nhấn mạnh hợp tác, thương mại và an ninh chung. Nó tập trung vào sức mạnh kinh tế, năng lực hải quân và sự ổn định ở Thái Bình Dương. Sự đoàn kết tăng cường cả hai quốc gia thông qua hợp tác và hỗ trợ lẫn nhau.
atr = Áo là một quốc gia Trung Âu nổi tiếng với sự ổn định, ngoại giao và di sản văn hóa. Nó tập trung vào phát triển nội bộ, quản trị vững chắc và duy trì sự cân bằng trong khu vực. Sức mạnh của nó nằm ở trật tự và tính liên tục.
gatr3 = Đế chế Áo là một quốc gia tập trung và có quyền lực cao, được xây dựng trên quản trị nghiêm ngặt và thống nhất quốc gia. Nó tập trung vào sức mạnh, trật tự và mở rộng ảnh hưởng. Sức mạnh của nó đến từ kỷ luật và kiểm soát tập trung.
asit = Đế chế Áo-Ý là một quốc gia объедин cấu trúc Trung Âu với ảnh hưởng và văn hóa Ý. Nó tập trung vào mở rộng, sức mạnh kinh tế và thống trị chiến lược trong khu vực. Sức mạnh của nó đến từ sự kết hợp giữa công nghiệp và di sản văn hóa.
aslr = Austroslovakia là một quốc gia thống nhất, kết hợp các khu vực Trung Âu và Slav dưới một chính quyền. Nó tập trung vào ổn định, hợp tác và phát triển cân bằng. Sức mạnh của nó đến từ sự thống nhất giữa các nền văn hóa và lãnh thổ đa dạng.
aval3 = Đế chế Avalonian là một quốc gia huyền thoại lấy cảm hứng từ truyền thuyết cổ và di sản văn hóa mạnh mẽ. Nó tập trung vào sự thống nhất, bí ẩn và mở rộng ảnh hưởng thông qua truyền thống và sức mạnh. Bản sắc của nó bắt nguồn từ cả di sản và tham vọng.
azan4 = Đế chế Azanian là một quốc gia hùng mạnh tập trung vào sự đoàn kết, kiểm soát tài nguyên và thống trị khu vực trong lãnh thổ của mình. Nó nhấn mạnh lãnh đạo mạnh mẽ, phát triển và duy trì ổn định trên toàn bộ lãnh thổ. Sức mạnh của nó đến từ kỷ luật và tăng trưởng chiến lược.
azte = Đế chế Aztec là một nền văn minh nổi tiếng với sức mạnh quân sự, truyền thống phong phú và xã hội phát triển. Nó tập trung vào mở rộng, cống nạp và ảnh hưởng văn hóa. Sức mạnh của nó đến từ tổ chức chặt chẽ và hệ thống chiến binh.
batv = Đế chế Batavian là một quốc gia mạnh mẽ được xây dựng dựa trên thương mại hàng hải và kiểm soát chiến lược các tuyến đường thủy. Nó tập trung vào thương mại, sức mạnh hải quân và quản trị hiệu quả. Ảnh hưởng của nó đến từ việc kiểm soát các tuyến thương mại và cảng quan trọng.
bava = Bavaria là một khu vực nổi tiếng với nền kinh tế mạnh, văn hóa và truyền thống. Nó tập trung vào sự ổn định, sức mạnh công nghiệp và phát triển nội bộ. Bản sắc của nó được định hình bởi cả di sản và tiến bộ hiện đại.
bel = Bỉ là một quốc gia Trung Âu tập trung vào ngoại giao, thương mại và hợp tác. Nó nhấn mạnh sức mạnh kinh tế, tính trung lập và quan hệ quốc tế. Ảnh hưởng của nó đến từ vị trí chiến lược và tầm quan trọng chính trị.
bene = Benelux là một liên minh hợp tác giữa Bỉ, Hà Lan và Luxembourg. Nó tập trung vào hội nhập kinh tế, thương mại và ổn định khu vực. Sức mạnh của nó đến từ sự hợp tác chặt chẽ và thịnh vượng chung.
bbl3 = Liên minh Đen là một quốc gia kỷ luật và quân phiệt, được xây dựng trên trật tự nghiêm ngặt và quyền kiểm soát tập trung. Nó tập trung vào sức mạnh, sự thống nhất nội bộ và mở rộng bằng vũ lực. Sức mạnh của nó đến từ quyền lực và tổ chức không lay chuyển.
bohe = Bohemia là một quốc gia lịch sử ở Trung Âu, nổi tiếng với văn hóa phong phú và vị trí chiến lược. Nó tập trung vào ổn định, phát triển và duy trì ảnh hưởng khu vực. Sức mạnh của nó đến từ truyền thống và khả năng phục hồi.
gboh3 = Đế chế Bohemian là một quốc gia tập trung, mở rộng ảnh hưởng trên khắp Trung Âu. Nó tập trung vào quản trị mạnh mẽ, sức mạnh quân sự và bản sắc văn hóa. Sức mạnh của nó đến từ sự thống nhất và kiểm soát chiến lược.
buls = Đế chế Bulgaria là một quốc gia mạnh mẽ và có xu hướng mở rộng, với nền tảng lịch sử sâu sắc. Nó tập trung vào sức mạnh quân sự, kiểm soát lãnh thổ và ảnh hưởng khu vực. Sức mạnh của nó đến từ sự đoàn kết, kiên cường và lãnh đạo chiến lược.
burg3 = Đế chế Burgundian là một quốc gia hùng mạnh tập trung vào kiểm soát các tuyến thương mại và mở rộng lãnh thổ mạnh mẽ. Nó chú trọng vào tổ chức quân sự, sức mạnh kinh tế và sự thống trị khu vực. Ảnh hưởng của nó đến từ vị trí chiến lược và sự cai trị kỷ luật.
byza = Đế chế Byzantine là một quốc gia hùng mạnh và bền bỉ, nổi tiếng với nền hành chính vững chắc và di sản văn hóa. Nó tập trung vào ngoại giao, phòng thủ và duy trì ảnh hưởng trên nhiều khu vực. Sức mạnh của nó đến từ tổ chức và truyền thống lâu đời.
cary3 = Đế chế Carpathian là một quốc gia miền núi được xây dựng dựa trên phòng thủ tự nhiên mạnh mẽ và địa hình gồ ghề. Nó tập trung vào sức mạnh quân sự, vị trí chiến lược và kiểm soát khu vực. Sức mạnh của nó đến từ địa hình khó khăn và con người kiên cường.
carr = Carthage là một quốc gia hàng hải hùng mạnh nổi tiếng về thương mại, sức mạnh hải quân và ảnh hưởng kinh tế. Nó tập trung vào thương mại, mở rộng và kiểm soát các tuyến đường biển quan trọng. Sức mạnh của nó đến từ sự giàu có và thống trị Địa Trung Hải.
cast = Castile là một vương quốc Iberia hùng mạnh nổi tiếng với sự mở rộng và sức mạnh quân sự. Nó tập trung vào chinh phục, thống nhất và mở rộng lãnh thổ. Sức mạnh của nó đến từ quân đội kỷ luật và quyền lực tập trung.
