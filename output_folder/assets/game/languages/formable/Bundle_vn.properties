sic = Vương quốc Sicily là một quốc gia Địa Trung Hải lịch sử nổi tiếng với sự pha trộn văn hóa và vị trí chiến lược. Quốc gia này tập trung vào thương mại, quản trị và giao lưu văn hóa. Sức mạnh của nó đến từ vị trí giao thoa của các nền văn minh.
soko = Sokoto là một quốc gia Hồi giáo Tây Phi hùng mạnh nổi tiếng với hệ thống tôn giáo và hành chính mạnh. Quốc gia này tập trung vào quản trị, mở rộng và truyền bá giá trị tôn giáo. Sức mạnh của nó đến từ sự thống nhất, lãnh đạo và bộ máy tổ chức.
somi3 = Đế chế Somali là một quốc gia thương mại và hàng hải lịch sử ở Đông Phi nổi tiếng với ảnh hưởng ven biển và thương mại. Quốc gia này tập trung vào thương mại, hoạt động hải quân và kiểm soát khu vực. Sức mạnh của nó đến từ kỹ năng hàng hải và mạng lưới ven biển chiến lược.
som = Somalia là một quốc gia vùng Sừng châu Phi nổi tiếng với đường bờ biển dài và di sản văn hóa. Quốc gia này tập trung vào ổn định, thương mại và hợp tác khu vực. Sức mạnh của nó đến từ tiếp cận hàng hải và sự thống nhất văn hóa.
gsg3 = Liên bang Nam Đức là một quốc gia khu vực lịch sử ở Trung Âu nổi tiếng với việc объедин các vùng Nam Đức. Quốc gia này tập trung vào hợp tác, quản trị và ổn định khu vực. Sức mạnh của nó đến từ bản sắc chung và lãnh đạo phối hợp.
rus = Liên Xô là một quốc gia lịch sử hùng mạnh nổi tiếng với lãnh thổ rộng lớn và hệ thống chính trị tập trung. Quốc gia này tập trung vào quản trị, phát triển công nghiệp và ảnh hưởng toàn cầu. Sức mạnh của nó đến từ kế hoạch tập trung và kiểm soát nhà nước mạnh.
spa = Tây Ban Nha là một quốc gia châu Âu nổi tiếng với lịch sử phong phú, văn hóa và ảnh hưởng hàng hải toàn cầu. Quốc gia này tập trung vào du lịch, di sản văn hóa và phát triển kinh tế. Sức mạnh của nó đến từ sự đa dạng văn hóa và di sản lịch sử.
spa4 = Đế chế Tây Ban Nha là một đế chế toàn cầu lịch sử hùng mạnh nổi tiếng với lãnh thổ hải ngoại rộng lớn và thống trị hàng hải. Quốc gia này tập trung vào mở rộng, thương mại và ảnh hưởng văn hóa. Sức mạnh của nó đến từ sức mạnh hải quân và phạm vi thuộc địa rộng lớn.
spaem = Đế chế Sparta là một quốc gia theo phong cách lịch sử lấy cảm hứng từ Sparta cổ đại, nổi tiếng với kỷ luật nghiêm khắc và tập trung quân sự. Quốc gia này tập trung vào chiến tranh, huấn luyện và trật tự xã hội. Sức mạnh của nó đến từ tính kỷ luật quân sự và sự thống nhất.
sri = Sri Lanka là một quốc đảo ở Nam Á nổi tiếng với di sản văn hóa và vẻ đẹp thiên nhiên. Quốc gia này tập trung vào ổn định, thương mại và hợp tác khu vực. Sức mạnh của nó đến từ vị trí chiến lược và sự đa dạng văn hóa.
suns3 = Đế chế Hoàng hôn là một quốc gia biểu tượng đại diện cho sự chuyển giao, di sản và biểu tượng văn hóa. Quốc gia này tập trung vào thống nhất, bản sắc và ảnh hưởng khu vực. Sức mạnh của nó đến từ tầm nhìn chung và sự gắn kết văn hóa.
swab = Swabia là một vùng lịch sử ở Trung Âu nổi tiếng với ảnh hưởng văn hóa và chính trị. Quốc gia này tập trung vào bản sắc khu vực, hợp tác và quản trị. Sức mạnh của nó đến từ sự thống nhất văn hóa và di sản lịch sử.
swi = Thụy Sĩ là một quốc gia châu Âu nổi tiếng với tính trung lập, ổn định và hệ thống tài chính mạnh. Quốc gia này tập trung vào hòa bình, quản trị và phát triển kinh tế. Sức mạnh của nó đến từ tính trung lập chính trị và nền kinh tế vững mạnh.
thir = Mười ba thuộc địa là một nhóm thuộc địa lịch sử của Anh ở Bắc Mỹ, là nền tảng hình thành Hoa Kỳ. Quốc gia này tập trung vào tự quản, thương mại và độc lập. Sức mạnh của nó đến từ sự thống nhất và các lý tưởng chính trị chung.
tib2 = Đế chế Tây Tạng là một quốc gia lịch sử hùng mạnh ở Trung Á nổi tiếng với ảnh hưởng văn hóa và tôn giáo. Quốc gia này tập trung vào mở rộng, quản trị và lãnh đạo tinh thần. Sức mạnh của nó đến từ sự thống nhất văn hóa và địa hình cao nguyên chiến lược.
trr = Tripoli là một thành phố ven biển và khu vực lịch sử ở Bắc Phi nổi tiếng với vai trò hàng hải. Quốc gia này tập trung vào thương mại, hoạt động hải quân và ảnh hưởng khu vực. Sức mạnh của nó đến từ cảng biển và vị trí Địa Trung Hải chiến lược.
gbul3 = Sa hoàng Bulgaria là một quốc gia Balkan lịch sử nổi tiếng với sức mạnh thời trung cổ và phát triển văn hóa. Quốc gia này tập trung vào quản trị, mở rộng và bản sắc văn hóa. Sức mạnh của nó đến từ lãnh đạo mạnh và ảnh hưởng khu vực.
tusc = Tuscany là một vùng lịch sử ở Ý nổi tiếng với nghệ thuật, văn hóa và ảnh hưởng kinh tế. Quốc gia này tập trung vào phát triển văn hóa, thương mại và đổi mới. Sức mạnh của nó đến từ di sản nghệ thuật và sự thịnh vượng kinh tế.
ukr = Ukraine là một quốc gia Đông Âu nổi tiếng với đất nông nghiệp rộng lớn và di sản văn hóa. Quốc gia này tập trung vào ổn định, phát triển và hợp tác khu vực. Sức mạnh của nó đến từ tài nguyên thiên nhiên và đất đai màu mỡ.
unba = Công quốc Baltic Thống nhất là một quốc gia lịch sử mang tính khái niệm ở vùng Baltic nổi tiếng với đề xuất объедин dưới một chính quyền. Quốc gia này tập trung vào quản trị, hợp tác khu vực và ổn định chính trị. Sức mạnh của nó đến từ lãnh đạo tập trung và củng cố lãnh thổ.
gguy3 = Guyana Thống nhất là một ý tưởng khu vực đại diện cho sự thống nhất các vùng Guyana ở Nam Mỹ. Quốc gia này tập trung vào hợp tác, phát triển và quản trị chung. Sức mạnh của nó đến từ hội nhập khu vực và quản lý tài nguyên.
prbr3 = Vương quốc Liên hiệp Bồ Đào Nha, Brasil và Algarve là một quốc gia xuyên Đại Tây Dương lịch sử объедин các lãnh thổ ở châu Âu và Nam Mỹ. Quốc gia này tập trung vào quản trị, thương mại và phối hợp đế quốc. Sức mạnh của nó đến từ tầm ảnh hưởng toàn cầu và sự thống nhất chính trị giữa các châu lục.
uni = Vương quốc Anh là một chế độ quân chủ lập hiến châu Âu nổi tiếng với ảnh hưởng toàn cầu và sự ổn định chính trị. Quốc gia này tập trung vào quản trị, ngoại giao và phát triển kinh tế. Sức mạnh của nó đến từ thể chế vững mạnh và ảnh hưởng lịch sử.
uso = Hợp chúng quốc Đại Dương là một liên bang khái niệm của các quốc đảo trên khắp Thái Bình Dương. Quốc gia này tập trung vào thống nhất, hợp tác và chiến lược hàng hải. Sức mạnh của nó đến từ tài nguyên kết hợp và kết nối đại dương.
ural4 = Liên minh Ural là một liên minh khu vực khái niệm của các dân tộc nói tiếng Ural. Quốc gia này tập trung vào thống nhất văn hóa, hợp tác và phát triển chung. Sức mạnh của nó đến từ sự gắn kết ngôn ngữ và văn hóa.
vand = Vương quốc Vandal là một quốc gia German lịch sử nổi tiếng với việc chinh phục và cai trị ở Bắc Phi. Quốc gia này tập trung vào mở rộng, sức mạnh quân sự và quản trị. Sức mạnh của nó đến từ tính cơ động và lãnh đạo hiệu quả.
visi = Người Visigoth là một dân tộc German lịch sử nổi tiếng với việc thành lập một vương quốc hùng mạnh ở Tây Âu. Họ tập trung vào mở rộng, định cư và quản trị. Sức mạnh của họ đến từ tổ chức quân sự và khả năng thích nghi.
wal = Wales là một quốc gia thuộc Vương quốc Anh nổi tiếng với địa hình núi non và di sản văn hóa phong phú. Quốc gia này tập trung vào bảo tồn văn hóa, quản trị và bản sắc khu vực. Sức mạnh của nó đến từ truyền thống mạnh mẽ và văn hóa dân tộc đặc trưng.
wife = Liên bang Tây Ấn là một liên minh Caribbean tồn tại trong thời gian ngắn nhằm объедин một số lãnh thổ đảo. Quốc gia này tập trung vào hợp tác, quản trị và thống nhất khu vực. Sức mạnh của nó đến từ bản sắc chung và tài nguyên kết hợp.
wepp = Westphalia là một vùng lịch sử ở châu Âu nổi tiếng với vai trò định hình hệ thống chính trị hiện đại. Quốc gia này tập trung vào quản trị, ngoại giao và ổn định khu vực. Sức mạnh của nó đến từ các hiệp ước lịch sử và ảnh hưởng chính trị.
bew = Belarus Trắng là một tên gọi lịch sử và khu vực liên quan đến Belarus. Quốc gia này tập trung vào di sản văn hóa, quản trị và bản sắc khu vực. Sức mạnh của nó đến từ truyền thống chung và sự liên tục lịch sử.
yuan = Nguyên là một triều đại lịch sử ở Trung Quốc do người Mông Cổ thành lập, nổi tiếng với việc thống nhất lãnh thổ rộng lớn. Quốc gia này tập trung vào mở rộng, quản trị và kiểm soát. Sức mạnh của nó đến từ tổ chức quân sự mạnh và quyền lực tập trung.
yugo = Nam Tư là một quốc gia lịch sử ở Đông Nam Âu nổi tiếng với việc объедин nhiều nhóm sắc tộc. Quốc gia này tập trung vào hợp tác, quản trị và ổn định khu vực. Sức mạnh của nó đến từ sự thống nhất giữa các cộng đồng đa dạng và lãnh đạo chung.
drc = Zaire là một quốc gia châu Phi lịch sử nổi tiếng với nguồn tài nguyên dồi dào và vị trí trung tâm. Quốc gia này tập trung vào quản trị, phát triển kinh tế và quản lý tài nguyên. Sức mạnh của nó đến từ sự giàu có tài nguyên và địa lý chiến lược.
zim = Zimbabwe là một quốc gia Nam Phi nổi tiếng với lịch sử phong phú và tài nguyên thiên nhiên. Quốc gia này tập trung vào ổn định, phát triển và hợp tác khu vực. Sức mạnh của nó đến từ khoáng sản và di sản văn hóa.
